<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤖 AI 智能助手</title>
  
  <!-- Vue 3 (本地 libs) -->
  <script src="/libs/vue/dist/vue.global.prod.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Marked (Markdown 解析 - 本地 libs) -->
  <script src="/libs/marked/marked.min.js"></script>
  
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f9fafb;
      --bg-message-user: #0ea5e9;
      --bg-message-ai: #f3f4f6;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --text-message-user: #ffffff;
      --border-color: #e5e7eb;
      --accent-color: #0ea5e9;
      --accent-gradient: linear-gradient(135deg, #0ea5e9 0%, #7c3aed 100%);
    }
    
    [data-theme="dark"] {
      --bg-primary: #1f2937;
      --bg-secondary: #374151;
      --bg-message-user: #0284c7;
      --bg-message-ai: #4b5563;
      --text-primary: #f9fafb;
      --text-secondary: #9ca3af;
      --text-message-user: #ffffff;
      --border-color: #4b5563;
    }
    
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    
    [data-theme="dark"] body {
      background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
    }
    
    .chat-container {
      max-width: 900px;
      margin: 0 auto;
      height: calc(100vh - 40px);
      display: flex;
      flex-direction: column;
      background: var(--bg-primary);
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    
    .chat-header {
      padding: 20px 24px;
      background: var(--accent-gradient);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      background: var(--bg-secondary);
    }
    
    .message {
      display: flex;
      margin-bottom: 20px;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .message.user {
      justify-content: flex-end;
    }
    
    .message-content {
      max-width: 70%;
      padding: 14px 18px;
      border-radius: 16px;
      line-height: 1.6;
    }
    
    .message.user .message-content {
      background: var(--bg-message-user);
      color: var(--text-message-user);
      border-bottom-right-radius: 4px;
    }
    
    .message.ai .message-content {
      background: var(--bg-message-ai);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
    }
    
    .message-content p {
      margin: 0.5em 0;
    }
    
    .message-content p:first-child {
      margin-top: 0;
    }
    
    .message-content p:last-child {
      margin-bottom: 0;
    }
    
    .message-content pre {
      background: var(--bg-primary);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 13px;
    }
    
    .message-content code {
      font-family: 'Monaco', 'Consolas', monospace;
      font-size: 0.9em;
    }
    
    .message-content :not(pre) > code {
      background: var(--bg-primary);
      padding: 2px 6px;
      border-radius: 4px;
    }
    
    .chat-input {
      padding: 20px 24px;
      background: var(--bg-primary);
      border-top: 1px solid var(--border-color);
    }
    
    .input-wrapper {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    
    .chat-textarea {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      font-size: 14px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      resize: none;
      min-height: 56px;
      max-height: 150px;
      font-family: inherit;
      line-height: 1.5;
    }
    
    .chat-textarea:focus {
      outline: none;
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
    }
    
    .send-btn {
      padding: 12px 24px;
      background: var(--accent-gradient);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .send-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(14, 165, 233, 0.4);
    }
    
    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .theme-toggle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.2s;
    }
    
    .theme-toggle:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.1);
    }
    
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 14px 18px;
      background: var(--bg-message-ai);
      border-radius: 16px;
      width: fit-content;
    }
    
    .typing-dot {
      width: 8px;
      height: 8px;
      background: var(--text-secondary);
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }
    
    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }
    
    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }
    
    @keyframes typing {
      0%, 60%, 100% {
        transform: translateY(0);
        opacity: 0.4;
      }
      30% {
        transform: translateY(-8px);
        opacity: 1;
      }
    }
    
    .context-info {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
      text-align: center;
    }
    
    .clear-btn {
      padding: 8px 16px;
      background: rgba(255,255,255,0.2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .clear-btn:hover {
      background: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div id="app" v-cloak>
    <div class="chat-container">
      <!-- 头部 -->
      <header class="chat-header">
        <div class="flex items-center gap-3">
          <span class="text-3xl">🤖</span>
          <div>
            <h1 class="text-xl font-bold">AI 智能助手</h1>
            <p class="text-sm opacity-80">基于混元大模型</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button @click="clearChat" class="clear-btn" title="清空对话">
            🗑️ 清空
          </button>
          <button class="theme-toggle" @click="toggleTheme" :title="isDark ? '切换到浅色模式' : '切换到深色模式'">
            {{ isDark ? '☀️' : '🌙' }}
          </button>
        </div>
      </header>

      <!-- 消息列表 -->
      <div class="chat-messages" ref="messagesContainer">
        <div v-if="messages.length === 0" class="text-center py-20" :style="{ color: isDark ? '#9ca3af' : '#6b7280' }">
          <div class="text-6xl mb-4">👋</div>
          <p class="text-lg font-semibold mb-2">你好！我是 AI 助手</p>
          <p class="text-sm">有什么我可以帮助你的吗？</p>
        </div>
        
        <div v-else>
          <div v-for="(msg, index) in messages" :key="index" 
               class="message" :class="msg.role">
            <div class="message-content">
              <div v-if="msg.role === 'ai'" v-html="renderMarkdown(msg.content)"></div>
              <div v-else>{{ msg.content }}</div>
            </div>
          </div>
          
          <!-- 输入中指示器 -->
          <div v-if="loading" class="message ai">
            <div class="typing-indicator">
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- 输入区域 -->
      <div class="chat-input">
        <div class="input-wrapper">
          <textarea 
            v-model="userInput"
            @keydown.enter.exact.prevent="sendMessage"
            @input="autoResize"
            ref="inputTextarea"
            class="chat-textarea"
            placeholder="输入你的问题... (Enter 发送，Shift+Enter 换行)"
            rows="1"
          ></textarea>
          <button 
            @click="sendMessage" 
            :disabled="loading || !userInput.trim()"
            class="send-btn"
          >
            <span v-if="loading" class="loading">⏳</span>
            <span v-else>发送</span>
            <span>📤</span>
          </button>
        </div>
        <div class="context-info" v-if="messages.length > 0">
          📌 上下文：最近 {{ contextMessages.length }} 条消息（包含当前问题）
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, computed, nextTick, onMounted } = Vue;

    createApp({
      setup() {
        const isDark = ref(false);
        const messages = ref([]);
        const userInput = ref('');
        const loading = ref(false);
        const messagesContainer = ref(null);
        const inputTextarea = ref(null);

        // 上下文消息（最近 2 条，包含当前问题）
        const contextMessages = computed(() => {
          const userMessages = messages.value.filter(m => m.role === 'user');
          const aiMessages = messages.value.filter(m => m.role === 'ai');
          
          // 获取最近 1 条用户消息和 1 条 AI 回复
          const recentUser = userMessages.slice(-1);
          const recentAI = aiMessages.slice(-1);
          
          return [...recentUser, ...recentAI];
        });

        // 主题切换
        const toggleTheme = () => {
          isDark.value = !isDark.value;
          document.documentElement.setAttribute('data-theme', isDark.value ? 'dark' : 'light');
          localStorage.setItem('ai-chat-theme', isDark.value ? 'dark' : 'light');
        };

        // 自动调整文本框高度
        const autoResize = () => {
          const textarea = inputTextarea.value;
          if (textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
          }
        };

        // 渲染 Markdown
        const renderMarkdown = (content) => {
          return marked.parse(content);
        };

        // 滚动到底部
        const scrollToBottom = async () => {
          await nextTick();
          if (messagesContainer.value) {
            messagesContainer.value.scrollTop = messagesContainer.value.scrollHeight;
          }
        };

        // 发送消息
        const sendMessage = async () => {
          const content = userInput.value.trim();
          if (!content || loading.value) return;

          // 添加用户消息
          messages.value.push({
            role: 'user',
            content: content
          });

          userInput.value = '';
          loading.value = true;
          await scrollToBottom();

          try {
            // 构建上下文消息（最近 2 条）
            const contextForAPI = contextMessages.value.map(msg => ({
              role: msg.role === 'ai' ? 'assistant' : 'user',
              content: msg.content
            }));

            // 添加当前问题
            contextForAPI.push({
              role: 'user',
              content: content
            });

            const response = await fetch('/api/ai/chat', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                messages: contextForAPI
              })
            });

            const result = await response.json();
            
            if (result.success) {
              messages.value.push({
                role: 'ai',
                content: result.data.content
              });
            } else {
              messages.value.push({
                role: 'ai',
                content: '❌ 抱歉，发生错误：' + (result.error || '未知错误')
              });
            }
          } catch (err) {
            messages.value.push({
              role: 'ai',
              content: '❌ 网络错误：' + err.message
            });
          } finally {
            loading.value = false;
            await scrollToBottom();
          }
        };

        // 清空对话
        const clearChat = () => {
          if (confirm('确定要清空当前对话吗？')) {
            messages.value = [];
            localStorage.removeItem('ai-chat-history');
          }
        };

        // 加载历史记录
        const loadHistory = () => {
          const saved = localStorage.getItem('ai-chat-history');
          if (saved) {
            try {
              messages.value = JSON.parse(saved);
            } catch (e) {
              console.error('加载历史记录失败:', e);
            }
          }
        };

        // 保存历史记录
        const saveHistory = () => {
          localStorage.setItem('ai-chat-history', JSON.stringify(messages.value));
        };

        onMounted(() => {
          // 加载主题
          const savedTheme = localStorage.getItem('ai-chat-theme') || 'light';
          isDark.value = savedTheme === 'dark';
          document.documentElement.setAttribute('data-theme', savedTheme);
          
          // 加载历史
          loadHistory();
        });

        // 监听消息变化，自动保存
        Vue.watch(messages, () => {
          saveHistory();
        }, { deep: true });

        return {
          isDark,
          toggleTheme,
          messages,
          userInput,
          loading,
          messagesContainer,
          inputTextarea,
          contextMessages,
          renderMarkdown,
          autoResize,
          sendMessage,
          clearChat
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
