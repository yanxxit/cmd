<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📱 手机号生成器</title>
  <style>
    :root {
      --primary: #0ea5e9;
      --primary-dark: #0284c7;
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --bg-input: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --success: #10b981;
      --danger: #ef4444;
      --border: #475569;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, #1e3a5f 50%, var(--bg-dark) 100%);
      min-height: 100vh;
      color: var(--text-primary);
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 30px 20px;
    }

    .header h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .header p {
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    .card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 30px;
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 1.3rem;
      margin-bottom: 20px;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 15px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 14px 24px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(14, 165, 233, 0.4);
    }

    .btn-secondary {
      background: var(--bg-input);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--primary);
    }

    .result-area {
      text-align: center;
      padding: 30px;
    }

    .phone-display {
      font-size: 2rem;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      color: #60a5fa;
      letter-spacing: 2px;
      margin: 20px 0;
      word-break: break-all;
    }

    .phone-info {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .phone-info-item {
      text-align: center;
    }

    .phone-info-item .label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .phone-info-item .value {
      font-size: 1rem;
      color: var(--text-primary);
    }

    .country-flag {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .history-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(14, 165, 233, 0.4);
      transition: all 0.3s;
      z-index: 100;
    }

    .history-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 24px rgba(14, 165, 233, 0.6);
    }

    .history-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 22px;
      height: 22px;
      background: var(--danger);
      border-radius: 50%;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--bg-card);
      border-radius: 16px;
      width: 90%;
      max-width: 600px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      font-size: 1.2rem;
      color: var(--primary);
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-input);
      border: none;
      color: var(--text-primary);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: var(--danger);
    }

    .modal-body {
      padding: 16px 24px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-item {
      background: var(--bg-input);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .history-item:hover {
      border-color: var(--primary);
      transform: translateX(4px);
    }

    .history-item .phone-number {
      font-family: 'Courier New', monospace;
      font-size: 1.2rem;
      font-weight: bold;
      color: #60a5fa;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .history-item .phone-detail {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .history-item .phone-detail span {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .copy-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: var(--success);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.9rem;
      z-index: 300;
      transition: transform 0.3s ease;
    }

    .copy-toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }

    .clear-btn {
      padding: 8px 16px;
      background: var(--danger);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      opacity: 0.8;
    }

    .count-badge {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .hidden { display: none !important; }

    .region-group {
      margin-bottom: 12px;
    }

    .region-group-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 6px;
      padding-left: 4px;
    }

      .phone-display { font-size: 1.3rem; }
      .form-row { grid-template-columns: 1fr; }
      .btn-row { flex-direction: column; }
    }

</head>

      ]}

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function randomDigits(count) {
      let result = '';
      for (let i = 0; i < count; i++) {
        result += randomInt(0, 9);
      }
      return result;
    }

    function updateCarrierSelect() {
      const countryCode = document.getElementById('country').value;
      const carrierSelect = document.getElementById('carrier');
      const country = countries[countryCode];

      carrierSelect.innerHTML = '<option value="">随机</option>';

      if (country && country.carriers) {
        country.carriers.forEach(carrier => {
          carrierSelect.innerHTML += `<option value="${carrier.name}">${carrier.name}</option>`;
        });
      }
    }

    function generatePhoneNumber() {
      const countryCode = document.getElementById('country').value;
      const selectedCarrier = document.getElementById('carrier').value;
      const country = countries[countryCode];

      if (!country) return null;

      let carrier;
      if (selectedCarrier) {
        carrier = country.carriers.find(c => c.name === selectedCarrier) || country.carriers[0];
      } else {
        carrier = country.carriers[randomInt(0, country.carriers.length - 1)];
      }

      const prefix = carrier.prefix[randomInt(0, carrier.prefix.length - 1)];

      let phoneNumber;
      switch (countryCode) {
        case 'CN':
          phoneNumber = prefix + randomDigits(8);
          break;
        case 'HK':
          phoneNumber = prefix + randomDigits(7);
          break;
        case 'MO':
          phoneNumber = prefix + randomDigits(7);
          break;
        case 'TW':
          if (prefix === '09') {
            phoneNumber = prefix + randomDigits(8);
          } else {
            phoneNumber = prefix + randomDigits(6);
          }
          break;
        case 'JP':
          phoneNumber = prefix + randomDigits(8);
          break;
        case 'KR':
          phoneNumber = prefix + randomDigits(8);
          break;
        case 'SG':
          phoneNumber = prefix + randomDigits(7);
          break;
        case 'MY':
          phoneNumber = prefix + randomDigits(8);
          break;
        case 'TH':
          phoneNumber = prefix + randomDigits(7);
          break;
        case 'VN':
          phoneNumber = prefix + randomDigits(7);
          break;
        case 'ID':
          phoneNumber = prefix + randomDigits(8);
          break;
        case 'PH':
          if (prefix === '9') {
            phoneNumber = prefix + randomDigits(9);
          } else {
            phoneNumber = prefix + randomDigits(8);
          }
          break;
        case 'IN':
          phoneNumber = prefix + randomDigits(9);
          break;
        case 'US':
        case 'CA':
          phoneNumber = prefix + randomDigits(7);
          break;
        case 'MX':
          phoneNumber = prefix + randomDigits(9);
          break;
        case 'BR':
          phoneNumber = prefix + randomDigits(9);
          break;
        case 'GB':
          phoneNumber = prefix + randomDigits(8);
          break;
        case 'DE':
          phoneNumber = prefix + randomDigits(8);
          break;
        case 'FR':
          phoneNumber = prefix + randomDigits(8);
          break;
        case 'IT':
          phoneNumber = prefix + randomDigits(9);
          break;
        case 'ES':
          phoneNumber = prefix + randomDigits(8);
          break;
        case 'NL':
          phoneNumber = prefix + randomDigits(8);
          break;
        case 'RU':
          phoneNumber = prefix + randomDigits(8);
          break;
        case 'AU':
          phoneNumber = prefix + randomDigits(8);
          break;
        case 'NZ':
          phoneNumber = prefix + randomDigits(7);
          break;
        default:
          phoneNumber = prefix + randomDigits(8);
      }

      return {
        number: country.code + ' ' + phoneNumber,
        rawNumber: phoneNumber,
        countryCode: country.code,
        countryName: country.name,
        flag: country.flag,
        carrier: carrier.name
      };
    }

    function saveHistory(record) {
      let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      history.unshift(record);
      if (history.length > MAX_HISTORY) {
        history = history.slice(0, MAX_HISTORY);
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
      updateHistoryBadge();
    }

    function getHistory() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    function updateHistoryBadge() {
      const history = getHistory();
      const btn = document.getElementById('historyBtn');
      const badge = document.getElementById('historyBadge');
      if (history.length > 0) {
        btn.style.display = 'block';
        badge.textContent = history.length > 99 ? '99+' : history.length;
      } else {
        btn.style.display = 'none';
      }
    }

    function showResult(record) {
      document.getElementById('resultCard').classList.remove('hidden');
      document.getElementById('countryFlag').textContent = record.flag;
      document.getElementById('phoneDisplay').textContent = record.number;
      document.getElementById('phoneInfo').innerHTML = `
        <div class="phone-info-item">
          <div class="label">国家/地区</div>
          <div class="value">${record.countryName}</div>
        </div>
        <div class="phone-info-item">
          <div class="label">区号</div>
          <div class="value">${record.countryCode}</div>
        </div>
        <div class="phone-info-item">
          <div class="label">运营商</div>
          <div class="value">${record.carrier}</div>
        </div>
      `;
    }

    function generate() {
      const record = generatePhoneNumber();
      if (record) {
        saveHistory(record);
        showResult(record);
      }
    }

    function generateMultiple() {
      for (let i = 0; i < 10; i++) {
        const record = generatePhoneNumber();
        if (record) {
          saveHistory(record);
        }
      }
      const history = getHistory();
      if (history.length > 0) {
        showResult(history[0]);
      }
      showToast('已批量生成 10 个手机号');
    }

    function openHistory() {
      const history = getHistory();
      const list = document.getElementById('historyList');
      const countBadge = document.getElementById('countBadge');

      if (history.length === 0) {
        list.innerHTML = '<div class="empty-state">暂无生成记录</div>';
        countBadge.textContent = '';
      } else {
        list.innerHTML = history.map(item => `
          <div class="history-item" onclick="copyId('${item.number}')">
            <div class="phone-number">${item.flag} ${item.number}</div>
            <div class="phone-detail">
              <span>📍 ${item.countryName}</span>
              <span>📡 ${item.carrier}</span>
            </div>
          </div>
        `).join('');
        countBadge.textContent = `共 ${history.length} 条记录`;
      }

      document.getElementById('modalOverlay').classList.add('active');
    }

    function closeHistory() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    function closeModal(event) {
      if (event.target === document.getElementById('modalOverlay')) {
        closeHistory();
      }
    }

    function clearHistory() {
      if (confirm('确定要清空所有生成记录吗？')) {
        localStorage.removeItem(STORAGE_KEY);
        updateHistoryBadge();
        closeHistory();
        document.getElementById('resultCard').classList.add('hidden');
      }
    }

    async function copyId(phone) {
      try {
        await navigator.clipboard.writeText(phone);
        showToast('已复制到剪贴板');
      } catch (e) {
        const ta = document.createElement('textarea');
        ta.value = phone;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('已复制到剪贴板');
      }
    }

    function showToast(msg) {
      const toast = document.getElementById('copyToast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    document.getElementById('country').addEventListener('change', updateCarrierSelect);

    document.addEventListener('DOMContentLoaded', function() {
      updateCarrierSelect();
      updateHistoryBadge();
    });
  </script>
