<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章阅读页</title>

  <script crossorigin src="/libs/react/umd/react.production.min.js"></script>
  <script crossorigin src="/libs/react-dom/umd/react-dom.production.min.js"></script>
  <script src="/libs/dayjs/dayjs.min.js"></script>
  <script src="/libs/dayjs/locale/zh-cn.js"></script>
  <script src="/libs/antd/dist/antd.min.js"></script>

  <script>
    window.__TCM_ARTICLE_VIEW_BOOTSTRAP__ = {
      buildVersion: window.__APP_BUILD_VERSION__ || '__BUILD_VERSION__',
      devFlags: ['dev', 'nocache'],
      styles: ['./css/base.css', './css/article-view.css'],
    };
  </script>

  <script type="importmap">
  {
    "imports": {
      "@core": "./js/lib/core.js"
    }
  }
  </script>

  <script type="module">
    import { initCore, injectCSS, loadJS } from '@core';

    const bootstrapConfig = window.__TCM_ARTICLE_VIEW_BOOTSTRAP__ || {};
    initCore(bootstrapConfig);
    injectCSS(bootstrapConfig.styles || []);

    const bootstrap = await loadJS('./js/article-view.bootstrap.js');
    await bootstrap.startArticleViewApp();
  </script>
</head>
<body>
  <div id="article-root"></div>
</body>
</html>
