<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试案例记录系统</title>

  <!-- React & ReactDOM (本地 libs，UMD 全局变量) -->
  <script crossorigin src="/libs/react/umd/react.production.min.js"></script>
  <script crossorigin src="/libs/react-dom/umd/react-dom.production.min.js"></script>

  <!-- Day.js (本地 libs，需在 antd 之前加载) -->
  <script src="/libs/dayjs/dayjs.min.js"></script>
  <script src="/libs/dayjs/locale/zh-cn.js"></script>

  <!-- Ant Design v5 (本地 libs) -->
  <script src="/libs/antd/dist/antd.min.js"></script>

  <!-- Lucide Icons (外部 CDN，libs 未包含) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- ===== 原生 ESM 模块系统（参考 native-esm-importmaps skill） ===== -->
  <!-- 1. 页面引导配置：由 js/lib/core.js 统一处理版本号、资源 URL 与样式注入 -->
  <script>
    window.__TCM_BOOTSTRAP__ = {
      buildVersion: window.__APP_BUILD_VERSION__ || '__BUILD_VERSION__',
      devFlags: ['dev', 'nocache'],
      styles: ['./css/base.css', './css/index.css'],
    };
  </script>

  <!-- 2. ImportMaps：仅声明用于 IDE/类型可读，本地模块加载使用直接路径 + 版本号 -->
  <script type="importmap">
  {
    "imports": {
      "@core":         "./js/lib/core.js",
      "@api":          "./js/api.js",
      "@icons":        "./js/icons.js",
      "@format":       "./js/format.js"
    }
  }
  </script>

  <!-- 3. 引导：通过 js/lib/core.js 统一初始化，再加载 js/bootstrap.js 直接启动页面 -->
  <script type="module">
    import { initCore, injectCSS, loadJS } from '@core';

    const bootstrapConfig = window.__TCM_BOOTSTRAP__ || {};
    initCore(bootstrapConfig);
    injectCSS(bootstrapConfig.styles || []);

    if (typeof antd === 'undefined') {
      console.error('❌ Ant Design 未加载成功，请检查网络连接');
      document.body.innerHTML = `
        <div style="padding: 50px; text-align: center; font-family: sans-serif;">
          <h1 style="color: #ff4d4f;">❌ 资源加载失败</h1>
          <p>Ant Design 组件库未加载，请检查网络连接后刷新页面</p>
          <button onclick="window.location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #1890ff; color: white; border: none; border-radius: 4px; cursor: pointer;">刷新页面</button>
        </div>
      `;
      throw new Error('antd is not defined');
    }

    const bootstrap = await loadJS('./js/bootstrap.js');
    await bootstrap.startApp();
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
