<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试案例记录系统</title>
  
  <!-- React & ReactDOM (本地 libs，UMD 全局变量) -->
  <script crossorigin src="/libs/react/umd/react.production.min.js"></script>
  <script crossorigin src="/libs/react-dom/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX (本地 libs) -->
  <script src="/libs/@babel/standalone/babel.min.js"></script>
  
  <!-- Day.js (本地 libs，需在 antd 之前加载) -->
  <script src="/libs/dayjs/dayjs.min.js"></script>
  <script src="/libs/dayjs/locale/zh-cn.js"></script>
  
  <!-- Ant Design v5 (本地 libs) -->
  <script src="/libs/antd/dist/antd.min.js"></script>
  
  <!-- Lucide Icons (外部 CDN，libs 未包含) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- ===== 原生 ESM 模块系统 ===== -->
  <!-- 1. 全局版本号 + 资源 URL 工具：必须最先执行，并同步注入基础样式（避免 FOUC） -->
  <script>
    const G_VER = Date.now();
    window.G_VER = G_VER;
    window.getModuleUrl = (path) => `${path}?v=${G_VER}`;
    window.getAssetUrl  = (path) => `${path}?v=${G_VER}`;

    (function injectBaseStyles() {
      ['./css/base.css', './css/index.css'].forEach((href) => {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = window.getAssetUrl(href);
        document.head.appendChild(link);
      });
    })();
  </script>

  <!-- 2. ImportMaps：仅声明用于 IDE/类型可读，本地模块加载使用直接路径 + 版本号 -->
  <script type="importmap">
  {
    "imports": {
      "@api":          "./js/api.js",
      "@icons":        "./js/icons.js",
      "@format":       "./js/format.js",
      "@style-loader": "./js/style-loader.js"
    }
  }
  </script>

  <!-- 3. 引导：动态 import 直接路径 + ?v=G_VER 防缓存，挂载到 window.__APP__ -->
  <script type="module">
    const get = (path) => `${path}?v=${window.G_VER}`;
    const [apiMod, iconsMod, formatMod, styleMod] = await Promise.all([
      import(get('./js/api.js')),
      import(get('./js/icons.js')),
      import(get('./js/format.js')),
      import(get('./js/style-loader.js')),
    ]);
    window.__APP__ = {
      api: apiMod.api,
      icons: iconsMod,
      format: formatMod,
      style: styleMod,
    };
    window.dispatchEvent(new CustomEvent('esm-ready'));
  </script>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    // 检查 antd 是否加载成功
    if (typeof antd === 'undefined') {
      console.error('❌ Ant Design 未加载成功，请检查网络连接');
      document.body.innerHTML = `
        <div style="padding: 50px; text-align: center; font-family: sans-serif;">
          <h1 style="color: #ff4d4f;">❌ 资源加载失败</h1>
          <p>Ant Design 组件库未加载，请检查网络连接后刷新页面</p>
          <button onclick="window.location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #1890ff; color: white; border: none; border-radius: 4px; cursor: pointer;">刷新页面</button>
        </div>
      `;
      throw new Error('antd is not defined');
    }

    // 等待 ESM 业务模块就绪后再启动应用
    (async () => {
      if (!window.__APP__) {
        await new Promise((resolve) => {
          window.addEventListener('esm-ready', resolve, { once: true });
        });
      }
      bootstrap();
    })();

    function bootstrap() {
    
    const { useState, useEffect, useCallback } = React;
    const { 
      Layout, Menu, Breadcrumb, Table, Button, Input, Select, 
      Space, Modal, Form, InputNumber, message, Tag, Popconfirm,
      Statistic, Card, Row, Col, Divider, Tabs, Descriptions,
      Tooltip, Badge
    } = antd;
    const { Search } = Input;
    const { Option } = Select;
    const { Header, Content, Sider } = Layout;

    // API 工具函数（来自 ESM 模块 @api）
    const api = window.__APP__.api;
    // 图标工具（来自 ESM 模块 @icons）
    const { ICON_EMOJI_MAP, ICON_OPTIONS, renderIcon: renderIconFn } = window.__APP__.icons;

    // 集合列表组件
    function CollectionList({ onSelectCollection, selectedCollectionId }) {
      const [collections, setCollections] = useState([]);
      const [loading, setLoading] = useState(false);
      const [showCreateModal, setShowCreateModal] = useState(false);
      const [form] = Form.useForm();

      const loadCollections = async () => {
        setLoading(true);
        try {
          const data = await api.get('/api/test-case-collections/all');
          setCollections(data);
        } catch (err) {
          message.error('加载集合列表失败：' + err.message);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        loadCollections();
      }, []);

      const handleCreate = async (values) => {
        try {
          await api.post('/api/test-case-collections', values);
          message.success('集合创建成功');
          setShowCreateModal(false);
          form.resetFields();
          loadCollections();
        } catch (err) {
          message.error('创建失败：' + err.message);
        }
      };

      return (
        <div style={{ padding: '16px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
            <h3 style={{ margin: 0 }}>测试集合</h3>
            <Button type="primary" size="small" onClick={() => setShowCreateModal(true)}>
              新建集合
            </Button>
          </div>
          
          <div style={{ marginBottom: '8px' }}>
            <Button 
              block 
              type={!selectedCollectionId ? 'primary' : 'default'}
              onClick={() => onSelectCollection(null)}
            >
              全部案例
            </Button>
          </div>
          
          {collections.map(collection => (
            <div key={collection._id} style={{ marginBottom: '8px' }}>
              <Button 
                block 
                type={selectedCollectionId === collection._id ? 'primary' : 'default'}
                onClick={() => onSelectCollection(collection._id)}
                icon={<i data-lucide="folder" style={{ fontSize: '14px' }}></i>}
              >
                {collection.name} ({collection.caseCount})
              </Button>
            </div>
          ))}
          
          <Modal
            title="新建测试集合"
            open={showCreateModal}
            onCancel={() => {
              setShowCreateModal(false);
              form.resetFields();
            }}
            onOk={() => form.submit()}
          >
            <Form form={form} layout="vertical" onFinish={handleCreate}>
              <Form.Item
                name="name"
                label="集合名称"
                rules={[{ required: true, message: '请输入集合名称' }]}
              >
                <Input placeholder="例如：API 接口测试" />
              </Form.Item>
              <Form.Item
                name="description"
                label="集合描述"
              >
                <Input.TextArea placeholder="描述这个集合的用途..." rows={3} />
              </Form.Item>
            </Form>
          </Modal>
        </div>
      );
    }

    // 测试案例列表组件
    function TestCaseList({ collectionId }) {
      const [testCases, setTestCases] = useState([]);
      const [loading, setLoading] = useState(false);
      const [pagination, setPagination] = useState({ current: 1, pageSize: 20, total: 0 });
      const [filters, setFilters] = useState({ search: '', apiName: '', tags: '', collectionId: '' });
      const [apiNames, setApiNames] = useState([]);
      const [tags, setTags] = useState([]);
      const [collections, setCollections] = useState([]);
      const [showCreateModal, setShowCreateModal] = useState(false);
      const [editingCase, setEditingCase] = useState(null);
      const [form] = Form.useForm();

      const loadData = async (page = 1, pageSize = 20) => {
        setLoading(true);
        try {
          const params = new URLSearchParams();
          params.append('page', String(page));
          params.append('limit', String(pageSize));

          // 仅追加非空过滤条件，避免 undefined/null 被序列化为 "undefined"
          Object.entries(filters || {}).forEach(([k, v]) => {
            if (k === 'collectionId') return; // collectionId 单独处理
            if (v !== undefined && v !== null && v !== '') {
              params.append(k, String(v));
            }
          });

          // collectionId 优先使用 prop（集合详情视图），否则使用筛选条件
          const effectiveCollectionId = collectionId || filters.collectionId;
          if (effectiveCollectionId) {
            params.append('collectionId', effectiveCollectionId);
          }
          
          // 直接获取完整响应（含 pagination）
          const response = await fetch(`/api/test-cases?${params}`);
          const result = await response.json();
          if (!result.success) {
            throw new Error(result.error || '请求失败');
          }
          
          setTestCases(result.data || []);
          const pg = result.pagination || {};
          setPagination({
            current: pg.page || 1,
            pageSize: pg.limit || pageSize,
            total: pg.total || 0
          });
        } catch (err) {
          message.error('加载数据失败：' + err.message);
        } finally {
          setLoading(false);
        }
      };

      const loadApiNames = async () => {
        try {
          const data = await api.get('/api/test-cases/api-names');
          setApiNames(data);
        } catch (err) {
          console.error('加载接口名失败:', err);
        }
      };

      const loadTags = async () => {
        try {
          const data = await api.get('/api/test-cases/tags');
          setTags(data);
        } catch (err) {
          console.error('加载标签失败:', err);
        }
      };

      const loadCollections = async () => {
        try {
          const data = await api.get('/api/test-case-collections/all');
          setCollections(data || []);
        } catch (err) {
          console.error('加载集合失败:', err);
        }
      };

      useEffect(() => {
        loadData();
        loadApiNames();
        loadTags();
        loadCollections();
      }, [collectionId, filters]);

      const handleTableChange = (pag) => {
        loadData(pag.current, pag.pageSize);
      };

      const handleCreate = async (values) => {
        try {
          // 转换 JSON 字符串
          if (values.requestParamsText) {
            try {
              values.requestParams = JSON.parse(values.requestParamsText);
            } catch (e) {
              values.requestParams = values.requestParamsText;
            }
          }
          if (values.responseDataText) {
            try {
              values.responseData = JSON.parse(values.responseDataText);
            } catch (e) {
              values.responseData = values.responseDataText;
            }
          }
          
          if (collectionId) {
            values.collectionId = collectionId;
          } else if (!editingCase) {
            // 未选择集合且为新建时，归入默认集合
            try {
              const allCols = await api.get('/api/test-case-collections/all');
              const defaultCol = (allCols || []).find(c => c.name === '默认集合');
              if (defaultCol) {
                values.collectionId = defaultCol._id;
              }
            } catch (e) {
              console.warn('获取默认集合失败：', e);
            }
          }
          
          if (editingCase) {
            await api.put(`/api/test-cases/${editingCase._id}`, values);
            message.success('案例已更新');
          } else {
            await api.post('/api/test-cases', values);
            message.success('案例已创建');
          }
          
          setShowCreateModal(false);
          setEditingCase(null);
          form.resetFields();
          loadData(pagination.current, pagination.pageSize);
          // 标签可能新增，刷新候选列表
          loadTags();
        } catch (err) {
          message.error('操作失败：' + err.message);
        }
      };

      const handleEdit = (record) => {
        setEditingCase(record);
        form.setFieldsValue({
          ...record,
          requestParamsText: JSON.stringify(record.requestParams, null, 2),
          responseDataText: JSON.stringify(record.responseData, null, 2)
        });
        setShowCreateModal(true);
      };

      const handleDelete = async (id) => {
        try {
          await api.delete(`/api/test-cases/${id}`);
          message.success('案例已删除');
          loadData(pagination.current, pagination.pageSize);
        } catch (err) {
          message.error('删除失败：' + err.message);
        }
      };

      const collectionMap = React.useMemo(() => {
        const map = {};
        (collections || []).forEach(c => { map[c._id] = c; });
        return map;
      }, [collections]);

      // 集合图标 emoji 映射来自 ESM 模块 @icons
      const iconEmojiMap = ICON_EMOJI_MAP;

      const columns = [
        {
          title: '接口名称',
          dataIndex: 'apiName',
          key: 'apiName',
          width: 200,
          render: (text) => <span style={{ color: '#1890ff', fontWeight: 500 }}>{text}</span>
        },
        {
          title: '案例标题',
          dataIndex: 'title',
          key: 'title',
          width: 220,
          render: (text) => <span style={{ color: '#1890ff' }}>{text}</span>
        },
        {
          title: '标签',
          dataIndex: 'tags',
          key: 'tags',
          width: 200,
          render: (tags) => (
            <Space>
              {(tags || []).slice(0, 3).map(tag => (
                <Tag color="blue" key={tag}>{tag}</Tag>
              ))}
              {(tags || []).length > 3 && (
                <Tag color="default">+{(tags || []).length - 3}</Tag>
              )}
            </Space>
          )
        },
        // 在集合详情视图（已按集合过滤）不显示该列；否则显示所属集合
        ...(!collectionId ? [{
          title: '所属集合',
          dataIndex: 'collectionId',
          key: 'collectionId',
          width: 160,
          render: (cid) => {
            if (!cid) return <span style={{ color: '#bfbfbf' }}>-</span>;
            const col = collectionMap[cid];
            if (!col) return <span style={{ color: '#bfbfbf' }}>-</span>;
            return (
              <Tag color="geekblue">
                <span style={{ marginRight: 4 }}>{iconEmojiMap[col.icon] || '📁'}</span>
                {col.name}
              </Tag>
            );
          }
        }] : []),
        {
          title: '子案例',
          dataIndex: 'subCases',
          key: 'subCases',
          width: 90,
          render: (subCases) => {
            const count = Array.isArray(subCases) ? subCases.length : 0;
            return <Tag color={count > 0 ? 'green' : 'default'}>{count}</Tag>;
          }
        },
        {
          title: '创建时间',
          dataIndex: 'createdAt',
          key: 'createdAt',
          width: 170,
          render: (text) => dayjs(text).format('YYYY-MM-DD HH:mm')
        },
        {
          title: '操作',
          key: 'action',
          width: 220,
          render: (_, record) => (
            <Space>
              <Button
                type="link"
                size="small"
                onClick={() => window.open(`/test-case-manager/sub-cases.html?caseId=${encodeURIComponent(record._id)}`, '_blank')}
              >
                子案例
              </Button>
              <Button type="link" size="small" onClick={() => handleEdit(record)}>编辑</Button>
              <Popconfirm
                title="确定要删除这个案例吗？"
                onConfirm={() => handleDelete(record._id)}
                okText="确定"
                cancelText="取消"
              >
                <Button type="link" size="small" danger>删除</Button>
              </Popconfirm>
            </Space>
          )
        }
      ];

      return (
        <div>
          <div className="filter-section">
            <Row gutter={16}>
              <Col flex="300px">
                <Search
                  placeholder="搜索接口名、案例标题"
                  value={filters.search}
                  onChange={(e) => setFilters({ ...filters, search: e.target.value })}
                  onSearch={() => loadData()}
                  allowClear
                />
              </Col>
              <Col flex="200px">
                <Select
                  placeholder="接口名"
                  style={{ width: '100%' }}
                  value={filters.apiName || undefined}
                  onChange={(value) => setFilters({ ...filters, apiName: value })}
                  allowClear
                >
                  {apiNames.map(name => (
                    <Option key={name} value={name}>{name}</Option>
                  ))}
                </Select>
              </Col>
              <Col flex="200px">
                <Select
                  placeholder="标签"
                  style={{ width: '100%' }}
                  value={filters.tags || undefined}
                  onChange={(value) => setFilters({ ...filters, tags: value })}
                  allowClear
                >
                  {tags.map(tag => (
                    <Option key={tag} value={tag}>{tag}</Option>
                  ))}
                </Select>
              </Col>
              {!collectionId && (
                <Col flex="220px">
                  <Select
                    placeholder="所属集合"
                    style={{ width: '100%' }}
                    value={filters.collectionId || undefined}
                    onChange={(value) => setFilters({ ...filters, collectionId: value || '' })}
                    allowClear
                    showSearch
                    optionFilterProp="children"
                  >
                    {collections.map(col => (
                      <Option key={col._id} value={col._id}>
                        {(iconEmojiMap[col.icon] || '📁') + ' ' + col.name}
                      </Option>
                    ))}
                  </Select>
                </Col>
              )}
              <Col flex="auto">
                <Button type="primary" onClick={() => {
                  setEditingCase(null);
                  form.resetFields();
                  setShowCreateModal(true);
                }}>
                  新建案例
                </Button>
              </Col>
            </Row>
          </div>

          <div className="table-container">
            <Table
              columns={columns}
              dataSource={testCases}
              loading={loading}
              pagination={pagination}
              onChange={handleTableChange}
              rowKey="_id"
            />
          </div>

          <Modal
            title={editingCase ? '编辑测试案例' : '新建测试案例'}
            open={showCreateModal}
            onCancel={() => {
              setShowCreateModal(false);
              setEditingCase(null);
              form.resetFields();
            }}
            onOk={() => form.submit()}
            width={800}
          >
            <Form form={form} layout="vertical" onFinish={handleCreate}>
              <Row gutter={16}>
                <Col span={12}>
                  <Form.Item
                    name="apiName"
                    label="接口名称"
                    rules={[{ required: true, message: '请输入接口名称' }]}
                  >
                    <Input placeholder="例如：/api/users" />
                  </Form.Item>
                </Col>
                <Col span={12}>
                  <Form.Item
                    name="title"
                    label="案例标题"
                    rules={[{ required: true, message: '请输入案例标题' }]}
                  >
                    <Input placeholder="例如：查询用户列表 - 正常场景" />
                  </Form.Item>
                </Col>
              </Row>
              
              <Form.Item
                name="requestParamsText"
                label="请求参数 (JSON)"
                tooltip="支持粘贴 JSON 字符串"
              >
                <Input.TextArea
                  rows={6}
                  className="json-editor"
                  placeholder='{"key": "value"}'
                />
              </Form.Item>
              
              <Form.Item
                name="responseDataText"
                label="返回数据 (JSON)"
                tooltip="支持粘贴 JSON 字符串"
              >
                <Input.TextArea
                  rows={6}
                  className="json-editor"
                  placeholder='{"code": 200, "data": {}}'
                />
              </Form.Item>
              
              <Form.Item name="tags" label="标签" tooltip="可选择已有标签或输入新标签后回车创建">
                <Select
                  mode="tags"
                  style={{ width: '100%' }}
                  placeholder="选择或输入新标签，回车确认"
                  tokenSeparators={[',', ' ']}
                  allowClear
                >
                  {tags.map(tag => (
                    <Option key={tag} value={tag}>{tag}</Option>
                  ))}
                </Select>
              </Form.Item>

              <Form.Item name="remark" label="备注">
                <Input.TextArea autoSize={{ minRows: 3, maxRows: 10 }} placeholder="补充说明..." />
              </Form.Item>
            </Form>
          </Modal>
        </div>
      );
    }

    // 统计面板组件
    function StatsPanel() {
      const [stats, setStats] = useState({ total: 0, byApiName: {}, byTags: {} });
      const [collectionStats, setCollectionStats] = useState({ totalCollections: 0, totalCases: 0 });

      const loadStats = async () => {
        try {
          const [testCaseStats, collectionData] = await Promise.all([
            api.get('/api/test-cases/stats'),
            api.get('/api/test-case-collections/stats')
          ]);
          setStats(testCaseStats);
          setCollectionStats(collectionData);
        } catch (err) {
          console.error('加载统计失败:', err);
        }
      };

      useEffect(() => {
        loadStats();
      }, []);

      return (
        <Row gutter={16} style={{ marginBottom: '24px' }}>
          <Col span={6}>
            <Card>
              <Statistic 
                title="总案例数" 
                value={stats.total} 
                valueStyle={{ color: '#1890ff' }}
                prefix={<i data-lucide="file-text"></i>}
              />
            </Card>
          </Col>
          <Col span={6}>
            <Card>
              <Statistic 
                title="集合数" 
                value={collectionStats.totalCollections} 
                valueStyle={{ color: '#722ed1' }}
                prefix={<i data-lucide="folder"></i>}
              />
            </Card>
          </Col>
          <Col span={6}>
            <Card>
              <Statistic 
                title="接口数" 
                value={Object.keys(stats.byApiName || {}).length} 
                valueStyle={{ color: '#52c41a' }}
                prefix={<i data-lucide="layers"></i>}
              />
            </Card>
          </Col>
          <Col span={6}>
            <Card>
              <Statistic 
                title="标签数" 
                value={Object.keys(stats.byTags || {}).length} 
                valueStyle={{ color: '#fa8c16' }}
                prefix={<i data-lucide="tags"></i>}
              />
            </Card>
          </Col>
        </Row>
      );
    }

    // 集合管理组件（创建、列表、详情）
    function CollectionManager() {
      const [collections, setCollections] = useState([]);
      const [loading, setLoading] = useState(false);
      const [showModal, setShowModal] = useState(false);
      const [editing, setEditing] = useState(null);
      const [viewingCollection, setViewingCollection] = useState(null);
      const [form] = Form.useForm();

      // 可选 icon 列表（来自 antd 内置图标，使用 data-lucide 兼容渲染）
      // 图标候选与映射来自 ESM 模块 @icons
      const iconOptions = ICON_OPTIONS;
      const iconEmojiMap = ICON_EMOJI_MAP;
      const renderIcon = renderIconFn;

      const loadCollections = async () => {
        setLoading(true);
        try {
          const data = await api.get('/api/test-case-collections/all');
          setCollections(data || []);
        } catch (err) {
          message.error('加载集合列表失败：' + err.message);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        loadCollections();
      }, []);

      const handleSubmit = async (values) => {
        try {
          if (editing) {
            await api.put(`/api/test-case-collections/${editing._id}`, values);
            message.success('集合已更新');
          } else {
            await api.post('/api/test-case-collections', values);
            message.success('集合创建成功');
          }
          setShowModal(false);
          setEditing(null);
          form.resetFields();
          loadCollections();
        } catch (err) {
          message.error('操作失败：' + err.message);
        }
      };

      const handleEdit = (collection) => {
        setEditing(collection);
        form.setFieldsValue({
          name: collection.name,
          description: collection.description,
          icon: collection.icon || 'FolderOpenOutlined'
        });
        setShowModal(true);
      };

      const handleDelete = async (collection) => {
        try {
          await api.delete(`/api/test-case-collections/${collection._id}`);
          message.success('集合已删除');
          loadCollections();
        } catch (err) {
          message.error('删除失败：' + err.message);
        }
      };

      // 详情视图：展示该集合下的案例列表
      if (viewingCollection) {
        return (
          <div>
            <div style={{ marginBottom: 16, display: 'flex', alignItems: 'center', gap: 12 }}>
              <Button onClick={() => setViewingCollection(null)}>← 返回集合列表</Button>
              <span style={{ fontSize: 28 }}>{renderIcon(viewingCollection.icon)}</span>
              <div>
                <div style={{ fontSize: 18, fontWeight: 600 }}>{viewingCollection.name}</div>
                <div style={{ color: '#8c8c8c', fontSize: 12 }}>
                  {viewingCollection.description || '暂无描述'}
                </div>
              </div>
            </div>
            <TestCaseList collectionId={viewingCollection._id} />
          </div>
        );
      }

      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
            <div>
              <h2 style={{ margin: 0 }}>测试案例集合</h2>
              <div style={{ color: '#8c8c8c', fontSize: 12, marginTop: 4 }}>
                共 {collections.length} 个集合
              </div>
            </div>
            <Button
              type="primary"
              onClick={() => {
                setEditing(null);
                form.resetFields();
                form.setFieldsValue({ icon: 'FolderOpenOutlined' });
                setShowModal(true);
              }}
            >
              新建集合
            </Button>
          </div>

          <Row gutter={[16, 16]}>
            {collections.map(collection => {
              const isDefault = collection.name === '默认集合';
              return (
                <Col xs={24} sm={12} md={8} lg={6} key={collection._id}>
                  <Card
                    hoverable
                    loading={loading}
                    onClick={() => setViewingCollection(collection)}
                    style={{ height: '100%' }}
                    actions={[
                      <Button
                        type="link"
                        size="small"
                        onClick={(e) => { e.stopPropagation(); setViewingCollection(collection); }}
                      >
                        查看
                      </Button>,
                      <Button
                        type="link"
                        size="small"
                        onClick={(e) => { e.stopPropagation(); handleEdit(collection); }}
                      >
                        编辑
                      </Button>,
                      isDefault ? (
                        <Tooltip title="默认集合不可删除">
                          <Button type="link" size="small" disabled>删除</Button>
                        </Tooltip>
                      ) : (
                        <Popconfirm
                          title="确定删除此集合？"
                          description="该集合下的案例不会被删除，可在「全部案例」中找回"
                          okText="确定"
                          cancelText="取消"
                          onConfirm={(e) => { e?.stopPropagation?.(); handleDelete(collection); }}
                          onCancel={(e) => e?.stopPropagation?.()}
                        >
                          <Button
                            type="link"
                            size="small"
                            danger
                            onClick={(e) => e.stopPropagation()}
                          >
                            删除
                          </Button>
                        </Popconfirm>
                      )
                    ]}
                  >
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
                      <div style={{
                        fontSize: 36,
                        width: 56,
                        height: 56,
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        background: '#f0f5ff',
                        borderRadius: 8,
                        flexShrink: 0
                      }}>
                        {renderIcon(collection.icon)}
                      </div>
                      <div style={{ flex: 1, overflow: 'hidden' }}>
                        <div style={{
                          fontSize: 16,
                          fontWeight: 600,
                          display: 'flex',
                          alignItems: 'center',
                          gap: 6
                        }}>
                          <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                            {collection.name}
                          </span>
                          {isDefault && <Tag color="blue" style={{ marginLeft: 0 }}>默认</Tag>}
                        </div>
                        <div style={{ color: '#8c8c8c', fontSize: 12, marginTop: 2 }}>
                          {collection.caseCount || 0} 个案例
                        </div>
                      </div>
                    </div>
                    <div style={{
                      color: '#595959',
                      fontSize: 12,
                      minHeight: 36,
                      maxHeight: 36,
                      overflow: 'hidden',
                      textOverflow: 'ellipsis',
                      display: '-webkit-box',
                      WebkitLineClamp: 2,
                      WebkitBoxOrient: 'vertical'
                    }}>
                      {collection.description || '暂无描述'}
                    </div>
                    <div style={{ color: '#bfbfbf', fontSize: 11, marginTop: 8 }}>
                      创建于 {dayjs(collection.createdAt).format('YYYY-MM-DD')}
                    </div>
                  </Card>
                </Col>
              );
            })}
          </Row>

          <Modal
            title={editing ? '编辑集合' : '新建集合'}
            open={showModal}
            onCancel={() => {
              setShowModal(false);
              setEditing(null);
              form.resetFields();
            }}
            onOk={() => form.submit()}
            destroyOnClose
            width={520}
          >
            <Form form={form} layout="vertical" onFinish={handleSubmit}>
              <Form.Item
                name="name"
                label="集合名称"
                rules={[{ required: true, message: '请输入集合名称' }]}
              >
                <Input
                  placeholder="例如：用户中心 API 测试"
                  disabled={editing && editing.name === '默认集合'}
                />
              </Form.Item>
              <Form.Item name="description" label="集合描述">
                <Input.TextArea
                  autoSize={{ minRows: 3, maxRows: 6 }}
                  placeholder="描述这个集合的用途..."
                />
              </Form.Item>
              <Form.Item name="icon" label="图标" initialValue="FolderOpenOutlined">
                <Select>
                  {iconOptions.map(opt => (
                    <Option key={opt.value} value={opt.value}>{opt.label}</Option>
                  ))}
                </Select>
              </Form.Item>
            </Form>
          </Modal>
        </div>
      );
    }

    // 主应用组件
    function App() {
      const [activeMenu, setActiveMenu] = useState('cases');
      const [selectedCollectionId, setSelectedCollectionId] = useState(null);

      const renderContent = () => {
        switch (activeMenu) {
          case 'cases':
            return (
              <>
                <StatsPanel />
                <TestCaseList collectionId={selectedCollectionId} />
              </>
            );
          case 'collections':
            return <CollectionManager />;
          default:
            return null;
        }
      };

      return (
        <Layout className="app-container">
          <Sider className="sidebar" theme="light" style={{ background: '#001529' }}>
            <div className="logo">
              <div className="logo-icon">
                <i data-lucide="square-check" style={{ color: '#fff', width: '24px', height: '24px' }}></i>
              </div>
              测试案例管理系统
            </div>
            <div className="menu">
              <div 
                className={`menu-item ${activeMenu === 'cases' ? 'active' : ''}`}
                onClick={() => setActiveMenu('cases')}
              >
                <i data-lucide="list" className="menu-item-icon"></i>
                全部案例
              </div>
              <div 
                className={`menu-item ${activeMenu === 'collections' ? 'active' : ''}`}
                onClick={() => setActiveMenu('collections')}
              >
                <i data-lucide="folder" className="menu-item-icon"></i>
                集合管理
              </div>
            </div>
          </Sider>
          <Layout>
            <Header className="header">
              <Breadcrumb className="breadcrumb">
                <Breadcrumb.Item>测试案例管理</Breadcrumb.Item>
                <Breadcrumb.Item>{activeMenu === 'cases' ? '全部案例' : '集合管理'}</Breadcrumb.Item>
              </Breadcrumb>
              <Space>
                <Tooltip title="刷新">
                  <Button 
                    type="text" 
                    icon={<i data-lucide="refresh-cw"></i>}
                    onClick={() => window.location.reload()}
                  />
                </Tooltip>
              </Space>
            </Header>
            <Content className="content">
              {renderContent()}
            </Content>
          </Layout>
        </Layout>
      );
    }

    // 渲染应用
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    // 初始化 Lucide 图标
    setTimeout(() => {
      lucide.createIcons();
    }, 100);

    } // bootstrap end
  </script>
</body>
</html>
