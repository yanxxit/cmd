<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👤 名字生成器</title>
  <style>
    :root {
      --primary: #0ea5e9;
      --primary-dark: #0284c7;
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --bg-input: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --success: #10b981;
      --danger: #ef4444;
      --border: #475569;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, #1e3a5f 50%, var(--bg-dark) 100%);
      min-height: 100vh; color: var(--text-primary); padding: 20px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 30px; padding: 30px 20px; }
    .header h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px;
    }
    .header p { color: var(--text-secondary); font-size: 1.1rem; }
    .card {
      background: var(--bg-card); border-radius: 16px; padding: 30px;
      border: 1px solid var(--border); margin-bottom: 20px;
    }
    .card-title { font-size: 1.3rem; margin-bottom: 20px; color: var(--primary); display: flex; align-items: center; gap: 10px; }
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 0.9rem; }
    .form-group input, .form-group select {
      width: 100%; padding: 12px 16px; background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-primary); font-size: 1rem;
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
    .btn-row { display: flex; gap: 12px; margin-top: 20px; }
    .btn {
      flex: 1; padding: 14px 24px; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: all 0.3s;
    }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(14, 165, 233, 0.4); }
    .btn-secondary { background: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--primary); }
    .result-area { text-align: center; padding: 30px; }
    .name-display { font-size: 2.2rem; font-weight: bold; color: #60a5fa; margin: 20px 0; }
    .name-info { display: flex; justify-content: center; gap: 30px; margin-top: 15px; flex-wrap: wrap; }
    .name-info-item { text-align: center; }
    .name-info-item .label { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 4px; }
    .name-info-item .value { font-size: 1rem; color: var(--text-primary); }
    .country-flag { font-size: 2.5rem; margin-bottom: 10px; }
    .history-btn {
      position: fixed; bottom: 30px; right: 30px; width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; color: white;
      font-size: 24px; cursor: pointer; box-shadow: 0 4px 16px rgba(14, 165, 233, 0.4); transition: all 0.3s; z-index: 100;
    }
    .history-btn:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(14, 165, 233, 0.6); }
    .history-badge {
      position: absolute; top: -4px; right: -4px; width: 22px; height: 22px; background: var(--danger);
      border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center;
    }
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.6); z-index: 200; justify-content: center; align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--bg-card); border-radius: 16px; width: 90%; max-width: 600px;
      max-height: 80vh; display: flex; flex-direction: column; border: 1px solid var(--border);
    }
    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .modal-header h3 { font-size: 1.2rem; color: var(--primary); }
    .modal-close {
      width: 32px; height: 32px; border-radius: 50%; background: var(--bg-input); border: none;
      color: var(--text-primary); font-size: 18px; cursor: pointer; transition: all 0.2s;
    }
    .modal-close:hover { background: var(--danger); }
    .modal-body { padding: 16px 24px; overflow-y: auto; flex: 1; }
    .modal-footer {
      padding: 16px 24px; border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .history-item {
      background: var(--bg-input); border-radius: 10px; padding: 16px; margin-bottom: 12px;
      cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
    }
    .history-item:hover { border-color: var(--primary); transform: translateX(4px); }
    .history-item .name-value {
      font-size: 1.3rem; font-weight: bold; color: #60a5fa; margin-bottom: 8px;
    }
    .history-item .name-detail { display: flex; gap: 15px; flex-wrap: wrap; }
    .history-item .name-detail span { font-size: 0.85rem; color: var(--text-secondary); }
    .copy-toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
      background: var(--success); color: white; padding: 12px 24px; border-radius: 8px;
      font-size: 0.9rem; z-index: 300; transition: transform 0.3s ease;
    }
    .copy-toast.show { transform: translateX(-50%) translateY(0); }
    .empty-state { text-align: center; padding: 40px; color: var(--text-secondary); }
    .clear-btn {
      padding: 8px 16px; background: var(--danger); color: white; border: none;
      border-radius: 6px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
    }
    .clear-btn:hover { opacity: 0.8; }
    .count-badge { font-size: 0.85rem; color: var(--text-secondary); }
    .hidden { display: none !important; }
    @media (max-width: 600px) {
      .header h1 { font-size: 1.8rem; }
      .name-display { font-size: 1.5rem; }
      .form-row { grid-template-columns: 1fr; }
      .btn-row { flex-direction: column; }
    }
  </style>
</head>

            </optgroup>

              <option value="FR">🇫🇷 法国</option>

        </div>
        <div class="form-group">
          <label>性别</label>
          <select id="gender">
            <option value="">随机</option>
            <option value="male">男</option>
            <option value="female">女</option>
          </select>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="generate()">🎲 生成名字</button>
        <button class="btn btn-secondary" onclick="generateMultiple()">📋 批量生成 (10个)</button>
      </div>
    </div>

    <div class="card hidden" id="resultCard">
      <h2 class="card-title">👤 生成结果</h2>
      <div class="result-area">
        <div class="country-flag" id="countryFlag"></div>
        <div class="name-display" id="nameDisplay"></div>
        <div class="name-info" id="nameInfo"></div>
      </div>
    </div>

    </button>
  </div>

    function randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function randomPick(arr) { return arr[randomInt(0, arr.length - 1)]; }

    function generateName() {
      const countryCode = document.getElementById('country').value;
      const selectedGender = document.getElementById('gender').value;
      const country = nameData[countryCode];

      let gender = selectedGender;
      if (!gender) {
        gender = Math.random() > 0.5 ? 'male' : 'female';
      }

      const surname = randomPick(country.surnames);
      const givenName = gender === 'male' ? randomPick(country.maleGiven) : randomPick(country.femaleGiven);

      let fullName;
      if (['CN', 'HK', 'MO', 'TW', 'JP', 'KR'].includes(countryCode)) {
        fullName = surname + givenName;
      } else {
        fullName = givenName + ' ' + surname;
      }

      return {
        fullName,
        surname,
        givenName,
        gender: gender === 'male' ? '男' : '女',
        countryName: country.name,
        flag: country.flag,
        format: ['CN', 'HK', 'MO', 'TW', 'JP', 'KR'].includes(countryCode) ? '姓+名' : '名+姓'
      };
    }

    function saveHistory(record) {
      let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      history.unshift(record);
      if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
      updateHistoryBadge();
    }

    function getHistory() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }

    function updateHistoryBadge() {
      const history = getHistory();
      const btn = document.getElementById('historyBtn');
      const badge = document.getElementById('historyBadge');
      if (history.length > 0) {
        btn.style.display = 'block';
        badge.textContent = history.length > 99 ? '99+' : history.length;
      } else {
        btn.style.display = 'none';
      }
    }

    function showResult(record) {
      document.getElementById('resultCard').classList.remove('hidden');
      document.getElementById('countryFlag').textContent = record.flag;
      document.getElementById('nameDisplay').textContent = record.fullName;
      document.getElementById('nameInfo').innerHTML = `
        <div class="name-info-item"><div class="label">国家/地区</div><div class="value">${record.countryName}</div></div>
        <div class="name-info-item"><div class="label">性别</div><div class="value">${record.gender}</div></div>
        <div class="name-info-item"><div class="label">姓氏</div><div class="value">${record.surname}</div></div>
        <div class="name-info-item"><div class="label">名字</div><div class="value">${record.givenName}</div></div>
      `;
    }

    function generate() {
      const record = generateName();
      saveHistory(record);
      showResult(record);
    }

    function generateMultiple() {
      for (let i = 0; i < 10; i++) generate();
      const history = getHistory();
      if (history.length > 0) showResult(history[0]);
      showToast('已批量生成 10 个名字');
    }

    function openHistory() {
      const history = getHistory();
      const list = document.getElementById('historyList');
      const countBadge = document.getElementById('countBadge');
      if (history.length === 0) {
        list.innerHTML = '<div class="empty-state">暂无生成记录</div>';
        countBadge.textContent = '';
      } else {
        list.innerHTML = history.map(item => `
          <div class="history-item" onclick="copyId('${item.fullName}')">
            <div class="name-value">${item.flag} ${item.fullName}</div>
            <div class="name-detail">
              <span>📍 ${item.countryName}</span>
              <span>👤 ${item.gender}</span>
            </div>
          </div>
        `).join('');
        countBadge.textContent = `共 ${history.length} 条记录`;
      }
      document.getElementById('modalOverlay').classList.add('active');
    }

    function closeHistory() { document.getElementById('modalOverlay').classList.remove('active'); }
    function closeModal(event) { if (event.target === document.getElementById('modalOverlay')) closeHistory(); }

    function clearHistory() {
      if (confirm('确定要清空所有生成记录吗？')) {
        localStorage.removeItem(STORAGE_KEY);
        updateHistoryBadge();
        closeHistory();
        document.getElementById('resultCard').classList.add('hidden');
      }
    }

    async function copyId(name) {
      try {
        await navigator.clipboard.writeText(name);
        showToast('已复制到剪贴板');
      } catch (e) {
        const ta = document.createElement('textarea');
        ta.value = name; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('已复制到剪贴板');
      }
    }

    function showToast(msg) {
      const toast = document.getElementById('copyToast');
      toast.textContent = msg; toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    document.addEventListener('DOMContentLoaded', function() { updateHistoryBadge(); });
  </script>
