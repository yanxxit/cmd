<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📝 TODO List</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
</head>
<body>
  <div class="app-container">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1><span>✅</span> TODO</h1>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-filter="all">
          <span class="nav-icon">📋</span>
          <span>全部任务</span>
          <span class="nav-count" id="totalCount">0</span>
        </a>
        <a href="#" class="nav-item" data-filter="pending">
          <span class="nav-icon">⏳</span>
          <span>待处理</span>
          <span class="nav-count" id="pendingCount">0</span>
        </a>
        <a href="#" class="nav-item" data-filter="completed">
          <span class="nav-icon">✅</span>
          <span>已完成</span>
          <span class="nav-count" id="completedCount">0</span>
        </a>
      </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <header class="main-header">
        <h2 id="pageTitle">全部任务</h2>
        <span class="task-date" id="currentDate"></span>
      </header>

      <!-- 添加任务 -->
      <div class="add-task-container">
        <div class="add-task-input-wrapper">
          <span class="input-icon">➕</span>
          <input type="text" class="add-task-input" id="taskInput" placeholder="添加任务..." autocomplete="off">
        </div>
      </div>

      <!-- 任务列表 -->
      <div class="task-list-container">
        <div class="task-list" id="taskList">
          <!-- 动态生成 -->
        </div>
        <div class="empty-state hidden" id="emptyState">
          <div class="empty-icon">🎉</div>
          <p>没有任务</p>
          <p class="empty-hint">添加你的第一个任务吧！</p>
        </div>
      </div>
    </main>
  </div>

  <!-- 任务详情对话框 -->
  <div class="modal-overlay hidden" id="taskModal">
    <div class="modal task-detail-modal">
      <div class="modal-header">
        <h3>任务详情</h3>
        <button class="btn-close" onclick="closeTaskModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="detail-section">
          <label class="detail-label">
            <input type="checkbox" class="detail-checkbox" id="detailCompleted">
            <span>标记为完成</span>
          </label>
        </div>
        
        <div class="detail-section">
          <label class="detail-label">任务内容</label>
          <textarea class="detail-textarea" id="detailContent" rows="3"></textarea>
        </div>
        
        <div class="detail-section">
          <label class="detail-label">备注</label>
          <textarea class="detail-textarea" id="detailNote" rows="2" placeholder="添加备注..."></textarea>
        </div>
        
        <div class="detail-section">
          <label class="detail-label">截止日期</label>
          <input type="date" class="detail-input" id="detailDueDate">
        </div>
        
        <!-- 子任务 -->
        <div class="detail-section">
          <label class="detail-label">子任务 <span class="subtask-count" id="subtaskCount">0/0</span></label>
          <div class="subtask-list" id="detailSubtaskList"></div>
          <div class="add-subtask-wrapper">
            <input type="text" class="add-subtask-input" id="subtaskInput" placeholder="添加子任务...">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" id="deleteTaskBtn">🗑️ 删除</button>
        <button class="btn btn-primary" id="saveTaskBtn">💾 保存</button>
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js"></script>
</body>
</html>
