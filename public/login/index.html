<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - TODO 管理系统</title>
  
  <!-- Pico CSS (本地 libs) -->
  <link rel="stylesheet" href="/libs/@picocss/pico/css/pico.min.css">
  
  <!-- 自定义样式 -->
  <style>
    :root {
      --primary-color: #667eea;
      --primary-hover: #764ba2;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }
    
    .login-container {
      width: 100%;
      max-width: 420px;
    }
    
    .login-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .login-logo {
      font-size: 64px;
      margin-bottom: 10px;
    }
    
    .login-title {
      font-size: 24px;
      font-weight: bold;
      color: #1a1a1a;
      margin: 0;
    }
    
    .login-subtitle {
      color: #666;
      font-size: 14px;
      margin-top: 8px;
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }
    
    .input-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: all 0.3s;
    }
    
    .input-group input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .input-icon {
      position: relative;
    }
    
    .input-icon input {
      padding-left: 44px;
    }
    
    .input-icon::before {
      content: '';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: #999;
    }
    
    .input-icon.username::before {
      content: '👤';
    }
    
    .input-icon.password::before {
      content: '🔒';
    }
    
    .login-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 14px;
    }
    
    .login-options label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    
    .login-options a {
      color: var(--primary-color);
      text-decoration: none;
    }
    
    .login-options a:hover {
      text-decoration: underline;
    }
    
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }
    
    .login-btn:active {
      transform: translateY(0);
    }
    
    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: #999;
      font-size: 14px;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }
    
    .divider span {
      padding: 0 16px;
    }
    
    .social-login {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
      color: #333;
    }
    
    .social-btn:hover {
      border-color: var(--primary-color);
      background: #f8f9ff;
      transform: translateY(-2px);
    }
    
    .register-link {
      text-align: center;
      margin-top: 24px;
      color: #666;
      font-size: 14px;
    }
    
    .register-link a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 600;
    }
    
    .register-link a:hover {
      text-decoration: underline;
    }
    
    .message {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    .message.show {
      display: block;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* 暗色主题 */
    [data-theme="dark"] .login-card {
      background: rgba(30, 30, 30, 0.95);
    }
    
    [data-theme="dark"] .login-title {
      color: #fff;
    }
    
    [data-theme="dark"] .login-subtitle {
      color: #aaa;
    }
    
    [data-theme="dark"] .input-group label {
      color: #ddd;
    }
    
    [data-theme="dark"] .input-group input {
      background: #1a1a1a;
      border-color: #333;
      color: #fff;
    }
    
    [data-theme="dark"] .social-btn {
      background: #1a1a1a;
      border-color: #333;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <!-- 头部 -->
      <div class="login-header">
        <div class="login-logo">🔐</div>
        <h1 class="login-title">TODO 管理系统</h1>
        <p class="login-subtitle">欢迎回来，请登录您的账户</p>
      </div>
      
      <!-- 消息提示 -->
      <div id="message" class="message"></div>
      
      <!-- 登录表单 -->
      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="input-group">
          <label for="username">用户名</label>
          <div class="input-icon username">
            <input 
              type="text" 
              id="username" 
              name="username" 
              placeholder="请输入用户名"
              required
              autocomplete="username"
            >
          </div>
        </div>
        
        <div class="input-group">
          <label for="password">密码</label>
          <div class="input-icon password">
            <input 
              type="password" 
              id="password" 
              name="password" 
              placeholder="请输入密码"
              required
              autocomplete="current-password"
            >
          </div>
        </div>
        
        <div class="login-options">
          <label>
            <input type="checkbox" name="remember"> 记住我
          </label>
          <a href="#" onclick="showMessage('请联系管理员重置密码', 'error'); return false;">忘记密码？</a>
        </div>
        
        <button type="submit" class="login-btn" id="loginBtn">
          登录
        </button>
      </form>
      
      <!-- 分割线 -->
      <div class="divider">
        <span>或使用以下方式登录</span>
      </div>
      
      <!-- 社交登录 -->
      <div class="social-login">
        <button class="social-btn" onclick="showMessage('微信登录暂未开通', 'info')">
          💬 微信
        </button>
        <button class="social-btn" onclick="showMessage('GitHub 登录暂未开通', 'info')">
          🐙 GitHub
        </button>
        <button class="social-btn" onclick="showMessage('Google 登录暂未开通', 'info')">
          🔵 Google
        </button>
      </div>
      
      <!-- 注册链接 -->
      <div class="register-link">
        还没有账户？<a href="#" onclick="showMessage('注册功能暂未开通', 'info')">立即注册</a>
      </div>
      
      <!-- 主题切换 -->
      <div style="text-align: center; margin-top: 20px;">
        <button 
          onclick="toggleTheme()" 
          style="background: none; border: none; cursor: pointer; font-size: 24px; opacity: 0.7;"
          title="切换主题"
        >
          🌙
        </button>
      </div>
    </div>
  </div>
  
  <script>
    // 消息提示
    function showMessage(text, type = 'error') {
      const messageEl = document.getElementById('message');
      messageEl.textContent = text;
      messageEl.className = `message ${type} show`;
      setTimeout(() => {
        messageEl.classList.remove('show');
      }, 3000);
    }
    
    // 主题切换
    function toggleTheme() {
      const html = document.documentElement;
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    }
    
    // 加载保存的主题
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
    
    // 处理登录
    async function handleLogin(event) {
      event.preventDefault();
      
      const form = event.target;
      const username = form.username.value.trim();
      const password = form.password.value;
      const remember = form.remember.checked;
      const loginBtn = document.getElementById('loginBtn');
      
      // 验证
      if (!username || !password) {
        showMessage('请输入用户名和密码', 'error');
        return false;
      }
      
      // 设置加载状态
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="loading"></span>登录中...';
      
      try {
        // 调用登录 API
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password, remember })
        });
        
        const data = await response.json();
        
        if (data.success) {
          showMessage('登录成功，正在跳转...', 'success');
          
          // 保存 token
          if (data.data.token) {
            if (remember) {
              localStorage.setItem('auth_token', data.data.token);
              localStorage.setItem('auth_user', JSON.stringify(data.data.user));
            } else {
              sessionStorage.setItem('auth_token', data.data.token);
              sessionStorage.setItem('auth_user', JSON.stringify(data.data.user));
            }
          }
          
          // 延迟跳转
          setTimeout(() => {
            // 如果有 redirect 参数，跳转到指定页面
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect') || '/todo-v7/';
            window.location.href = redirect;
          }, 1000);
        } else {
          showMessage(data.error || '登录失败，请检查用户名和密码', 'error');
          loginBtn.disabled = false;
          loginBtn.innerHTML = '登录';
        }
      } catch (error) {
        console.error('登录错误:', error);
        showMessage('网络错误，请稍后重试', 'error');
        loginBtn.disabled = false;
        loginBtn.innerHTML = '登录';
      }
      
      return false;
    }
    
    // 检查是否已登录
    (function() {
      const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
      if (token) {
        // 已登录，直接跳转
        const urlParams = new URLSearchParams(window.location.search);
        const redirect = urlParams.get('redirect') || '/todo-v7/';
        window.location.href = redirect;
      }
    })();
  </script>
</body>
</html>
