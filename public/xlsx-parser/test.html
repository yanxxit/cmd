<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XLSX 上传测试</title>
  <style>
    body { padding: 20px; font-family: Arial, sans-serif; }
    .result { margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
    .success { background: #d4edda; border-color: #28a745; }
    .error { background: #f8d7da; border-color: #dc3545; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    pre { background: #f5f5f5; padding: 10px; overflow: auto; }
  </style>
</head>
<body>
  <h1>XLSX 上传诊断测试</h1>
  
  <div>
    <h3>测试 1: 选择文件</h3>
    <input type="file" id="fileInput" accept=".xlsx,.xls">
  </div>
  
  <div>
    <h3>测试 2: 上传文件</h3>
    <button onclick="testUpload()">上传测试</button>
  </div>
  
  <div>
    <h3>测试 3: API 健康检查</h3>
    <button onclick="testAPI()">检查 API</button>
  </div>
  
  <div id="results"></div>

  <script>
    const results = document.getElementById('results');
    
    function log(message, type = 'info') {
      const div = document.createElement('div');
      div.className = `result ${type}`;
      div.innerHTML = `<strong>${type.toUpperCase()}:</strong> ${message}`;
      results.appendChild(div);
    }
    
    function testAPI() {
      fetch('/api/xlsx/info?path=test.xlsx')
        .then(r => r.json())
        .then(data => {
          log('API 响应：' + JSON.stringify(data), data.success ? 'success' : 'error');
        })
        .catch(err => {
          log('API 错误：' + err.message, 'error');
        });
    }
    
    function testUpload() {
      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];
      
      if (!file) {
        log('请先选择一个文件', 'error');
        return;
      }
      
      log(`选择的文件：${file.name}, ${file.size} bytes, ${file.type}`);
      
      const formData = new FormData();
      formData.append('file', file);
      
      log('开始上传...');
      
      fetch('/api/xlsx/upload', {
        method: 'POST',
        body: formData
      })
      .then(response => {
        log(`响应状态：${response.status}`);
        log(`响应头 Content-Type: ${response.headers.get('content-type')}`);
        return response.text();
      })
      .then(text => {
        log(`响应内容：<pre>${text}</pre>`);
        try {
          const data = JSON.parse(text);
          if (data.success) {
            log('上传成功！', 'success');
            log(`工作表数量：${data.data.worksheetCount}`);
            log(`数据预览：<pre>${JSON.stringify(data.data.worksheets[0]?.data?.slice(0, 2), null, 2)}</pre>`, 'success');
          } else {
            log(`上传失败：${data.error}`, 'error');
          }
        } catch (e) {
          log('响应不是有效的 JSON', 'error');
        }
      })
      .catch(err => {
        log(`上传错误：${err.message}`, 'error');
      });
    }
  </script>
</body>
</html>
