<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlaSQL 数据工作台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .back-link {
      display: inline-block;
      color: white;
      text-decoration: none;
      margin-bottom: 20px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    .back-link:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
    }

    .card-title {
      font-size: 1.3rem;
      color: #333;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .upload-area {
      border: 3px dashed #667eea;
      border-radius: 8px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .upload-area:hover {
      background: #f5f3ff;
      border-color: #764ba2;
    }

    .upload-area.dragover {
      background: #f5f3ff;
      border-color: #764ba2;
      transform: scale(1.02);
    }

    .upload-icon {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    .upload-text {
      font-size: 1.1rem;
      color: #333;
      margin-bottom: 8px;
    }

    .upload-hint {
      color: #666;
      font-size: 0.9rem;
    }

    #fileInput {
      display: none;
    }

    .file-info {
      margin-top: 15px;
      padding: 12px;
      background: #f5f3ff;
      border-radius: 8px;
      display: none;
    }

    .file-info.show {
      display: block;
    }

    .file-name {
      font-weight: 600;
      color: #333;
    }

    .file-meta {
      color: #666;
      font-size: 0.85rem;
      margin-top: 5px;
    }

    .sql-editor {
      width: 100%;
      min-height: 150px;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 0.95rem;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      resize: vertical;
      transition: border-color 0.3s ease;
    }

    .sql-editor:focus {
      outline: none;
      border-color: #667eea;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-outline {
      background: transparent;
      border: 2px solid #667eea;
      color: #667eea;
    }

    .btn-outline:hover {
      background: #667eea;
      color: white;
    }

    .btn-success {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    }

    .btn-success:hover {
      box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
    }

    .data-sources {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 15px;
    }

    .source-item {
      background: #f5f3ff;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }

    .source-item:hover {
      background: #ede9fe;
      border-color: #667eea;
    }

    .source-item.active {
      background: #667eea;
      color: white;
    }

    .source-icon {
      font-size: 1.5rem;
      margin-bottom: 5px;
    }

    .source-name {
      font-size: 0.85rem;
      font-weight: 600;
    }

    .result-area {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 2px solid #f0f0f0;
    }

    .result-title {
      font-size: 1.3rem;
      color: #333;
    }

    .result-stats {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
    }

    .stat-item {
      background: #f5f3ff;
      padding: 10px 20px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #667eea;
    }

    .stat-label {
      color: #666;
      font-size: 0.85rem;
      margin-top: 3px;
    }

    .table-container {
      overflow-x: auto;
      max-height: 400px;
      overflow-y: auto;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .data-table th {
      background: #667eea;
      color: white;
      padding: 12px 15px;
      text-align: left;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .data-table td {
      padding: 10px 15px;
      border-bottom: 1px solid #e0e0e0;
    }

    .data-table tr:hover {
      background: #f5f3ff;
    }

    .json-output {
      background: #1e1e1e;
      border-radius: 8px;
      padding: 15px;
      overflow-x: auto;
      max-height: 400px;
      overflow-y: auto;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 0.85rem;
      color: #d4d4d4;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 30px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
      display: none;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 0.9rem;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: #efe;
      color: #3c3;
      padding: 12px;
      border-radius: 8px;
      margin-top: 10px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .view-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .toggle-btn {
      padding: 8px 16px;
      background: #f0f0f0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }

    .toggle-btn:hover {
      background: #e0e0e0;
    }

    .toggle-btn.active {
      background: #667eea;
      color: white;
    }

    .query-history {
      max-height: 200px;
      overflow-y: auto;
      margin-top: 15px;
    }

    .query-item {
      background: #f5f3ff;
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 0.85rem;
      transition: all 0.3s ease;
      border-left: 3px solid transparent;
    }

    .query-item:hover {
      background: #ede9fe;
      border-left-color: #667eea;
    }

    .info-box {
      background: #f5f3ff;
      border-left: 4px solid #667eea;
      padding: 15px;
      border-radius: 6px;
      margin-top: 15px;
    }

    .info-box p {
      color: #555;
      margin: 0;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 1024px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/file-viewer" class="back-link">← 返回文件查看器</a>

    <div class="header">
      <h1>🔍 AlaSQL 数据工作台</h1>
      <p>使用 SQL 查询 Excel、CSV、JSON 等格式数据</p>
    </div>

    <div class="main-grid">
      <!-- 左侧：数据源和查询 -->
      <div class="card">
        <div class="card-title">📁 数据源</div>
        
        <div class="upload-area" id="uploadArea">
          <div class="upload-icon">📂</div>
          <div class="upload-text">点击上传或拖拽文件</div>
          <div class="upload-hint">支持 .xlsx, .xls, .csv, .json 格式</div>
        </div>
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv,.json" multiple>

        <div class="file-info" id="fileInfo">
          <div class="file-name" id="fileName"></div>
          <div class="file-meta" id="fileMeta"></div>
        </div>

        <div class="data-sources" id="dataSources"></div>

        <div class="info-box">
          <p>💡 <strong>提示：</strong>文件在浏览器本地解析，不会上传到服务器。支持 AlaSQL 语法查询。</p>
        </div>
      </div>

      <!-- 右侧：SQL 查询 -->
      <div class="card">
        <div class="card-title">💬 SQL 查询</div>
        
        <textarea 
          class="sql-editor" 
          id="sqlEditor" 
          placeholder="输入 SQL 查询，例如：
SELECT * FROM ?
SELECT name, age FROM ? WHERE age > 18
SELECT COUNT(*) AS total FROM ? GROUP BY status"
        ></textarea>

        <div class="btn-group">
          <button class="btn" id="runBtn">▶ 执行查询</button>
          <button class="btn btn-outline" id="clearBtn">🗑 清空</button>
          <button class="btn btn-success" id="exportBtn">📥 导出结果</button>
        </div>

        <div class="success-message" id="successMessage"></div>
        <div class="error-message" id="errorMessage"></div>

        <div style="margin-top: 20px;">
          <div class="card-title" style="font-size: 1.1rem;">📜 查询历史</div>
          <div class="query-history" id="queryHistory"></div>
        </div>
      </div>
    </div>

    <!-- 结果区域 -->
    <div class="result-area" id="resultArea">
      <div class="result-header">
        <div class="result-title">📊 查询结果</div>
        <div class="view-toggle">
          <button class="toggle-btn active" data-view="table">表格</button>
          <button class="toggle-btn" data-view="json">JSON</button>
        </div>
      </div>

      <div class="result-stats" id="resultStats">
        <div class="stat-item">
          <div class="stat-value" id="rowCount">0</div>
          <div class="stat-label">行数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="columnCount">0</div>
          <div class="stat-label">列数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="queryTime">0ms</div>
          <div class="stat-label">查询时间</div>
        </div>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>正在执行查询...</div>
      </div>

      <div class="table-container hidden" id="tableView">
        <table class="data-table" id="dataTable">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="json-output hidden" id="jsonView"></div>
    </div>
  </div>

  <!-- 引入 AlaSQL -->
  <script src="https://cdn.jsdelivr.net/npm/alasql@4"></script>

  <!-- <script src="/libs/alasql/alasql.min.js"></script> -->
  <script src="/libs/xlsx/dist/xlsx.full.min.js"></script>
  <script>
    // 状态管理
    const state = {
      dataSources: [],
      currentSource: null,
      queryHistory: [],
      lastResult: null
    };

    // DOM 元素
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const fileName = document.getElementById('fileName');
    const fileMeta = document.getElementById('fileMeta');
    const dataSources = document.getElementById('dataSources');
    const sqlEditor = document.getElementById('sqlEditor');
    const runBtn = document.getElementById('runBtn');
    const clearBtn = document.getElementById('clearBtn');
    const exportBtn = document.getElementById('exportBtn');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    const queryHistory = document.getElementById('queryHistory');
    const resultArea = document.getElementById('resultArea');
    const tableView = document.getElementById('tableView');
    const jsonView = document.getElementById('jsonView');
    const dataTable = document.getElementById('dataTable');
    const rowCount = document.getElementById('rowCount');
    const columnCount = document.getElementById('columnCount');
    const queryTime = document.getElementById('queryTime');
    const loading = document.getElementById('loading');
    const toggleBtns = document.querySelectorAll('.toggle-btn');

    // 事件监听
    uploadArea.addEventListener('click', () => fileInput.click());
    
    fileInput.addEventListener('change', (e) => {
      Array.from(e.target.files).forEach(handleFile);
    });

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      Array.from(e.dataTransfer.files).forEach(handleFile);
    });

    runBtn.addEventListener('click', runQuery);
    clearBtn.addEventListener('click', clearEditor);
    exportBtn.addEventListener('click', exportResult);

    toggleBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        toggleBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const view = btn.dataset.view;
        if (view === 'table') {
          tableView.classList.remove('hidden');
          jsonView.classList.add('hidden');
        } else {
          tableView.classList.add('hidden');
          jsonView.classList.remove('hidden');
        }
      });
    });

    // 处理文件上传
    async function handleFile(file) {
      const ext = file.name.split('.').pop().toLowerCase();
      const validExts = ['xlsx', 'xls', 'csv', 'json'];

      if (!validExts.includes(ext)) {
        showError(`不支持的文件格式：${ext}`);
        return;
      }

      showInfo(file);
      hideError();

      try {
        const data = await parseFile(file, ext);
        const sourceName = generateSourceName(file.name);
        
        state.dataSources.push({
          name: sourceName,
          file: file.name,
          ext: ext,
          data: data
        });

        state.currentSource = state.dataSources[state.dataSources.length - 1];
        renderDataSources();
        showSuccess(`✓ 已加载 ${file.name} (${data.length} 行)`);

        // 自动填充查询
        if (!sqlEditor.value.trim()) {
          sqlEditor.value = `SELECT * FROM ? -- ${sourceName}`;
        }
      } catch (err) {
        showError('解析失败：' + err.message);
      }
    }

    // 解析文件
    async function parseFile(file, ext) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = (e) => {
          try {
            let data = [];

            if (ext === 'xlsx' || ext === 'xls') {
              const workbook = XLSX.read(e.target.result, { type: 'array' });
              const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
              data = XLSX.utils.sheet_to_json(firstSheet);
            } else if (ext === 'csv') {
              const workbook = XLSX.read(e.target.result, { type: 'array' });
              const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
              data = XLSX.utils.sheet_to_json(firstSheet);
            } else if (ext === 'json') {
              data = JSON.parse(e.target.result);
              if (!Array.isArray(data)) {
                data = [data];
              }
            }

            resolve(data);
          } catch (err) {
            reject(err);
          }
        };

        reader.onerror = () => reject(new Error('文件读取失败'));

        if (ext === 'xlsx' || ext === 'xls' || ext === 'csv') {
          reader.readAsArrayBuffer(file);
        } else {
          reader.readAsText(file);
        }
      });
    }

    // 生成数据源名称
    function generateSourceName(fileName) {
      const base = fileName.replace(/\.(xlsx|xls|csv|json)$/i, '');
      const index = state.dataSources.filter(ds => ds.file.startsWith(base)).length;
      return index === 0 ? base : `${base}_${index}`;
    }

    // 显示文件信息
    function showInfo(file) {
      fileName.textContent = file.name;
      fileMeta.textContent = `${(file.size / 1024).toFixed(2)} KB`;
      fileInfo.classList.add('show');
    }

    // 渲染数据源列表
    function renderDataSources() {
      dataSources.innerHTML = state.dataSources.map((ds, index) => `
        <div class="source-item ${ds === state.currentSource ? 'active' : ''}" 
             onclick="selectSource(${index})">
          <div class="source-icon">${getSourceIcon(ds.ext)}</div>
          <div class="source-name">${ds.name}</div>
          <div style="font-size:0.75rem;opacity:0.8">${ds.data.length}行</div>
        </div>
      `).join('');
    }

    // 获取文件类型图标
    function getSourceIcon(ext) {
      const icons = {
        xlsx: '📊',
        xls: '📊',
        csv: '📄',
        json: '📋'
      };
      return icons[ext] || '📁';
    }

    // 选择数据源
    window.selectSource = function(index) {
      state.currentSource = state.dataSources[index];
      renderDataSources();
      showSuccess(`已切换到 ${state.currentSource.name}`);
    };

    // 执行查询
    function runQuery() {
      const sql = sqlEditor.value.trim();
      if (!sql) {
        showError('请输入 SQL 查询');
        return;
      }

      if (state.dataSources.length === 0) {
        showError('请先上传数据文件');
        return;
      }

      showLoading();
      hideError();

      const startTime = performance.now();

      try {
        // 使用当前数据源或第一个数据源
        const data = state.currentSource?.data || state.dataSources[0].data;
        
        // 执行 AlaSQL 查询
        let result;
        if (sql.includes('FROM ?')) {
          result = alasql(sql, [data]);
        } else {
          // 如果没有 ? 占位符，尝试使用数据源名称
          const sourceName = state.currentSource?.name || state.dataSources[0].name;
          alasql(`CREATE TABLE ${sourceName} = ?`, [data]);
          result = alasql(sql.replace(new RegExp(sourceName, 'g'), sourceName));
        }

        const endTime = performance.now();
        const time = (endTime - startTime).toFixed(2);

        state.lastResult = result;
        
        // 添加到查询历史
        addToHistory(sql);

        // 显示结果
        displayResult(result, time);
        showSuccess(`✓ 查询成功 (${time}ms)`);
      } catch (err) {
        showError('查询失败：' + err.message);
      } finally {
        hideLoading();
      }
    }

    // 显示结果
    function displayResult(result, time) {
      const isArray = Array.isArray(result);
      const data = isArray ? result : [result];
      const columns = data.length > 0 ? Object.keys(data[0]) : [];

      rowCount.textContent = data.length;
      columnCount.textContent = columns.length;
      queryTime.textContent = time + 'ms';

      // 表格视图
      const thead = dataTable.querySelector('thead');
      const tbody = dataTable.querySelector('tbody');

      thead.innerHTML = columns.map(col => `<th>${col}</th>`).join('');
      tbody.innerHTML = data.map(row => 
        `<tr>${columns.map(col => `<td>${row[col] ?? ''}</td>`).join('')}</tr>`
      ).join('');

      // JSON 视图
      jsonView.textContent = JSON.stringify(data, null, 2);

      // 切换到表格视图
      tableView.classList.remove('hidden');
      jsonView.classList.add('hidden');
      toggleBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.view === 'table'));
    }

    // 添加到查询历史
    function addToHistory(sql) {
      // 避免重复
      if (state.queryHistory.includes(sql)) return;
      
      state.queryHistory.unshift(sql);
      if (state.queryHistory.length > 10) {
        state.queryHistory.pop();
      }

      queryHistory.innerHTML = state.queryHistory.map(q => 
        `<div class="query-item" onclick="selectQuery(this)">${escapeHtml(q)}</div>`
      ).join('');
    }

    // 选择历史查询
    window.selectQuery = function(el) {
      sqlEditor.value = el.textContent;
    };

    // 清空编辑器
    function clearEditor() {
      sqlEditor.value = '';
      hideError();
      hideSuccess();
    }

    // 导出结果
    function exportResult() {
      if (!state.lastResult) {
        showError('没有可导出的结果');
        return;
      }

      const data = Array.isArray(state.lastResult) ? state.lastResult : [state.lastResult];
      const jsonStr = JSON.stringify(data, null, 2);
      
      const blob = new Blob([jsonStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `query_result_${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);

      showSuccess('✓ 结果已导出');
    }

    // 辅助函数
    function showLoading() {
      loading.classList.add('show');
      resultArea.style.opacity = '0.5';
    }

    function hideLoading() {
      loading.classList.remove('show');
      resultArea.style.opacity = '1';
    }

    function showError(msg) {
      errorMessage.textContent = msg;
      errorMessage.classList.add('show');
    }

    function hideError() {
      errorMessage.classList.remove('show');
    }

    function showSuccess(msg) {
      successMessage.textContent = msg;
      successMessage.classList.add('show');
      setTimeout(() => hideSuccess(), 3000);
    }

    function hideSuccess() {
      successMessage.classList.remove('show');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
