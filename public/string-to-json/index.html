<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>String 转 JSON 工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .input-card {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      margin-bottom: 30px;
    }

    .input-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .input-title {
      font-size: 1.3rem;
      color: #333;
    }

    .input-actions {
      display: flex;
      gap: 10px;
    }

    #jsonInput {
      width: 100%;
      min-height: 200px;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 0.95rem;
      line-height: 1.5;
      resize: vertical;
      transition: border-color 0.3s ease;
    }

    #jsonInput:focus {
      outline: none;
      border-color: #667eea;
    }

    .btn {
      display: inline-block;
      padding: 10px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid #667eea;
      color: #667eea;
    }

    .btn-outline:hover {
      background: #667eea;
      color: white;
    }

    .btn-secondary {
      background: #6c757d;
    }

    .btn-secondary:hover {
      background: #5a6268;
    }

    .options-row {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .option-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .option-item label {
      color: #555;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .option-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .option-item select {
      padding: 6px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .result-card {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      display: none;
    }

    .result-card.show {
      display: block;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #f0f0f0;
    }

    .result-title {
      font-size: 1.5rem;
      color: #333;
    }

    .result-actions {
      display: flex;
      gap: 10px;
    }

    .json-output-wrapper {
      position: relative;
    }

    .json-output {
      background: #1e1e1e;
      border-radius: 8px;
      padding: 20px;
      overflow-x: auto;
      max-height: 600px;
      overflow-y: auto;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .json-output pre {
      margin: 0;
      color: #d4d4d4;
    }

    .json-key {
      color: #9cdcfe;
    }

    .json-string {
      color: #ce9178;
    }

    .json-number {
      color: #b5cea8;
    }

    .json-boolean {
      color: #569cd6;
    }

    .json-null {
      color: #569cd6;
    }

    .json-bracket {
      color: #ffd700;
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .stat-item {
      background: #f8f9ff;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #667eea;
    }

    .stat-label {
      color: #666;
      font-size: 0.9rem;
      margin-top: 5px;
    }

    .back-link {
      display: inline-block;
      color: white;
      text-decoration: none;
      margin-bottom: 20px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    .back-link:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .info-box {
      background: #e7f3ff;
      border-left: 4px solid #2196F3;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
    }

    .info-box p {
      color: #0a528a;
      margin: 0;
      line-height: 1.6;
    }

    .convert-btn-wrapper {
      margin-top: 20px;
      text-align: center;
    }

    .convert-btn {
      padding: 14px 40px;
      font-size: 1.1rem;
    }

    .sample-btn {
      margin-left: 10px;
    }

    .tree-view {
      padding: 10px;
    }

    .tree-item {
      margin: 4px 0;
      padding-left: 20px;
    }

    .tree-toggle {
      cursor: pointer;
      user-select: none;
      display: inline-block;
      width: 20px;
      color: #ffd700;
    }

    .tree-toggle:hover {
      color: #ffed4e;
    }

    .tree-key {
      color: #9cdcfe;
    }

    .tree-value {
      margin-left: 5px;
    }

    .tree-string {
      color: #ce9178;
    }

    .tree-number {
      color: #b5cea8;
    }

    .tree-boolean {
      color: #569cd6;
    }

    .tree-null {
      color: #569cd6;
      font-style: italic;
    }

    .tree-collapsed > .tree-item {
      display: none;
    }

    .view-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .view-btn {
      padding: 8px 16px;
      background: #f0f0f0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .view-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .view-content {
      display: none;
    }

    .view-content.active {
      display: block;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.8rem;
      }

      .input-header {
        flex-direction: column;
        gap: 15px;
        align-items: flex-start;
      }

      .result-header {
        flex-direction: column;
        gap: 15px;
        align-items: flex-start;
      }

      .options-row {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/file-viewer" class="back-link">← 返回文件查看器</a>

    <div class="header">
      <h1>🔄 String 转 JSON 工具</h1>
      <p>自动识别并转换嵌套的 JSON 字符串，递归展开所有层级</p>
    </div>

    <div class="info-box">
      <p>💡 <strong>功能说明：</strong>粘贴包含 JSON 字符串的值，工具会自动识别字符串中的 JSON 并递归转换，方便展开阅读和理解复杂数据结构。</p>
    </div>

    <div class="input-card">
      <div class="input-header">
        <div class="input-title">📝 输入 JSON 字符串</div>
        <div class="input-actions">
          <button class="btn btn-outline" id="clearBtn">清空</button>
          <button class="btn btn-secondary" id="formatBtn">格式化输入</button>
        </div>
      </div>

      <textarea id="jsonInput" placeholder='在此粘贴 JSON 字符串，例如：{"name": "test", "data": "{\"key\": \"value\"}"}'></textarea>

      <div class="options-row">
        <div class="option-item">
          <label for="indentSize">缩进空格数:</label>
          <select id="indentSize">
            <option value="2" selected>2</option>
            <option value="4">4</option>
            <option value="0">Tab</option>
          </select>
        </div>
        <div class="option-item">
          <label for="autoConvert">
            <input type="checkbox" id="autoConvert" checked>
            自动转换嵌套 JSON 字符串
          </label>
        </div>
        <div class="option-item">
          <label for="sortKeys">
            <input type="checkbox" id="sortKeys">
            按键名排序
          </label>
        </div>
      </div>

      <div class="convert-btn-wrapper">
        <button class="btn convert-btn" id="convertBtn">🚀 转换 JSON</button>
        <button class="btn btn-secondary sample-btn" id="sampleBtn">📋 加载示例</button>
      </div>

      <div class="error-message" id="errorMessage"></div>
    </div>

    <div class="result-card" id="resultCard">
      <div class="result-header">
        <div class="result-title">✨ 转换结果</div>
        <div class="result-actions">
          <button class="btn btn-outline" id="copyBtn">复制 JSON</button>
          <button class="btn btn-outline" id="downloadBtn">下载 JSON</button>
        </div>
      </div>

      <div class="stats" id="stats"></div>

      <div class="view-toggle">
        <button class="view-btn active" data-view="json">JSON 视图</button>
        <button class="view-btn" data-view="tree">树形视图</button>
      </div>

      <div class="view-content active" id="jsonView">
        <div class="json-output">
          <pre id="jsonOutput"></pre>
        </div>
      </div>

      <div class="view-content" id="treeView">
        <div class="json-output">
          <div id="treeOutput" class="tree-view"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const jsonInput = document.getElementById('jsonInput');
    const errorMessage = document.getElementById('errorMessage');
    const resultCard = document.getElementById('resultCard');
    const jsonOutput = document.getElementById('jsonOutput');
    const treeOutput = document.getElementById('treeOutput');
    const stats = document.getElementById('stats');
    const convertBtn = document.getElementById('convertBtn');
    const clearBtn = document.getElementById('clearBtn');
    const formatBtn = document.getElementById('formatBtn');
    const sampleBtn = document.getElementById('sampleBtn');
    const copyBtn = document.getElementById('copyBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const autoConvertCheckbox = document.getElementById('autoConvert');
    const sortKeysCheckbox = document.getElementById('sortKeys');
    const indentSizeSelect = document.getElementById('indentSize');

    let currentData = null;

    // 视图切换
    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        
        btn.classList.add('active');
        const view = btn.dataset.view;
        document.getElementById(view + 'View').classList.add('active');
      });
    });

    // 转换按钮点击
    convertBtn.addEventListener('click', () => {
      handleConvert();
    });

    // 快捷键 Ctrl+Enter 转换
    jsonInput.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        handleConvert();
      }
    });

    // 清空按钮
    clearBtn.addEventListener('click', () => {
      jsonInput.value = '';
      hideResult();
      hideError();
    });

    // 格式化输入按钮
    formatBtn.addEventListener('click', () => {
      try {
        const input = jsonInput.value.trim();
        if (!input) return;

        const parsed = JSON.parse(input);
        jsonInput.value = JSON.stringify(parsed, null, 2);
      } catch (err) {
        showError('输入不是有效的 JSON 格式');
      }
    });

    // 加载示例按钮
    sampleBtn.addEventListener('click', () => {
      jsonInput.value = JSON.stringify({
        name: "示例数据",
        version: "1.0.0",
        config: '{"database": {"host": "localhost", "port": 5432, "options": "{\\"timeout\\": 30, \\"retries\\": 3}"}}',
        users: '[{"id": 1, "name": "Alice", "metadata": "{\\"role\\": \\"admin\\", \\"permissions\\": [\\"read\\", \\"write\\"]}"}, {"id": 2, "name": "Bob"}]',
        settings: '{"theme": "dark", "notifications": true}',
        timestamp: Date.now()
      }, null, 2);
    });

    // 复制按钮
    copyBtn.addEventListener('click', () => {
      if (!currentData) return;

      const indentSize = parseInt(indentSizeSelect.value);
      const jsonStr = JSON.stringify(currentData, null, indentSize === 0 ? '\t' : indentSize);

      navigator.clipboard.writeText(jsonStr).then(() => {
        const originalText = copyBtn.textContent;
        copyBtn.textContent = '✓ 已复制';
        setTimeout(() => {
          copyBtn.textContent = originalText;
        }, 2000);
      });
    });

    // 下载按钮
    downloadBtn.addEventListener('click', () => {
      if (!currentData) return;

      const indentSize = parseInt(indentSizeSelect.value);
      const jsonStr = JSON.stringify(currentData, null, indentSize === 0 ? '\t' : indentSize);

      const blob = new Blob([jsonStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'converted-' + Date.now() + '.json';
      a.click();
      URL.revokeObjectURL(url);
    });

    // 处理转换
    function handleConvert() {
      const input = jsonInput.value.trim();
      
      if (!input) {
        showError('请输入 JSON 字符串');
        return;
      }

      try {
        let parsed = JSON.parse(input);
        
        // 递归转换嵌套的 JSON 字符串
        if (autoConvertCheckbox.checked) {
          parsed = convertNestedJson(parsed);
        }

        // 排序键名
        if (sortKeysCheckbox.checked) {
          parsed = sortObjectKeys(parsed);
        }

        currentData = parsed;
        displayResult(parsed);
        hideError();
      } catch (err) {
        showError('JSON 解析失败：' + err.message);
        hideResult();
      }
    }

    // 递归转换嵌套的 JSON 字符串
    function convertNestedJson(obj) {
      if (obj === null || obj === undefined) {
        return obj;
      }

      if (typeof obj === 'string') {
        // 尝试解析字符串是否为 JSON
        const trimmed = obj.trim();
        if ((trimmed.startsWith('{') && trimmed.endsWith('}')) || 
            (trimmed.startsWith('[') && trimmed.endsWith(']'))) {
          try {
            const parsed = JSON.parse(trimmed);
            // 递归处理解析后的对象
            return convertNestedJson(parsed);
          } catch (e) {
            // 解析失败，返回原字符串
            return obj;
          }
        }
        return obj;
      }

      if (Array.isArray(obj)) {
        return obj.map(item => convertNestedJson(item));
      }

      if (typeof obj === 'object') {
        const result = {};
        for (const key of Object.keys(obj)) {
          result[key] = convertNestedJson(obj[key]);
        }
        return result;
      }

      return obj;
    }

    // 排序对象键名
    function sortObjectKeys(obj) {
      if (obj === null || obj === undefined) {
        return obj;
      }

      if (Array.isArray(obj)) {
        return obj.map(item => sortObjectKeys(item));
      }

      if (typeof obj === 'object') {
        const sorted = {};
        Object.keys(obj).sort().forEach(key => {
          sorted[key] = sortObjectKeys(obj[key]);
        });
        return sorted;
      }

      return obj;
    }

    // 显示结果
    function displayResult(data) {
      const indentSize = parseInt(indentSizeSelect.value);
      const jsonStr = JSON.stringify(data, null, indentSize === 0 ? '\t' : indentSize);

      // JSON 视图
      jsonOutput.innerHTML = syntaxHighlight(jsonStr);

      // 树形视图
      treeOutput.innerHTML = '';
      renderTree(data, treeOutput, 0);

      // 统计信息
      const stringCount = countStrings(data);
      const objectCount = countObjects(data);
      const arrayCount = countArrays(data);
      const depth = getDepth(data);

      stats.innerHTML = `
        <div class="stat-item">
          <div class="stat-value">${objectCount}</div>
          <div class="stat-label">对象数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${arrayCount}</div>
          <div class="stat-label">数组数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${stringCount}</div>
          <div class="stat-label">字符串数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${depth}</div>
          <div class="stat-label">最大深度</div>
        </div>
      `;

      resultCard.classList.add('show');
    }

    // JSON 语法高亮
    function syntaxHighlight(json) {
      json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, (match) => {
        let cls = 'json-number';
        if (/^"/.test(match)) {
          if (/:$/.test(match)) {
            cls = 'json-key';
          } else {
            cls = 'json-string';
          }
        } else if (/true|false/.test(match)) {
          cls = 'json-boolean';
        } else if (/null/.test(match)) {
          cls = 'json-null';
        }
        return '<span class="' + cls + '">' + match + '</span>';
      });
    }

    // 渲染树形视图
    function renderTree(obj, container, depth) {
      if (obj === null || obj === undefined) {
        const span = document.createElement('span');
        span.className = 'tree-null';
        span.textContent = 'null';
        container.appendChild(span);
        return;
      }

      if (typeof obj === 'string') {
        const span = document.createElement('span');
        span.className = 'tree-string';
        span.textContent = `"${obj}"`;
        container.appendChild(span);
        return;
      }

      if (typeof obj === 'number') {
        const span = document.createElement('span');
        span.className = 'tree-number';
        span.textContent = obj;
        container.appendChild(span);
        return;
      }

      if (typeof obj === 'boolean') {
        const span = document.createElement('span');
        span.className = 'tree-boolean';
        span.textContent = obj;
        container.appendChild(span);
        return;
      }

      if (Array.isArray(obj)) {
        if (obj.length === 0) {
          const span = document.createElement('span');
          span.className = 'json-bracket';
          span.textContent = '[]';
          container.appendChild(span);
          return;
        }

        const toggle = document.createElement('span');
        toggle.className = 'tree-toggle';
        toggle.textContent = '▼';
        container.appendChild(toggle);

        const bracket = document.createElement('span');
        bracket.className = 'json-bracket';
        bracket.textContent = `Array(${obj.length})`;
        container.appendChild(bracket);

        const itemsContainer = document.createElement('div');
        itemsContainer.style.marginLeft = '20px';
        container.appendChild(itemsContainer);

        obj.forEach((item, index) => {
          const itemDiv = document.createElement('div');
          itemDiv.className = 'tree-item';
          
          const indexSpan = document.createElement('span');
          indexSpan.className = 'tree-key';
          indexSpan.textContent = `[${index}]`;
          itemDiv.appendChild(indexSpan);
          
          const colonSpan = document.createElement('span');
          colonSpan.textContent = ': ';
          colonSpan.style.color = '#d4d4d4';
          itemDiv.appendChild(colonSpan);
          
          renderTree(item, itemDiv, depth + 1);
          itemsContainer.appendChild(itemDiv);
        });

        toggle.addEventListener('click', () => {
          if (itemsContainer.style.display === 'none') {
            itemsContainer.style.display = 'block';
            toggle.textContent = '▼';
          } else {
            itemsContainer.style.display = 'none';
            toggle.textContent = '▶';
          }
        });
        return;
      }

      if (typeof obj === 'object') {
        const keys = Object.keys(obj);
        if (keys.length === 0) {
          const span = document.createElement('span');
          span.className = 'json-bracket';
          span.textContent = '{}';
          container.appendChild(span);
          return;
        }

        const toggle = document.createElement('span');
        toggle.className = 'tree-toggle';
        toggle.textContent = '▼';
        container.appendChild(toggle);

        const bracket = document.createElement('span');
        bracket.className = 'json-bracket';
        bracket.textContent = `Object{${keys.length}}`;
        container.appendChild(bracket);

        const itemsContainer = document.createElement('div');
        itemsContainer.style.marginLeft = '20px';
        container.appendChild(itemsContainer);

        keys.forEach(key => {
          const itemDiv = document.createElement('div');
          itemDiv.className = 'tree-item';
          
          const keySpan = document.createElement('span');
          keySpan.className = 'tree-key';
          keySpan.textContent = key;
          itemDiv.appendChild(keySpan);
          
          const colonSpan = document.createElement('span');
          colonSpan.textContent = ': ';
          colonSpan.style.color = '#d4d4d4';
          itemDiv.appendChild(colonSpan);
          
          renderTree(obj[key], itemDiv, depth + 1);
          itemsContainer.appendChild(itemDiv);
        });

        toggle.addEventListener('click', () => {
          if (itemsContainer.style.display === 'none') {
            itemsContainer.style.display = 'block';
            toggle.textContent = '▼';
          } else {
            itemsContainer.style.display = 'none';
            toggle.textContent = '▶';
          }
        });
        return;
      }
    }

    // 统计函数
    function countStrings(obj) {
      if (typeof obj === 'string') return 1;
      if (Array.isArray(obj)) return obj.reduce((sum, item) => sum + countStrings(item), 0);
      if (typeof obj === 'object' && obj !== null) {
        return Object.values(obj).reduce((sum, val) => sum + countStrings(val), 0);
      }
      return 0;
    }

    function countObjects(obj) {
      if (typeof obj === 'object' && obj !== null && !Array.isArray(obj)) {
        return 1 + Object.values(obj).reduce((sum, val) => sum + countObjects(val), 0);
      }
      if (Array.isArray(obj)) {
        return obj.reduce((sum, item) => sum + countObjects(item), 0);
      }
      return 0;
    }

    function countArrays(obj) {
      if (Array.isArray(obj)) {
        return 1 + obj.reduce((sum, item) => sum + countArrays(item), 0);
      }
      if (typeof obj === 'object' && obj !== null) {
        return Object.values(obj).reduce((sum, val) => sum + countArrays(val), 0);
      }
      return 0;
    }

    function getDepth(obj) {
      if (typeof obj !== 'object' || obj === null) return 1;
      if (Array.isArray(obj)) {
        return 1 + (obj.length > 0 ? Math.max(...obj.map(getDepth)) : 0);
      }
      const values = Object.values(obj);
      return 1 + (values.length > 0 ? Math.max(...values.map(getDepth)) : 0);
    }

    // 辅助函数
    function showError(msg) {
      errorMessage.textContent = msg;
      errorMessage.classList.add('show');
    }

    function hideError() {
      errorMessage.classList.remove('show');
    }

    function hideResult() {
      resultCard.classList.remove('show');
      currentData = null;
    }
  </script>
</body>
