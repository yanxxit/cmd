<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 CSV 转 Markdown/HTML 表格</title>
  
  <!-- Vue 3 (国内 CDN) -->
  <script src="https://cdn.staticfile.org/vue/3.4.21/vue.global.prod.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.staticfile.org/tailwindcss/3.4.1/script.min.js"></script>
  
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f9fafb;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --border-color: #e5e7eb;
      --accent-color: #0ea5e9;
      --accent-gradient: linear-gradient(135deg, #0ea5e9 0%, #7c3aed 100%);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 15px rgba(0,0,0,0.1);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }
    
    [data-theme="dark"] {
      --bg-primary: #1f2937;
      --bg-secondary: #374151;
      --text-primary: #f9fafb;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --border-color: #4b5563;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.4);
      --shadow-lg: 0 10px 15px rgba(0,0,0,0.5);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
      transition: all 0.3s ease;
    }
    
    [data-theme="dark"] body {
      background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
    }
    
    .container { max-width: 1800px; margin: 0 auto; }
    
    /* 头部样式 */
    .header {
      text-align: center;
      margin-bottom: 32px;
      padding: 32px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .header h1 {
      font-size: 36px;
      font-weight: 800;
      color: white;
      margin-bottom: 8px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    
    .header p {
      color: rgba(255,255,255,0.9);
      font-size: 16px;
    }
    
    /* 卡片样式 */
    .card {
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-lg);
      transition: all 0.3s ease;
      border: 1px solid var(--border-color);
    }
    
    .card:hover {
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }
    
    [data-theme="dark"] .card:hover {
      box-shadow: 0 15px 30px rgba(0,0,0,0.4);
    }
    
    /* 设置面板 */
    .settings-panel {
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border-color);
    }
    
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      align-items: end;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .form-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .form-input, .form-select {
      padding: 10px 14px;
      border: 2px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-size: 14px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      transition: all 0.2s;
      font-family: 'Monaco', 'Consolas', monospace;
    }
    
    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
    }
    
    /* 按钮样式 */
    .btn {
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    
    .btn-primary {
      background: var(--accent-gradient);
      color: white;
      box-shadow: 0 2px 4px rgba(14, 165, 233, 0.3);
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(14, 165, 233, 0.4);
    }
    
    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 2px solid var(--border-color);
    }
    
    .btn-secondary:hover {
      background: var(--border-color);
      transform: translateY(-1px);
    }
    
    .btn-success {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      box-shadow: 0 2px 4px rgba(16, 185, 129, 0.3);
    }
    
    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(16, 185, 129, 0.4);
    }
    
    .btn-sm {
      padding: 8px 14px;
      font-size: 13px;
    }
    
    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    /* 分割视图 */
    .split-view {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    
    @media (max-width: 1200px) {
      .split-view { grid-template-columns: 1fr; }
    }
    
    /* 编辑器头部 */
    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-color);
    }
    
    .editor-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    /* 文本域样式 */
    .editor-textarea {
      width: 100%;
      padding: 16px;
      border: 2px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-size: 14px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-family: 'Monaco', 'Consolas', 'Courier New', monospace;
      line-height: 1.6;
      resize: vertical;
      transition: all 0.2s;
      min-height: 400px;
    }
    
    .editor-textarea:focus {
      outline: none;
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
    }
    
    /* 统计信息 */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border-color);
    }
    
    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .stat-value {
      font-weight: 700;
      color: var(--accent-color);
    }
    
    /* 选项卡样式 */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      background: var(--bg-secondary);
      padding: 4px;
      border-radius: var(--radius-sm);
    }
    
    .tab {
      flex: 1;
      padding: 10px 20px;
      text-align: center;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      color: var(--text-secondary);
      border-radius: 6px;
      transition: all 0.2s;
      border: none;
      background: transparent;
    }
    
    .tab:hover {
      background: rgba(14, 165, 233, 0.1);
      color: var(--accent-color);
    }
    
    .tab.active {
      background: var(--accent-gradient);
      color: white;
      box-shadow: 0 2px 4px rgba(14, 165, 233, 0.3);
    }
    
    /* 输出框样式 */
    .output-container {
      position: relative;
    }
    
    .output-box {
      background: var(--bg-secondary);
      border: 2px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 16px;
      font-family: 'Monaco', 'Consolas', 'Courier New', monospace;
      font-size: 13px;
      color: var(--text-primary);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 450px;
      overflow-y: auto;
      line-height: 1.6;
    }
    
    .output-box::-webkit-scrollbar {
      width: 8px;
    }
    
    .output-box::-webkit-scrollbar-track {
      background: var(--bg-secondary);
      border-radius: 4px;
    }
    
    .output-box::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }
    
    .output-box::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }
    
    /* 表格预览样式 */
    .preview-container {
      overflow-x: auto;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-color);
    }
    
    .preview-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    
    .preview-table th, .preview-table td {
      border: 1px solid var(--border-color);
      padding: 12px 16px;
      text-align: left;
    }
    
    .preview-table th {
      background: var(--accent-gradient);
      color: white;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.5px;
    }
    
    .preview-table tr:nth-child(even) {
      background: var(--bg-secondary);
    }
    
    .preview-table tr:hover {
      background: rgba(14, 165, 233, 0.1);
    }
    
    .preview-table td {
      transition: all 0.2s;
    }
    
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }
    
    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    
    /* 主题切换按钮 */
    .theme-toggle {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--bg-primary);
      border: 2px solid var(--border-color);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: var(--shadow-md);
      transition: all 0.3s ease;
      z-index: 100;
    }
    
    .theme-toggle:hover {
      transform: scale(1.1) rotate(15deg);
      box-shadow: var(--shadow-lg);
    }
    
    /* Toast 样式 */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 14px 24px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      z-index: 1000;
      animation: slideIn 0.3s ease;
      font-weight: 500;
    }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    /* 文件输入隐藏 */
    .file-input {
      display: none;
    }
    
    /* 响应式调整 */
    @media (max-width: 768px) {
      body { padding: 20px 12px; }
      .header { padding: 24px 16px; }
      .header h1 { font-size: 28px; }
      .card { padding: 16px; }
      .settings-grid { grid-template-columns: 1fr; }
      .btn-group { flex-direction: column; }
      .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div id="app" v-cloak>
    <!-- 主题切换按钮 -->
    <button class="theme-toggle" @click="toggleTheme" :title="isDark ? '切换到浅色模式' : '切换到深色模式'">
      {{ isDark ? '☀️' : '🌙' }}
    </button>

    <div class="container">
      <!-- 头部 -->
      <header class="header">
        <h1>📊 CSV 转 Markdown/HTML 表格</h1>
        <p>实时编辑 · 同步渲染 · 一键复制</p>
      </header>

      <!-- 设置面板 -->
      <div class="settings-panel">
        <div class="settings-grid">
          <div class="form-group">
            <label class="form-label">分隔符</label>
            <select v-model="delimiter" class="form-select">
              <option value=",">逗号 (,)</option>
              <option value=";">分号 (;)</option>
              <option value="|">竖线 (|)</option>
              <option value="	">Tab</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">表头</label>
            <select v-model="hasHeader" class="form-select">
              <option :value="true">有表头</option>
              <option :value="false">无表头</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Markdown 对齐</label>
            <select v-model="mdAlignment" class="form-select">
              <option value="left">左对齐</option>
              <option value="center">居中</option>
              <option value="right">右对齐</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">操作</label>
            <div class="btn-group">
              <button @click="loadExample" class="btn btn-secondary btn-sm">
                📝 加载示例
              </button>
              <button @click="clearAll" class="btn btn-secondary btn-sm">
                🗑️ 清空
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- 主编辑区 -->
      <div class="split-view">
        <!-- 左侧：CSV 输入 -->
        <div class="card">
          <div class="editor-header">
            <h3 class="editor-title">
              <span>📝</span> CSV 输入
            </h3>
            <div class="btn-group">
              <label class="btn btn-secondary btn-sm" style="cursor: pointer;">
                📁 导入文件
                <input type="file" accept=".csv,.txt" @change="importFile" class="file-input">
              </label>
              <button @click="copyCsv" class="btn btn-secondary btn-sm">
                📋 复制 CSV
              </button>
            </div>
          </div>
          <textarea 
            v-model="csvInput" 
            @input="parseAndRender"
            placeholder="请输入 CSV 数据，例如：&#10;姓名，年龄，城市&#10;张三，25，北京&#10;李四，30，上海"
            class="editor-textarea"
          ></textarea>
          <div class="stats-bar">
            <div class="stat-item">
              <span>📊</span>
              <span class="stat-value">{{ rowCount }}</span>
              <span>行</span>
            </div>
            <div class="stat-item">
              <span>📏</span>
              <span class="stat-value">{{ colCount }}</span>
              <span>列</span>
            </div>
          </div>
        </div>

        <!-- 右侧：输出 -->
        <div class="card">
          <div class="editor-header">
            <h3 class="editor-title">
              <span>📤</span> 输出结果
            </h3>
            <div class="btn-group">
              <button @click="copyOutput" class="btn btn-success btn-sm">
                ✅ 复制结果
              </button>
              <button @click="downloadOutput" class="btn btn-secondary btn-sm">
                💾 下载文件
              </button>
            </div>
          </div>
          
          <!-- 选项卡 -->
          <div class="tabs">
            <button class="tab" :class="{ active: outputType === 'markdown' }" @click="outputType = 'markdown'">
              📝 Markdown
            </button>
            <button class="tab" :class="{ active: outputType === 'html' }" @click="outputType = 'html'">
              🌐 HTML
            </button>
            <button class="tab" :class="{ active: outputType === 'preview' }" @click="outputType = 'preview'">
              👁️ 预览
            </button>
          </div>
          
          <!-- 输出内容 -->
          <div class="output-container">
            <!-- Markdown 输出 -->
            <div v-show="outputType === 'markdown'" class="output-box" v-text="markdownOutput"></div>
            
            <!-- HTML 输出 -->
            <div v-show="outputType === 'html'" class="output-box" v-text="htmlOutput"></div>
            
            <!-- 预览 -->
            <div v-show="outputType === 'preview'" class="preview-container">
              <table class="preview-table" v-if="tableRows.length > 0">
                <thead>
                  <tr>
                    <th v-for="(header, index) in tableHeaders" :key="index" v-text="header"></th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="(row, rowIndex) in tableRows" :key="rowIndex">
                    <td v-for="(cell, cellIndex) in row" :key="cellIndex" v-text="cell"></td>
                  </tr>
                </tbody>
              </table>
              <div v-else class="empty-state">
                <div class="empty-state-icon">📊</div>
                <p>暂无数据</p>
                <p style="font-size: 13px; margin-top: 8px;">在左侧输入 CSV 数据查看预览</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast 提示 -->
    <div v-if="toast.show" class="toast" v-text="toast.message"></div>
  </div>

  <script>
    const { createApp, ref, computed, onMounted } = Vue;

    createApp({
      setup() {
        const isDark = ref(false);
        const csvInput = ref('');
        const delimiter = ref(',');
        const hasHeader = ref(true);
        const mdAlignment = ref('left');
        const outputType = ref('markdown');
        const toast = ref({ show: false, message: '' });
        
        const parsedData = ref({ headers: [], rows: [] });
        const markdownOutput = ref('');
        const htmlOutput = ref('');

        const exampleData = `姓名，年龄，城市，职业
张三，25，北京，工程师
李四，30，上海，设计师
王五，28，广州，产品经理
赵六，35，深圳，数据科学家`;

        const rowCount = computed(() => parsedData.value.rows.length + (parsedData.value.headers.length > 0 ? 1 : 0));
        const colCount = computed(() => parsedData.value.headers.length || (parsedData.value.rows[0] ? parsedData.value.rows[0].length : 0));
        
        const tableHeaders = computed(() => parsedData.value.headers);
        const tableRows = computed(() => parsedData.value.rows);

        const toggleTheme = () => {
          isDark.value = !isDark.value;
          document.documentElement.setAttribute('data-theme', isDark.value ? 'dark' : 'light');
          localStorage.setItem('csv-converter-theme', isDark.value ? 'dark' : 'light');
        };

        const parseCSV = (text) => {
          if (!text.trim()) return { headers: [], rows: [] };
          
          const lines = text.trim().split('\n').map(line => line.trim());
          const rows = lines.map(line => {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
              const char = line[i];
              if (char === '"') {
                inQuotes = !inQuotes;
              } else if (char === delimiter.value && !inQuotes) {
                result.push(current.trim());
                current = '';
              } else {
                current += char;
              }
            }
            result.push(current.trim());
            return result;
          });
          
          if (hasHeader.value && rows.length > 0) {
            return { headers: rows[0], rows: rows.slice(1) };
          }
          
          return { headers: [], rows };
        };

        const generateMarkdown = (data) => {
          if (data.rows.length === 0 && data.headers.length === 0) return '';
          
          const headers = data.headers.length > 0 ? data.headers : data.rows[0] || [];
          const rows = data.headers.length > 0 ? data.rows : data.rows.slice(1);
          
          let md = '| ' + headers.join(' | ') + ' |\n';
          
          const align = mdAlignment.value;
          const separators = headers.map(() => {
            if (align === 'center') return ':---:';
            if (align === 'right') return '---:';
            return '---';
          });
          md += '| ' + separators.join(' | ') + ' |\n';
          
          rows.forEach(row => {
            md += '| ' + row.join(' | ') + ' |\n';
          });
          
          return md.trim();
        };

        const generateHTML = (data) => {
          if (data.rows.length === 0 && data.headers.length === 0) return '';
          
          const headers = data.headers.length > 0 ? data.headers : data.rows[0] || [];
          const rows = data.headers.length > 0 ? data.rows : data.rows.slice(1);
          
          let html = '<table>\n';
          
          if (headers.length > 0) {
            html += '  <thead>\n    <tr>\n';
            headers.forEach(h => {
              html += `      <th>${h}</th>\n`;
            });
            html += '    </tr>\n  </thead>\n';
          }
          
          if (rows.length > 0) {
            html += '  <tbody>\n';
            rows.forEach(row => {
              html += '    <tr>\n';
              row.forEach(cell => {
                html += `      <td>${cell}</td>\n`;
              });
              html += '    </tr>\n';
            });
            html += '  </tbody>\n';
          }
          
          html += '</table>';
          return html;
        };

        const parseAndRender = () => {
          parsedData.value = parseCSV(csvInput.value);
          markdownOutput.value = generateMarkdown(parsedData.value);
          htmlOutput.value = generateHTML(parsedData.value);
        };

        const loadExample = () => {
          csvInput.value = exampleData;
          parseAndRender();
          showToast('✅ 示例数据已加载');
        };

        const clearAll = () => {
          csvInput.value = '';
          parsedData.value = { headers: [], rows: [] };
          markdownOutput.value = '';
          htmlOutput.value = '';
          showToast('🗑️ 已清空');
        };

        const importFile = (event) => {
          const file = event.target.files[0];
          if (!file) return;
          
          const reader = new FileReader();
          reader.onload = (e) => {
            csvInput.value = e.target.result;
            parseAndRender();
            showToast('✅ 文件导入成功');
          };
          reader.readAsText(file);
          event.target.value = '';
        };

        const copyCsv = () => {
          if (!csvInput.value) {
            showToast('⚠️ 请先输入 CSV 数据');
            return;
          }
          navigator.clipboard.writeText(csvInput.value);
          showToast('✅ CSV 已复制');
        };

        const copyOutput = () => {
          let text = '';
          if (outputType.value === 'markdown') {
            text = markdownOutput.value;
          } else if (outputType.value === 'html') {
            text = htmlOutput.value;
          } else {
            showToast('⚠️ 预览模式无法复制');
            return;
          }
          
          if (!text) {
            showToast('⚠️ 没有可复制的内容');
            return;
          }
          
          navigator.clipboard.writeText(text);
          showToast('✅ 已复制到剪贴板');
        };

        const downloadOutput = () => {
          let text = '';
          let filename = '';
          let type = 'text/plain';
          
          if (outputType.value === 'markdown') {
            text = markdownOutput.value;
            filename = 'table.md';
            type = 'text/markdown';
          } else if (outputType.value === 'html') {
            text = htmlOutput.value;
            filename = 'table.html';
            type = 'text/html';
          } else {
            showToast('⚠️ 预览模式无法下载');
            return;
          }
          
          if (!text) {
            showToast('⚠️ 没有可下载的内容');
            return;
          }
          
          const blob = new Blob([text], { type });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          a.click();
          URL.revokeObjectURL(url);
          showToast('✅ 文件已下载');
        };

        const showToast = (message) => {
          toast.value = { show: true, message };
          setTimeout(() => {
            toast.value.show = false;
          }, 2000);
        };

        onMounted(() => {
          const savedTheme = localStorage.getItem('csv-converter-theme') || 'light';
          isDark.value = savedTheme === 'dark';
          document.documentElement.setAttribute('data-theme', savedTheme);
          loadExample();
        });

        return {
          isDark,
          toggleTheme,
          csvInput,
          delimiter,
          hasHeader,
          mdAlignment,
          outputType,
          toast,
          rowCount,
          colCount,
          tableHeaders,
          tableRows,
          markdownOutput,
          htmlOutput,
          parseAndRender,
          loadExample,
          clearAll,
          importFile,
          copyCsv,
          copyOutput,
          downloadOutput
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
