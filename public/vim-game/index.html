<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vim 大冒险 - 学习 Vim 编辑器</title>
  <style>
    :root {
      --bg-primary: #1e1e2e;
      --bg-secondary: #2d2d44;
      --bg-editor: #282a36;
      --text-primary: #f8f8f2;
      --text-secondary: #a8a8b8;
      --accent: #bd93f9;
      --success: #50fa7b;
      --warning: #f1fa8c;
      --error: #ff5555;
      --cursor: #ffb86c;
      --line-num: #6272a4;
      --selection: #44475a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--bg-secondary);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--accent);
      flex-wrap: wrap;
      gap: 10px;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon { font-size: 2rem; }

    .stats { display: flex; gap: 15px; flex-wrap: wrap; }

    .stat-item {
      background: var(--bg-editor);
      padding: 8px 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-label { color: var(--text-secondary); font-size: 0.85rem; }
    .stat-value { font-weight: bold; color: var(--success); }

    /* 关卡选择器 */
    .level-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px 20px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--selection);
      overflow-x: auto;
    }

    .level-btn {
      min-width: 50px;
      height: 50px;
      border-radius: 8px;
      border: 2px solid var(--selection);
      background: var(--bg-editor);
      color: var(--text-primary);
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      padding: 5px;
    }

    .level-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
    .level-btn.active { border-color: var(--success); background: rgba(80, 250, 123, 0.1); }
    .level-btn.completed { border-color: var(--success); background: rgba(80, 250, 123, 0.2); }
    .level-btn .level-num { font-size: 1.1rem; font-weight: bold; }
    .level-btn .level-icon { font-size: 0.9rem; margin-top: 2px; }

    .main-container { display: flex; flex: 1; overflow: hidden; }

    .tutorial-panel {
      width: 300px;
      background: var(--bg-secondary);
      padding: 20px;
      overflow-y: auto;
      border-right: 1px solid var(--selection);
    }

    .tutorial-title {
      font-size: 1.2rem;
      color: var(--accent);
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--selection);
    }

    .tutorial-content { line-height: 1.8; color: var(--text-secondary); }
    .tutorial-content p { margin-bottom: 15px; }
    .tutorial-content strong { color: var(--warning); }

    .key-badge {
      display: inline-block;
      background: var(--bg-editor);
      padding: 3px 8px;
      border-radius: 4px;
      font-family: monospace;
      border: 1px solid var(--line-num);
      color: var(--text-primary);
      margin: 0 2px;
    }

    .command-list {
      background: var(--bg-editor);
      border-radius: 8px;
      padding: 15px;
      margin: 15px 0;
    }

    .command-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--selection);
    }

    .command-item:last-child { border-bottom: none; }
    .command-key { color: var(--accent); font-weight: bold; }
    .command-desc { color: var(--text-secondary); font-size: 0.9rem; }

    .editor-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-editor);
      overflow: hidden;
    }

    .editor-header {
      background: var(--bg-secondary);
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--selection);
    }

    .file-name { color: var(--text-secondary); font-size: 0.9rem; }

    .mode-indicator {
      padding: 5px 15px;
      border-radius: 5px;
      font-weight: bold;
      font-size: 0.85rem;
      text-transform: uppercase;
    }

    .mode-normal { background: var(--accent); color: var(--bg-primary); }
    .mode-insert { background: var(--success); color: var(--bg-primary); }
    .mode-visual { background: var(--warning); color: var(--bg-primary); }

    .editor-content {
      flex: 1;
      display: flex;
      overflow: hidden;
      font-size: 1rem;
      line-height: 1.6;
    }

    .line-numbers {
      background: var(--bg-secondary);
      padding: 15px 10px;
      text-align: right;
      color: var(--line-num);
      user-select: none;
      min-width: 50px;
    }

    .line-number { height: 1.6em; }

    .code-area {
      flex: 1;
      padding: 15px;
      overflow: auto;
      position: relative;
    }

    .code-line {
      height: 1.6em;
      white-space: pre;
      position: relative;
    }

    .code-line.active { background: var(--selection); }

    .cursor {
      background: var(--cursor);
      color: var(--bg-primary);
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    .cursor.insert {
      animation: none;
      border-left: 2px solid var(--cursor);
      background: transparent;
    }

    .command-input-container {
      background: var(--bg-secondary);
      padding: 15px 20px;
      border-top: 1px solid var(--selection);
    }

    .command-prompt {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .prompt-symbol { color: var(--accent); font-weight: bold; }

    .command-input {
      flex: 1;
      background: var(--bg-editor);
      border: 2px solid var(--selection);
      border-radius: 5px;
      padding: 10px 15px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .command-input:focus { border-color: var(--accent); }
    .command-input.error { border-color: var(--error); animation: shake 0.3s; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .task-panel {
      width: 260px;
      background: var(--bg-secondary);
      padding: 20px;
      border-left: 1px solid var(--selection);
      overflow-y: auto;
    }

    .task-title {
      font-size: 1.1rem;
      color: var(--accent);
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--selection);
    }

    .task-objective {
      background: var(--bg-editor);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .task-objective h4 { color: var(--warning); margin-bottom: 10px; font-size: 0.95rem; }
    .task-objective p { color: var(--text-secondary); line-height: 1.6; font-size: 0.9rem; }

    .task-hint {
      background: rgba(241, 250, 140, 0.1);
      border: 1px solid var(--warning);
      border-radius: 5px;
      padding: 12px;
      margin-top: 15px;
    }

    .task-hint-title { color: var(--warning); font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; }
    .task-hint p { color: var(--text-secondary); font-size: 0.85rem; line-height: 1.5; }

    .message-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-editor);
      border: 2px solid var(--accent);
      border-radius: 10px;
      padding: 15px 30px;
      font-size: 1rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
    }

    .message-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .message-toast.success { border-color: var(--success); background: rgba(80, 250, 123, 0.1); }
    .message-toast.error { border-color: var(--error); background: rgba(255, 85, 85, 0.1); }

    .level-complete-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .level-complete-modal.show { display: flex; }

    .modal-content {
      background: var(--bg-secondary);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      max-width: 500px;
      border: 2px solid var(--accent);
    }

    .modal-title { font-size: 2rem; color: var(--success); margin-bottom: 20px; }

    .modal-stats {
      display: flex;
      justify-content: space-around;
      margin: 20px 0;
    }

    .modal-stat { text-align: center; }
    .modal-stat-value { font-size: 2rem; font-weight: bold; color: var(--accent); }
    .modal-stat-label { color: var(--text-secondary); font-size: 0.9rem; margin-top: 5px; }

    .modal-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 30px;
    }

    .modal-btn {
      padding: 12px 30px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-btn.primary { background: var(--accent); color: var(--bg-primary); }
    .modal-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(189, 147, 249, 0.4); }
    .modal-btn.secondary { background: var(--bg-editor); color: var(--text-primary); border: 1px solid var(--selection); }
    .modal-btn.secondary:hover { background: var(--selection); }

    .selected { background: var(--selection); }

    .welcome-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3000;
    }

    .welcome-content { text-align: center; max-width: 600px; padding: 40px; }
    .welcome-title { font-size: 3rem; color: var(--accent); margin-bottom: 20px; }
    .welcome-subtitle { color: var(--text-secondary); font-size: 1.2rem; margin-bottom: 40px; }

    .welcome-features {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 40px;
      text-align: left;
    }

    .feature-item {
      background: var(--bg-secondary);
      padding: 20px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .feature-icon { font-size: 2rem; }
    .feature-text { color: var(--text-secondary); }

    .start-btn {
      background: linear-gradient(135deg, var(--accent), var(--success));
      color: var(--bg-primary);
      padding: 15px 50px;
      border: none;
      border-radius: 10px;
      font-size: 1.3rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }

    .start-btn:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(189, 147, 249, 0.4); }

    .progress-container {
      padding: 10px 20px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--selection);
    }

    .progress-bar {
      background: var(--bg-editor);
      border-radius: 10px;
      height: 8px;
      overflow: hidden;
    }

    .progress-fill {
      background: linear-gradient(90deg, var(--accent), var(--success));
      height: 100%;
      transition: width 0.3s ease;
      border-radius: 10px;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    @media (max-width: 1024px) {
      .main-container { flex-direction: column; }
      .tutorial-panel, .task-panel { width: 100%; max-height: 250px; border-right: none; border-left: none; }
      .tutorial-panel { border-bottom: 1px solid var(--selection); }
      .task-panel { border-top: 1px solid var(--selection); }
    }
  </style>
</head>
<body>
  <!-- 欢迎屏幕 -->
  <div class="welcome-screen" id="welcome-screen">
    <div class="welcome-content">
      <h1 class="welcome-title">🎮 Vim 大冒险</h1>
      <p class="welcome-subtitle">15 个关卡，从零成为 Vim 大师！</p>
      
      <div class="welcome-features">
        <div class="feature-item">
          <span class="feature-icon">🎯</span>
          <span class="feature-text">15 个关卡，循序渐进</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">⌨️</span>
          <span class="feature-text">实战练习 Vim 命令</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">📊</span>
          <span class="feature-text">实时反馈和统计</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">🏆</span>
          <span class="feature-text">挑战高分成就</span>
        </div>
      </div>

      <button class="start-btn" onclick="game.start()">开始冒险</button>
    </div>
  </div>

  <!-- 头部 -->
  <header class="header">
    <div class="logo">
      <span class="logo-icon">📜</span>
      <span>Vim 大冒险</span>
    </div>
    <div class="stats">
      <div class="stat-item">
        <span class="stat-label">关卡</span>
        <span class="stat-value" id="level-display">1</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">得分</span>
        <span class="stat-value" id="score-display">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">生命</span>
        <span class="stat-value" id="lives-display">❤️❤️❤️</span>
      </div>
    </div>
  </header>

  <!-- 关卡选择器 -->
  <div class="level-selector" id="level-selector"></div>

  <!-- 进度条 -->
  <div class="progress-container">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
    </div>
    <div class="progress-text">
      <span id="progress-text">进度：0/15</span>
      <span id="completion-text">完成率：0%</span>
    </div>
  </div>

  <!-- 主容器 -->
  <div class="main-container">
    <!-- 左侧 - 教学面板 -->
    <aside class="tutorial-panel">
      <h2 class="tutorial-title">📖 命令参考</h2>
      <div class="tutorial-content" id="tutorial-content"></div>
    </aside>

    <!-- 编辑器区域 -->
    <main class="editor-container">
      <div class="editor-header">
        <span class="file-name" id="file-name">level_1.txt</span>
        <span class="mode-indicator mode-normal" id="mode-indicator">NORMAL</span>
      </div>
      
      <div class="editor-content">
        <div class="line-numbers" id="line-numbers"></div>
        <div class="code-area" id="code-area"></div>
      </div>

      <div class="command-input-container">
        <div class="command-prompt">
          <span class="prompt-symbol">:</span>
          <input type="text" class="command-input" id="command-input" placeholder="输入 Vim 命令..." autocomplete="off" autofocus>
        </div>
      </div>
    </main>

    <!-- 右侧 - 任务面板 -->
    <aside class="task-panel">
      <h2 class="task-title">🎯 当前任务</h2>
      <div class="task-objective">
        <h4 id="task-title">任务目标</h4>
        <p id="task-description">任务描述</p>
      </div>
      <div class="task-hint" id="task-hint">
        <div class="task-hint-title">💡 提示</div>
        <p id="hint-text">提示内容</p>
      </div>
    </aside>
  </div>

  <!-- 消息提示 -->
  <div class="message-toast" id="message-toast"></div>

  <!-- 关卡完成弹窗 -->
  <div class="level-complete-modal" id="level-complete-modal">
    <div class="modal-content">
      <h2 class="modal-title" id="modal-title">🎉 关卡完成!</h2>
      <div class="modal-stats">
        <div class="modal-stat">
          <div class="modal-stat-value" id="level-score">100</div>
          <div class="modal-stat-label">本关得分</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-value" id="total-score">500</div>
          <div class="modal-stat-label">总分</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-value" id="moves-count">5</div>
          <div class="modal-stat-label">使用步数</div>
        </div>
      </div>
      <div class="modal-buttons">
        <button class="modal-btn secondary" onclick="game.restartLevel()">重试</button>
        <button class="modal-btn primary" onclick="game.nextLevel()">下一关</button>
      </div>
    </div>
  </div>

  <script>
    const levels = [
      { id: 1, title: "初识 Vim", icon: "🚀", category: "移动", content: `function hello() {\n  console.log("Hello Vim!");\n  return true;\n}`, fileName: "level_1.txt", initialPosition: { row: 0, col: 0 }, targetPosition: { row: 2, col: 0 }, commands: ['h', 'j', 'k', 'l'], tutorial: `<p>欢迎来到 <strong>Vim 大冒险</strong>！学习最基本的移动命令。</p><div class="command-list"><div class="command-item"><span class="command-key">h</span><span class="command-desc">向左移动</span></div><div class="command-item"><span class="command-key">j</span><span class="command-desc">向下移动</span></div><div class="command-item"><span class="command-key">k</span><span class="command-desc">向上移动</span></div><div class="command-item"><span class="command-key">l</span><span class="command-desc">向右移动</span></div></div><p><strong>任务：</strong>使用 <span class="key-badge">j</span> 键将光标移动到最后一行。</p>`, task: { title: "移动光标到最后一行", description: "使用 j 键向下移动，将光标移动到代码的最后一行。", hint: "按 j 键可以向下移动一行。连续按两次 j 键即可到达目标位置。" } },
      { id: 2, title: "单词导航", icon: "⚡", category: "移动", content: `const name = "Vim Master";\nconst version = 1.0;\nconst author = "You";`, fileName: "level_2.txt", initialPosition: { row: 0, col: 0 }, targetPosition: { row: 2, col: 12 }, commands: ['w', 'b', 'e'], tutorial: `<p>按 <strong>单词</strong> 快速移动！</p><div class="command-list"><div class="command-item"><span class="command-key">w</span><span class="command-desc">移动到下一个单词开头</span></div><div class="command-item"><span class="command-key">b</span><span class="command-desc">移动到上一个单词开头</span></div><div class="command-item"><span class="command-key">e</span><span class="command-desc">移动到单词末尾</span></div></div><p><strong>任务：</strong>使用 <span class="key-badge">w</span> 和 <span class="key-badge">e</span> 移动到 "You" 末尾。</p>`, task: { title: "移动到 'You' 的末尾", description: "使用 w 键跳到下一个单词，使用 e 键移动到单词末尾。", hint: "按 w w w 跳到第三行的 'You'，然后按 e 移动到末尾。" } },
      { id: 3, title: "行首行尾", icon: "📍", category: "移动", content: `// TODO: Implement\n// FIXME: Bug here\n// HACK: Temp`, fileName: "level_3.txt", initialPosition: { row: 1, col: 5 }, targetPosition: { row: 1, col: 18 }, commands: ['0', '^', '$'], tutorial: `<p>快速移动到 <strong>行首</strong> 和 <strong>行尾</strong>。</p><div class="command-list"><div class="command-item"><span class="command-key">0</span><span class="command-desc">移动到行首</span></div><div class="command-item"><span class="command-key">^</span><span class="command-desc">移动到第一个非空字符</span></div><div class="command-item"><span class="command-key">$</span><span class="command-desc">移动到行尾</span></div></div><p><strong>任务：</strong>使用 <span class="key-badge">$</span> 移动到行尾。</p>`, task: { title: "移动到行尾", description: "使用 $ 键快速移动到该行的最后一个字符。", hint: "直接按 $ 键即可。" } },
      { id: 4, title: "删除字符", icon: "❌", category: "删除", content: `function greet(name) {\n  console.log("Hello, " + name);\n}`, fileName: "level_4.txt", initialPosition: { row: 1, col: 14 }, deleteTarget: { row: 1, startCol: 14, endCol: 19 }, commands: ['x', 'dw', 'dd'], tutorial: `<p><strong>删除</strong> 是 Vim 中最常用的操作。</p><div class="command-list"><div class="command-item"><span class="command-key">x</span><span class="command-desc">删除当前字符</span></div><div class="command-item"><span class="command-key">dw</span><span class="command-desc">删除一个单词</span></div><div class="command-item"><span class="command-key">dd</span><span class="command-desc">删除整行</span></div></div><p><strong>任务：</strong>使用 <span class="key-badge">x</span> 删除 "Hello"（按 5 次）。</p>`, task: { title: "删除 'Hello' 单词", description: "将光标移动到 'Hello' 的 'H' 上，然后按 5 次 x。", hint: "先使用 b 键移动到 'Hello' 开头，然后按 5 次 x。" } },

      { id: 14, title: "标记跳转", icon: "📌", category: "进阶", content: `// Line 1\n// Line 2\n// Line 3\n// Line 4`, fileName: "level_14.txt", initialPosition: { row: 0, col: 0 }, targetPosition: { row: 3, col: 0 }, commands: ['ma', "'a", 'G', 'gg'], tutorial: `<p><strong>标记</strong> 允许你标记位置并跳转。</p><div class="command-list"><div class="command-item"><span class="command-key">ma</span><span class="command-desc">设置标记 a</span></div><div class="command-item"><span class="command-key">'a</span><span class="command-desc">跳转到标记 a</span></div><div class="command-item"><span class="command-key">G</span><span class="command-desc">跳转到文件末尾</span></div><div class="command-item"><span class="command-key">gg</span><span class="command-desc">跳转到文件开头</span></div></div><p><strong>任务：</strong>使用 <span class="key-badge">G</span> 跳转到文件末尾。</p>`, task: { title: "跳转到文件末尾", description: "使用 G 命令跳转到最后一行。", hint: "按 Shift+G 即可。" } },
      { id: 15, title: "终极挑战", icon: "🏆", category: "挑战", content: `// TODO: Create func\n// TODO: Add tests\n// FIXME: Optimize`, fileName: "level_15.txt", initialPosition: { row: 0, col: 0 }, targetContent: `// DONE: Create func\n// DONE: Add tests\n// FIXED: Optimize`, commands: [':%s/TODO/DONE/g'], tutorial: `<p><strong>终极挑战</strong>！综合运用所有技能。</p><p>目标：将 "TODO" 改为 "DONE"，将 "FIXME" 改为 "FIXED"。</p>`, task: { title: "完成所有任务标记", description: "将 TODO 改为 DONE，FIXME 改为 FIXED。", hint: "输入 :%s/TODO/DONE/g 和 :%s/FIXME/FIXED/g。" } }
    ];

    class VimGame {
      constructor() {
        this.currentLevel = 0;
        this.score = 0;
        this.lives = 3;
        this.moves = 0;
        this.cursor = { row: 0, col: 0 };
        this.mode = 'normal';
        this.content = [];
        this.selectedRange = null;
        this.levelScore = 0;
        this.isInsertMode = false;
        this.clipboard = null;
        this.lastKey = null;
        this.completedLevels = new Set();
        this.pendingPrefix = null;
      }

      start() {
        document.getElementById('welcome-screen').style.display = 'none';
        this.loadLevel(0);
        this.setupInput();
        this.renderLevelSelector();
        this.updateProgress();
      }

      renderLevelSelector() {
        const container = document.getElementById('level-selector');
        container.innerHTML = levels.map((level, index) => {
          const isCompleted = this.completedLevels.has(index);
          const isActive = index === this.currentLevel;
          return `<button class="level-btn ${isCompleted ? 'completed' : ''} ${isActive ? 'active' : ''}" onclick="game.selectLevel(${index})" title="${level.title}"><span class="level-num">${index + 1}</span><span class="level-icon">${isCompleted ? '✅' : level.icon}</span></button>`;
        }).join('');
      }

      selectLevel(index) {
        if (index < 0 || index >= levels.length) return;
        this.loadLevel(index);
        this.renderLevelSelector();
      }

      loadLevel(index) {
        if (index >= levels.length) { this.showGameComplete(); return; }
        this.currentLevel = index;
        const level = levels[index];
        this.cursor = { ...level.initialPosition };
        this.content = level.content.split('\n');
        this.moves = 0;
        this.levelScore = 100;
        this.mode = 'normal';
        this.isInsertMode = false;
        this.selectedRange = null;
        this.clipboard = null;
        this.pendingPrefix = null;

        document.getElementById('level-display').textContent = `${index + 1}/${levels.length}`;
        document.getElementById('file-name').textContent = level.fileName;
        document.getElementById('tutorial-content').innerHTML = level.tutorial;
        document.getElementById('task-title').textContent = level.task.title;
        document.getElementById('task-description').textContent = level.task.description;
        document.getElementById('hint-text').textContent = level.task.hint;

        this.render();
        this.showMessage(`关卡 ${index + 1}: ${level.title}`, 'normal');
        this.updateProgress();
      }

      updateProgress() {
        const completed = this.completedLevels.size;
        const total = levels.length;
        const percentage = Math.round((completed / total) * 100);
        document.getElementById('progress-fill').style.width = `${percentage}%`;
        document.getElementById('progress-text').textContent = `进度：${completed}/${total}`;
        document.getElementById('completion-text').textContent = `完成率：${percentage}%`;
      }

      render() {
        const lineNumbersEl = document.getElementById('line-numbers');
        lineNumbersEl.innerHTML = this.content.map((_, i) => `<div class="line-number">${i + 1}</div>`).join('');

        const codeAreaEl = document.getElementById('code-area');
        codeAreaEl.innerHTML = this.content.map((line, i) => {
          let renderedLine = line;
          if (i === this.cursor.row) {
            const chars = renderedLine.split('');
            const cursorCol = Math.min(this.cursor.col, chars.length);
            if (this.mode === 'visual' && this.selectedRange) {
              const { start, end } = this.selectedRange;
              const minCol = Math.min(start.col, end.col);
              const maxCol = Math.max(start.col, end.col);
              if (i === start.row && i === end.row) {
                const before = chars.slice(0, minCol).join('');
                const selected = chars.slice(minCol, maxCol + 1).join('');
                const after = chars.slice(maxCol + 1).join('');
                renderedLine = before + `<span class="selected">${selected}</span>` + after;
              }
            }
            if (this.mode === 'insert') {
              const before = renderedLine.substring(0, cursorCol);
              const cursorChar = renderedLine[cursorCol] || ' ';
              const after = renderedLine.substring(cursorCol + 1);
              renderedLine = before + `<span class="cursor insert">${cursorChar}</span>` + after;
            } else {
              const before = renderedLine.substring(0, cursorCol);
              const cursorChar = renderedLine[cursorCol] || ' ';
              const after = renderedLine.substring(cursorCol + 1);
              renderedLine = before + `<span class="cursor">${cursorChar}</span>` + after;
            }
          }
          return `<div class="code-line ${i === this.cursor.row ? 'active' : ''}">${renderedLine || ' '}</div>`;
        }).join('');

        const modeEl = document.getElementById('mode-indicator');
        modeEl.textContent = this.mode.toUpperCase();
        modeEl.className = 'mode-indicator';
        if (this.mode === 'normal') modeEl.classList.add('mode-normal');
        else if (this.mode === 'insert') modeEl.classList.add('mode-insert');
        else if (this.mode === 'visual') modeEl.classList.add('mode-visual');

        document.getElementById('lives-display').textContent = '❤️'.repeat(this.lives);
        document.getElementById('score-display').textContent = this.score;
      }

      setupInput() {
        const input = document.getElementById('command-input');
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            const command = input.value.trim();
            if (command) { this.executeCommand(command); input.value = ''; }
            e.preventDefault();
          }
        });

        document.addEventListener('keydown', (e) => {
          if (document.activeElement === input && e.key !== 'Escape') return;
          if (this.mode === 'insert') {
            if (e.key === 'Escape') { this.mode = 'normal'; this.isInsertMode = false; this.render(); e.preventDefault(); return; }
            if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) { this.insertCharacter(e.key); e.preventDefault(); return; }
            if (e.key === 'Backspace') { this.deleteCharacter(); e.preventDefault(); return; }
          }
          if (this.mode === 'visual') { this.handleVisualMode(e); return; }
          this.handleNormalMode(e);
        });
      }

      handleNormalMode(e) {
        const key = e.key;
        let moved = false;

        if (/^[1-9]$/.test(key)) { this.pendingPrefix = key; return; }
        if (this.pendingPrefix) {
          const count = parseInt(this.pendingPrefix);
          if (/^[0-9]$/.test(key)) { this.pendingPrefix += key; return; }
          for (let i = 0; i < count; i++) { this.executeKeyCommand(key); }
          this.pendingPrefix = null;
          moved = true;
        } else {
          moved = this.executeKeyCommand(key);
        }

        if (moved) {
          this.moves++;
          this.levelScore = Math.max(0, this.levelScore - 1);
          this.render();
          this.checkLevelComplete();
        }
      }

      executeKeyCommand(key) {
        let moved = false;
        switch (key) {
          case 'h': if (this.cursor.col > 0) { this.cursor.col--; moved = true; } break;
          case 'l': if (this.cursor.col < this.content[this.cursor.row].length) { this.cursor.col++; moved = true; } break;
          case 'j': if (this.cursor.row < this.content.length - 1) { this.cursor.row++; this.cursor.col = Math.min(this.cursor.col, this.content[this.cursor.row].length); moved = true; } break;
          case 'k': if (this.cursor.row > 0) { this.cursor.row--; this.cursor.col = Math.min(this.cursor.col, this.content[this.cursor.row].length); moved = true; } break;
          case 'w': this.moveToNextWord(); moved = true; break;
          case 'b': this.moveToPrevWord(); moved = true; break;
          case 'e': this.moveToWordEnd(); moved = true; break;
          case '0': this.cursor.col = 0; moved = true; break;
          case '^': this.cursor.col = this.content[this.cursor.row].search(/\S/); if (this.cursor.col === -1) this.cursor.col = 0; moved = true; break;
          case '$': this.cursor.col = this.content[this.cursor.row].length; moved = true; break;
          case 'G': this.cursor.row = this.content.length - 1; this.cursor.col = 0; moved = true; break;
          case 'g': if (this.lastKey === 'g') { this.cursor.row = 0; this.cursor.col = 0; moved = true; } this.lastKey = 'g'; setTimeout(() => this.lastKey = null, 500); return;
          case 'x': this.deleteChar(); moved = true; break;
          case 'i': this.mode = 'insert'; this.isInsertMode = true; this.render(); e && e.preventDefault(); return;
          case 'a': this.cursor.col = Math.min(this.cursor.col + 1, this.content[this.cursor.row].length); this.mode = 'insert'; this.isInsertMode = true; this.render(); e && e.preventDefault(); return;
          case 'A': this.cursor.col = this.content[this.cursor.row].length; this.mode = 'insert'; this.isInsertMode = true; this.render(); e && e.preventDefault(); return;
          case 'I': this.cursor.col = this.content[this.cursor.row].search(/\S/); if (this.cursor.col === -1) this.cursor.col = 0; this.mode = 'insert'; this.isInsertMode = true; this.render(); e && e.preventDefault(); return;
          case 'o': this.content.splice(this.cursor.row + 1, 0, ''); this.cursor.row++; this.cursor.col = 0; this.mode = 'insert'; this.isInsertMode = true; this.render(); e && e.preventDefault(); return;
          case 'v': this.mode = 'visual'; this.selectedRange = { start: { ...this.cursor }, end: { ...this.cursor } }; this.render(); e && e.preventDefault(); return;
          case 'y': if (this.lastKey === 'y') { this.clipboard = this.content[this.cursor.row]; this.showMessage('已复制一行', 'success'); } this.lastKey = 'y'; setTimeout(() => this.lastKey = null, 500); return;
          case 'p': if (this.clipboard) { this.content.splice(this.cursor.row + 1, 0, this.clipboard); this.moves++; this.render(); this.checkLevelComplete(); } return;
        }
        this.lastKey = key;
        return moved;
      }

      handleVisualMode(e) {
        const key = e.key;
        switch (key) {
          case 'Escape': this.mode = 'normal'; this.selectedRange = null; this.render(); e.preventDefault(); return;
          case 'h': if (this.cursor.col > 0) { this.cursor.col--; this.selectedRange.end = { ...this.cursor }; } break;
          case 'l': if (this.cursor.col < this.content[this.cursor.row].length) { this.cursor.col++; this.selectedRange.end = { ...this.cursor }; } break;
          case 'j': if (this.cursor.row < this.content.length - 1) { this.cursor.row++; this.cursor.col = Math.min(this.cursor.col, this.content[this.cursor.row].length); this.selectedRange.end = { ...this.cursor }; } break;
          case 'k': if (this.cursor.row > 0) { this.cursor.row--; this.cursor.col = Math.min(this.cursor.col, this.content[this.cursor.row].length); this.selectedRange.end = { ...this.cursor }; } break;
          case '$': this.cursor.col = this.content[this.cursor.row].length; this.selectedRange.end = { ...this.cursor }; break;
          case 'd': this.deleteSelection(); this.mode = 'normal'; this.selectedRange = null; this.render(); e.preventDefault(); return;
        }
        this.render();
        e.preventDefault();
      }

      insertCharacter(char) {
        const row = this.cursor.row, col = this.cursor.col;
        const line = this.content[row];
        this.content[row] = line.substring(0, col) + char + line.substring(col);
        this.cursor.col++;
        this.moves++;
        this.render();
        this.checkLevelComplete();
      }

      deleteCharacter() {
        const row = this.cursor.row, col = this.cursor.col;
        if (col > 0) {
          const line = this.content[row];
          this.content[row] = line.substring(0, col - 1) + line.substring(col);
          this.cursor.col--;
          this.moves++;
          this.render();
        }
      }

      deleteChar() {
        const row = this.cursor.row, col = this.cursor.col;
        const line = this.content[row];
        if (col < line.length) {
          this.content[row] = line.substring(0, col) + line.substring(col + 1);
          this.moves++;
          this.render();
        }
      }

      moveToNextWord() {
        const line = this.content[this.cursor.row];
        let col = this.cursor.col;
        while (col < line.length && !/\s/.test(line[col])) col++;
        while (col < line.length && /\s/.test(line[col])) col++;
        if (col < line.length) { this.cursor.col = col; }
        else if (this.cursor.row < this.content.length - 1) { this.cursor.row++; this.cursor.col = 0; }
      }

      moveToPrevWord() {
        const line = this.content[this.cursor.row];
        let col = this.cursor.col;
        while (col > 0 && /\s/.test(line[col - 1])) col--;
        while (col > 0 && !/\s/.test(line[col - 1])) col--;
        this.cursor.col = col;
      }

      moveToWordEnd() {
        const line = this.content[this.cursor.row];
        let col = this.cursor.col;
        while (col < line.length && /\s/.test(line[col])) col++;
        while (col < line.length - 1 && !/\s/.test(line[col + 1])) col++;
        this.cursor.col = col;
      }

      executeCommand(command) {
        if (command.startsWith(':s/') || command.startsWith(':%s/')) {
          const isGlobal = command.startsWith(':%s/');
          const parts = command.split('/');
          if (parts.length >= 3) {
            const oldText = parts[1], newText = parts[2];
            if (isGlobal) { this.content = this.content.map(line => line.split(oldText).join(newText)); }
            else { this.content[this.cursor.row] = this.content[this.cursor.row].replace(oldText, newText); }
            this.moves++;
            this.render();
            this.checkLevelComplete();
            this.showMessage(`已替换 "${oldText}" 为 "${newText}"`, 'success');
          }
          return;
        }
        if (/^\d+[hjklwbex]+$/.test(command)) {
          const match = command.match(/^(\d+)([hjklwbex]+)$/);
          if (match) {
            const count = parseInt(match[1]), cmd = match[2];
            for (let i = 0; i < count; i++) { this.executeKeyCommand(cmd[0]); }
            this.moves++;
            this.render();
            this.checkLevelComplete();
          }
          return;
        }
        if (command.startsWith('/')) {
          const searchTerm = command.substring(1);
          const text = this.content.join('\n');
          const index = text.indexOf(searchTerm);
          if (index !== -1) {
            const before = text.substring(0, index);
            const lines = before.split('\n');
            this.cursor.row = lines.length - 1;
            this.cursor.col = lines[lines.length - 1].length;
            this.showMessage(`找到 "${searchTerm}"`, 'success');
          } else { this.showMessage(`未找到 "${searchTerm}"`, 'error'); }
          this.moves++;
          this.render();
          this.checkLevelComplete();
          return;
        }
        if (command === 'wq' || command === 'x') {
          if (this.currentLevel === 9 || this.currentLevel === 14) { this.completeLevel(); }
          return;
        }
        if (command === 'w') { this.showMessage('文件已保存', 'success'); return; }
        if (command === 'q' || command === 'q!') {
          this.lives--;
          if (this.lives <= 0) { this.showMessage('游戏结束！', 'error'); setTimeout(() => location.reload(), 2000); }
          else { this.showMessage('失去一条生命', 'error'); }
          return;
        }
      }

      checkLevelComplete() {
        const level = levels[this.currentLevel];
        let complete = false;
        if (level.targetPosition && this.cursor.row === level.targetPosition.row && this.cursor.col === level.targetPosition.col) { complete = true; }
        if (level.targetContent && this.content.join('') === level.targetContent) { complete = true; }
        if (level.targetLines && this.content.length >= level.targetLines) { complete = true; }
        if (level.deleteTarget) {
          const currentLine = this.content[level.deleteTarget.row] || '';
          const shouldDelete = currentLine.substring(level.deleteTarget.startCol, level.deleteTarget.endCol);
          if (!shouldDelete || shouldDelete.trim() === '') { complete = true; }
        }
        if (level.targetSelection && this.selectedRange) {
          const { start, end } = level.targetSelection;
          if (this.selectedRange.start.row <= start.row && this.selectedRange.start.col <= start.col &&
              this.selectedRange.end.row >= end.row && this.selectedRange.end.col >= end.col) { complete = true; }
        }
        if (complete) { this.completeLevel(); }
      }

      completeLevel() {
        this.score += this.levelScore;
        this.completedLevels.add(this.currentLevel);
        document.getElementById('level-score').textContent = this.levelScore;
        document.getElementById('total-score').textContent = this.score;
        document.getElementById('moves-count').textContent = this.moves;
        document.getElementById('level-complete-modal').classList.add('show');
        this.showMessage('关卡完成！', 'success');
        this.renderLevelSelector();
        this.updateProgress();
      }

      nextLevel() {
        document.getElementById('level-complete-modal').classList.remove('show');
        this.selectLevel(this.currentLevel + 1);
      }

      restartLevel() {
        document.getElementById('level-complete-modal').classList.remove('show');
        this.loadLevel(this.currentLevel);
      }

      showMessage(text, type = 'normal') {
        const toast = document.getElementById('message-toast');
        toast.textContent = text;
        toast.className = 'message-toast show';
        if (type === 'success') toast.classList.add('success');
        if (type === 'error') toast.classList.add('error');
        setTimeout(() => toast.classList.remove('show'), 2000);
      }

      showGameComplete() {
        document.getElementById('welcome-screen').style.display = 'flex';
        document.querySelector('.welcome-title').textContent = '🏆 恭喜通关！';
        document.querySelector('.welcome-subtitle').textContent = `最终得分：${this.score} - 完成率：${this.completedLevels.size}/${levels.length}`;
        document.querySelector('.start-btn').textContent = '重新开始';
        document.querySelector('.start-btn').onclick = () => location.reload();
        this.showMessage('感谢游玩 Vim 大冒险！', 'success');
      }

      deleteSelection() {
        if (!this.selectedRange) return;
        const { start, end } = this.selectedRange;
        const minRow = Math.min(start.row, end.row), maxRow = Math.max(start.row, end.row);
        for (let i = maxRow; i >= minRow; i--) { if (this.content[i]) this.content[i] = ''; }
        this.moves++;
        this.render();
      }
    }

    const game = new VimGame();
  </script>
</body>
