<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📝 TODO List v3</title>
  
  <!-- Bootstrap 5 CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --sidebar-width: 280px;
    }
    
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
    }
    
    /* 顶部导航栏 */
    .navbar-custom {
      background: var(--primary-gradient);
      box-shadow: 0 2px 15px rgba(0,0,0,0.1);
    }
    
    /* 侧边栏 */
    .sidebar {
      position: fixed;
      top: 56px;
      left: 0;
      width: var(--sidebar-width);
      height: calc(100vh - 56px);
      background: #fff;
      box-shadow: 2px 0 10px rgba(0,0,0,0.05);
      overflow-y: auto;
      z-index: 100;
    }
    
    .sidebar .nav-link {
      color: #6c757d;
      padding: 0.75rem 1.25rem;
      margin: 0.25rem 0.5rem;
      border-radius: 0.5rem;
      transition: all 0.2s;
    }
    
    .sidebar .nav-link:hover {
      background: #f8f9fa;
      color: #495057;
    }
    
    .sidebar .nav-link.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    
    .sidebar .nav-link .badge {
      transition: all 0.2s;
    }
    
    /* 主内容区 */
    .main-content {
      margin-left: var(--sidebar-width);
      padding: 1.5rem;
    }
    
    /* 任务卡片 */
    .task-card {
      background: #fff;
      border-radius: 0.75rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border: none;
      transition: all 0.2s;
    }
    
    .task-card:hover {
      box-shadow: 0 4px 15px rgba(0,0,0,0.12);
      transform: translateY(-2px);
    }
    
    .task-item {
      padding: 1rem;
      border-bottom: 1px solid #e9ecef;
      transition: all 0.2s;
    }
    
    .task-item:last-child {
      border-bottom: none;
    }
    
    .task-item:hover {
      background: #f8f9fa;
    }
    
    .task-item.selected {
      background: linear-gradient(135deg, rgba(102,126,234,0.1) 0%, rgba(118,75,162,0.1) 100%);
    }
    
    /* 优先级徽章 */
    .priority-badge {
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      border-radius: 0.375rem;
    }
    
    .priority-high { background: #fee2e2; color: #dc2626; }
    .priority-medium { background: #fef3c7; color: #d97706; }
    .priority-low { background: #d1fae5; color: #059669; }
    
    /* 模态框 */
    .modal-content {
      border-radius: 1rem;
      border: none;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    
    .modal-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border-radius: 1rem 1rem 0 0;
    }
    
    .modal-header .btn-close {
      filter: brightness(0) invert(1);
    }
    
    /* 子任务编辑输入框 */
    .subtask-edit-input {
      animation: fadeIn 0.15s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
    
    /* Toast 通知 */
    .toast-container {
      z-index: 1060;
    }
    
    /* 响应式 */
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s;
      }
      
      .sidebar.show {
        transform: translateX(0);
      }
      
      .main-content {
        margin-left: 0;
      }
    }
    
    /* 滚动条 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    
    [x-cloak] { display: none !important; }
  </style>
</head>
<body>
  <div x-data="todoApp()" x-init="init()" x-cloak>
    <!-- 顶部导航栏 -->
    <nav class="navbar navbar-custom navbar-dark sticky-top">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center gap-2" href="#">
          <span class="fs-3">✅</span>
          <div>
            <div class="fw-bold">TODO List</div>
            <small class="fs-6 opacity-75">v3 - Bootstrap 5</small>
          </div>
        </a>
        
        <div class="d-flex align-items-center gap-3">
          <!-- 模式切换 -->
          <div class="btn-group btn-group-sm" role="group">
            <button type="button" class="btn btn-light" 
                    :class="mode === 'work' ? 'active' : ''"
                    @click="mode = 'work'">
              <i class="bi bi-briefcase"></i>
              <span class="d-none d-sm-inline ms-1">工作</span>
            </button>
            <button type="button" class="btn btn-light"
                    :class="mode === 'study' ? 'active' : ''"
                    @click="mode = 'study'">
              <i class="bi bi-book"></i>
              <span class="d-none d-sm-inline ms-1">学习</span>
            </button>
            <button type="button" class="btn btn-light"
                    :class="mode === 'life' ? 'active' : ''"
                    @click="mode = 'life'">
              <i class="bi bi-house"></i>
              <span class="d-none d-sm-inline ms-1">生活</span>
            </button>
          </div>
          
          <!-- 统计徽章 -->
          <div class="d-none d-md-flex gap-2">
            <span class="badge bg-light text-dark">总计：<span x-text="stats.total"></span></span>
            <span class="badge bg-warning text-dark">待处理：<span x-text="stats.pending"></span></span>
            <span class="badge bg-success">已完成：<span x-text="stats.completed"></span></span>
          </div>
          
          <!-- 移动端菜单按钮 -->
          <button class="btn btn-link text-white d-md-none" @click="sidebarShow = !sidebarShow">
            <i class="bi bi-list fs-4"></i>
          </button>
        </div>
      </div>
    </nav>

    <!-- 侧边栏 -->
    <div class="sidebar" :class="{'show': sidebarShow}">
      <div class="p-3">
        <h6 class="text-uppercase text-muted fs-7 mb-3">筛选</h6>
        <nav class="nav flex-column">
          <a class="nav-link d-flex justify-content-between align-items-center"
             :class="filter === 'all' ? 'active' : ''"
             href="#" @click.prevent="filter = 'all'">
            <span><i class="bi bi-clipboard me-2"></i>全部任务</span>
            <span class="badge" :class="filter === 'all' ? 'bg-light text-primary' : 'bg-light text-dark'" x-text="stats.total"></span>
          </a>
          <a class="nav-link d-flex justify-content-between align-items-center"
             :class="filter === 'pending' ? 'active' : ''"
             href="#" @click.prevent="filter = 'pending'">
            <span><i class="bi bi-hourglass-split me-2"></i>待处理</span>
            <span class="badge" :class="filter === 'pending' ? 'bg-light text-warning' : 'bg-light text-dark'" x-text="stats.pending"></span>
          </a>
          <a class="nav-link d-flex justify-content-between align-items-center"
             :class="filter === 'completed' ? 'active' : ''"
             href="#" @click.prevent="filter = 'completed'">
            <span><i class="bi bi-check-circle me-2"></i>已完成</span>
            <span class="badge" :class="filter === 'completed' ? 'bg-light text-success' : 'bg-light text-dark'" x-text="stats.completed"></span>
          </a>
        </nav>
        
        <hr class="my-3">
        
        <h6 class="text-uppercase text-muted fs-7 mb-3">排序</h6>
        <select x-model="sort" class="form-select form-select-sm">
          <option value="created_desc">按创建时间 (最新)</option>
          <option value="created_asc">按创建时间 (最早)</option>
          <option value="priority_desc">按优先级 (高到低)</option>
          <option value="priority_asc">按优先级 (低到高)</option>
          <option value="due_date_asc">按截止日期 (临近)</option>
        </select>
      </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
      <!-- 欢迎提示 -->
      <div class="card task-card mb-3">
        <div class="card-body">
          <h5 class="card-title mb-1" x-text="greetingText"></h5>
          <p class="card-text text-muted small mb-0" x-text="modeDescription"></p>
        </div>
      </div>
      
      <!-- 添加任务 -->
      <div class="card task-card mb-3">
        <div class="card-body">
          <div class="input-group">
            <input type="text" class="form-control form-control-lg" 
                   x-model="newTaskContent" 
                   @keydown.enter="addTodo()"
                   placeholder="添加新任务...">
            <button class="btn btn-primary px-4" @click="addTodo()">
              <i class="bi bi-plus-lg"></i>
              <span class="d-none d-sm-inline ms-1">添加</span>
            </button>
          </div>
        </div>
      </div>
      
      <!-- 搜索栏 -->
      <div class="card task-card mb-3">
        <div class="card-body">
          <div class="input-group">
            <span class="input-group-text bg-light border-0">
              <i class="bi bi-search text-muted"></i>
            </span>
            <input type="text" class="form-control border-0" 
                   x-model="search" 
                   placeholder="搜索任务...">
          </div>
        </div>
      </div>
      
      <!-- 任务列表 -->
      <div class="card task-card">
        <div class="card-header bg-light d-flex justify-content-between align-items-center">
          <h6 class="mb-0" x-text="filterText"></h6>
          <span class="badge bg-secondary" x-text="filteredTodos.length + ' 个任务'"></span>
        </div>
        
        <!-- 批量操作栏 -->
        <div x-show="selectedIds.length > 0" x-cloak
             class="card-header bg-primary text-white">
          <div class="d-flex justify-content-between align-items-center">
            <span>已选择 <strong x-text="selectedIds.length"></strong> 个任务</span>
            <div class="btn-group btn-group-sm">
              <button class="btn btn-light text-success" @click="batchComplete()">
                <i class="bi bi-check-lg"></i> 完成
              </button>
              <button class="btn btn-light text-danger" @click="batchDelete()">
                <i class="bi bi-trash"></i> 删除
              </button>
              <button class="btn btn-light" @click="selectedIds = []">
                取消
              </button>
            </div>
          </div>
        </div>
        
        <div class="card-body p-0">
          <!-- 加载中 -->
          <div x-show="loading" class="text-center p-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">加载中...</p>
          </div>
          
          <!-- 空状态 -->
          <div x-show="!loading && filteredTodos.length === 0" class="text-center p-5">
            <div class="display-1 mb-3">🎉</div>
            <h5 class="text-muted">暂无任务</h5>
            <p class="text-muted small">添加你的第一个任务吧！</p>
          </div>
          
          <!-- 任务列表 -->
          <div class="task-list">
            <template x-for="todo in filteredTodos" :key="todo.id">
              <div class="task-item" :class="{'selected': selectedIds.includes(todo.id)}">
                <div class="d-flex align-items-start gap-3">
                  <!-- 复选框：批量选择模式显示选择框，普通模式显示完成状态 -->
                  <!-- 批量选择复选框 -->
                  <input type="checkbox" class="form-check-input mt-1"
                         x-show="selectedIds.length > 0"
                         x-model="selectedIds" :value="todo.id">
                  <!-- 完成状态复选框 -->
                  <input type="checkbox" class="form-check-input mt-1"
                         x-show="selectedIds.length === 0"
                         :checked="todo.completed"
                         @change="toggleTodoStatus(todo.id, $event.target.checked)">

                  <!-- 内容 -->
                  <div class="flex-grow-1" @dblclick="openEditModal(todo)">
                    <p class="mb-1 fw-medium" :class="{'text-decoration-line-through text-muted': todo.completed}" 
                       x-text="todo.content"></p>
                    
                    <div class="d-flex flex-wrap gap-2 mt-2">
                      <!-- 优先级 -->
                      <span class="priority-badge"
                            :class="{
                              'priority-high': todo.priority === 1,
                              'priority-medium': todo.priority === 2,
                              'priority-low': todo.priority === 3
                            }">
                        <i :class="priorityIconClass(todo.priority)"></i>
                        <span x-text="priorityText(todo.priority)"></span>
                      </span>
                      
                      <!-- 截止日期 -->
                      <template x-if="todo.due_date">
                        <span class="priority-badge"
                              :class="isOverdue(todo) ? 'bg-danger text-white' : 'bg-light text-dark'">
                          <i class="bi bi-calendar-event"></i>
                          <span x-text="formatDueDate(todo.due_date)"></span>
                        </span>
                      </template>
                      
                      <!-- 子任务 -->
                      <template x-if="todo.subtask_count > 0">
                        <span class="priority-badge bg-primary text-white">
                          <i class="bi bi-list-task"></i>
                          <span x-text="todo.subtask_completed + '/' + todo.subtask_count"></span>
                        </span>
                      </template>
                      
                      <!-- 备注 -->
                      <template x-if="todo.note">
                        <span class="priority-badge bg-purple-100 text-purple-700" style="background: #f3e8ff; color: #7e22ce;">
                          <i class="bi bi-sticky"></i>
                          备注
                        </span>
                      </template>
                      
                      <span class="small text-muted">
                        <i class="bi bi-clock"></i>
                        <span x-text="formatTime(todo.created_at)"></span>
                      </span>
                    </div>
                  </div>
                  
                  <!-- 操作按钮 -->
                  <div class="btn-group btn-group-sm opacity-0" 
                       :class="{'opacity-100': true}"
                       style="transition: opacity 0.2s;">
                    <button class="btn btn-outline-secondary" @click="openEditModal(todo)" title="编辑">
                      <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-outline-danger" @click="confirmDelete(todo.id)" title="删除">
                      <i class="bi bi-trash"></i>
                    </button>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>
      </div>
    </div>

    <!-- 编辑模态框 -->
    <div class="modal fade" id="editModal" tabindex="-1" x-data="{ shown: false }"
         :class="{'show': shown}" 
         :style="shown ? 'display: block;' : 'display: none;'"
         @close-modal.window="shown = false; closeEditModal()">
      <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">编辑任务</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" 
                    @click="closeEditModal()"></button>
          </div>
          <div class="modal-body">
            <!-- 完成状态 -->
            <div class="form-check mb-3 p-3 bg-light rounded">
              <input class="form-check-input" type="checkbox" x-model="editingTodo.completed" id="checkCompleted">
              <label class="form-check-label" for="checkCompleted">标记为已完成</label>
            </div>
            
            <!-- 任务内容 -->
            <div class="mb-3">
              <label class="form-label fw-medium">任务内容</label>
              <textarea class="form-control" x-model="editingTodo.content" rows="3"></textarea>
            </div>
            
            <!-- 备注 -->
            <div class="mb-3">
              <label class="form-label fw-medium">备注</label>
              <textarea class="form-control" x-model="editingTodo.note" rows="2" placeholder="添加备注..."></textarea>
            </div>
            
            <!-- 截止日期 -->
            <div class="mb-3">
              <label class="form-label fw-medium">截止日期</label>
              <input type="date" class="form-control" x-model="editingTodo.due_date">
            </div>
            
            <!-- 子任务 -->
            <div class="mb-3">
              <label class="form-label fw-medium">
                子任务
                <small class="text-muted" x-text="subtasks.length > 0 ? '(' + subtasks.filter(s => s.completed).length + '/' + subtasks.length + ')' : ''"></small>
              </label>
              
              <div class="border rounded p-2 mb-2" style="max-height: 200px; overflow-y: auto;">
                <template x-for="subtask in subtasks" :key="subtask.id">
                  <div class="d-flex align-items-center gap-2 p-2 hover-bg-light rounded"
                       :class="{'bg-light': editingSubtaskId === subtask.id}">
                    <input type="checkbox" class="form-check-input" 
                           x-model="subtask.completed"
                           @change="toggleSubtaskStatus(subtask.id, subtask.completed)">
                    
                    <!-- 显示模式 -->
                    <span class="flex-grow-1" 
                          x-show="editingSubtaskId !== subtask.id"
                          :class="{'text-decoration-line-through text-muted': subtask.completed}"
                          x-text="subtask.content"
                          @dblclick="startEditSubtask(subtask.id, subtask.content)"
                          style="cursor: pointer;"></span>
                    
                    <!-- 编辑模式 -->
                    <input type="text" class="form-control form-control-sm subtask-edit-input"
                           x-show="editingSubtaskId === subtask.id"
                           x-model="editingSubtaskContent"
                           @keydown.enter="saveSubtaskEdit(subtask.id)"
                           @keydown.escape="cancelSubtaskEdit()"
                           @blur="saveSubtaskEdit(subtask.id)">
                    
                    <button class="btn btn-sm btn-link text-danger" @click="deleteSubtaskById(subtask.id)">
                      <i class="bi bi-trash"></i>
                    </button>
                  </div>
                </template>
                <p class="text-center text-muted small py-3 mb-0" x-show="subtasks.length === 0">暂无子任务</p>
              </div>
              
              <div class="input-group input-group-sm">
                <input type="text" class="form-control" 
                       x-model="newSubtaskContent"
                       @keydown.enter="addSubtask()"
                       placeholder="输入子任务内容，按回车添加...">
                <span class="input-group-text text-muted small">↵ 添加</span>
              </div>
            </div>
          </div>
          <div class="modal-footer bg-light">
            <button class="btn btn-danger me-auto" @click="confirmDelete(editingTodo.id); closeEditModal()">
              <i class="bi bi-trash"></i> 删除
            </button>
            <button class="btn btn-secondary" data-bs-dismiss="modal" @click="closeEditModal()">取消</button>
            <button class="btn btn-primary" @click="saveEditingTodo()">
              <i class="bi bi-save"></i> 保存
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast 通知 -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <template x-for="toast in toasts" :key="toast.id">
        <div class="toast show" 
             :class="{
               'bg-success text-white': toast.type === 'success',
               'bg-danger text-white': toast.type === 'error',
               'bg-warning text-dark': toast.type === 'warning',
               'bg-dark text-white': toast.type === 'info'
             }"
             x-show="toast.visible"
             x-transition:enter="transform transition ease-out duration-300"
             x-transition:enter-start="translate-x-full"
             x-transition:enter-end="translate-x-0"
             x-transition:leave="transform transition ease-in duration-200"
             x-transition:leave-start="translate-x-0"
             x-transition:leave-end="translate-x-full">
          <div class="toast-body d-flex justify-content-between align-items-center">
            <span x-text="toast.message"></span>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <script>
    function todoApp() {
      return {
        todos: [],
        stats: { total: 0, pending: 0, completed: 0 },
        filter: 'all',
        sort: 'created_desc',
        search: '',
        loading: false,
        editingTodo: null,
        subtasks: [],
        newTaskContent: '',
        newSubtaskContent: '',
        selectedIds: [],
        editingSubtaskId: null,
        editingSubtaskContent: '',
        toasts: [],
        mode: 'work',
        sidebarShow: false,
        modalInstance: null,

        async init() {
          this.modalInstance = new bootstrap.Modal(document.getElementById('editModal'));
          await this.loadTodos();
          await this.loadStats();
          setInterval(() => {
            this.loadTodos();
            this.loadStats();
          }, 30000);
        },

        get greetingText() {
          const hour = new Date().getHours();
          if (hour < 12) return '早上好！今天也要加油哦 ☀️';
          if (hour < 18) return '下午好！继续努力 💪';
          return '晚上好！注意休息 🌙';
        },

        get modeDescription() {
          const descriptions = {
            work: '💼 工作模式 - 管理工作任务和项目',
            study: '📚 学习模式 - 管理学习计划和作业',
            life: '🏠 生活模式 - 管理日常琐事和生活安排'
          };
          return descriptions[this.mode];
        },

        get filterText() {
          const texts = { all: '全部任务', pending: '待处理', completed: '已完成' };
          return texts[this.filter];
        },

        get filteredTodos() {
          let result = [...this.todos];
          if (this.filter === 'pending') result = result.filter(t => !t.completed);
          else if (this.filter === 'completed') result = result.filter(t => t.completed);
          if (this.search) result = result.filter(t => t.content.toLowerCase().includes(this.search.toLowerCase()));
          result.sort((a, b) => {
            switch (this.sort) {
              case 'created_asc': return new Date(a.created_at) - new Date(b.created_at);
              case 'created_desc': return new Date(b.created_at) - new Date(a.created_at);
              case 'priority_asc': return a.priority - b.priority;
              case 'priority_desc': return b.priority - a.priority;
              case 'due_date_asc': 
                if (!a.due_date) return 1;
                if (!b.due_date) return -1;
                return new Date(a.due_date) - new Date(b.due_date);
              default: return 0;
            }
          });
          return result;
        },

        async loadTodos() {
          try {
            const params = new URLSearchParams();
            if (this.filter !== 'all') params.set('filter', this.filter);
            params.set('sort', this.sort);
            if (this.search) params.set('search', this.search);
            const res = await fetch(`/api/todos?${params}`);
            const result = await res.json();
            if (result.success) this.todos = result.data;
          } catch (err) {
            this.showToast('加载任务失败', 'error');
          }
        },

        async loadStats() {
          try {
            const res = await fetch('/api/todos/stats');
            const result = await res.json();
            if (result.success) this.stats = result.data;
          } catch (err) {
            console.error('加载统计失败:', err);
          }
        },

        async addTodo() {
          if (!this.newTaskContent.trim()) {
            this.showToast('请输入任务内容', 'warning');
            return;
          }
          try {
            const res = await fetch('/api/todos', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ content: this.newTaskContent.trim(), priority: 2, note: '' })
            });
            const result = await res.json();
            if (result.success) {
              this.newTaskContent = '';
              this.showToast('任务添加成功', 'success');
              await this.loadTodos();
              await this.loadStats();
            } else {
              this.showToast('添加失败：' + result.error, 'error');
            }
          } catch (err) {
            this.showToast('网络错误', 'error');
          }
        },

        async toggleTodoStatus(id, completed) {
          try {
            const res = await fetch(`/api/todos/${id}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ completed })
            });
            const result = await res.json();
            if (result.success) {
              this.showToast(completed ? '任务已完成' : '任务已恢复', 'success');
              await this.loadStats();
            }
          } catch (err) {
            this.showToast('更新失败', 'error');
          }
        },

        openEditModal(todo) {
          this.editingTodo = { ...todo };
          this.subtasks = [];
          this.editingSubtaskId = null;
          this.editingSubtaskContent = '';
          this.loadSubtasks(todo.id);
          this.modalInstance.show();
        },

        closeEditModal() {
          this.modalInstance.hide();
          this.editingTodo = null;
          this.subtasks = [];
          this.newSubtaskContent = '';
          this.editingSubtaskId = null;
        },

        async loadSubtasks(todoId) {
          try {
            const res = await fetch(`/api/todos/subtasks?todo_id=${todoId}`);
            const result = await res.json();
            if (result.success) this.subtasks = result.data;
          } catch (err) {
            console.error('加载子任务失败:', err);
          }
        },

        async addSubtask() {
          if (!this.newSubtaskContent.trim() || !this.editingTodo) return;
          try {
            const res = await fetch('/api/todos/subtasks', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ todo_id: this.editingTodo.id, content: this.newSubtaskContent.trim(), priority: 2 })
            });
            const result = await res.json();
            if (result.success) {
              this.newSubtaskContent = '';
              this.showToast('子任务添加成功', 'success');
              await this.loadSubtasks(this.editingTodo.id);
              await this.loadTodos();
            }
          } catch (err) {
            this.showToast('添加失败', 'error');
          }
        },

        async toggleSubtaskStatus(id, completed) {
          try {
            const res = await fetch(`/api/todos/subtasks/${id}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ completed })
            });
            const result = await res.json();
            if (result.success) await this.loadTodos();
          } catch (err) {
            this.showToast('更新失败', 'error');
          }
        },

        deleteSubtaskById(id) {
          if (!confirm('确定删除此子任务？')) return;
          fetch(`/api/todos/subtasks/${id}`, { method: 'DELETE' })
            .then(res => res.json())
            .then(result => {
              if (result.success) {
                this.showToast('子任务已删除', 'success');
                this.loadSubtasks(this.editingTodo.id);
                this.loadTodos();
              }
            });
        },

        startEditSubtask(id, content) {
          this.editingSubtaskId = id;
          this.editingSubtaskContent = content;
          this.$nextTick(() => {
            const input = document.querySelector('.subtask-edit-input');
            if (input) { input.focus(); input.select(); }
          });
        },

        async saveSubtaskEdit(id) {
          if (this.editingSubtaskId !== id) return;
          const newContent = this.editingSubtaskContent.trim();
          if (!newContent) { this.cancelSubtaskEdit(); return; }
          try {
            const res = await fetch(`/api/todos/subtasks/${id}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ content: newContent })
            });
            const result = await res.json();
            if (result.success) {
              this.showToast('子任务已更新', 'success');
              await this.loadSubtasks(this.editingTodo.id);
              await this.loadTodos();
            }
          } catch (err) {
            this.showToast('更新失败', 'error');
          }
          this.cancelSubtaskEdit();
        },

        cancelSubtaskEdit() {
          this.editingSubtaskId = null;
          this.editingSubtaskContent = '';
        },

        async saveEditingTodo() {
          if (!this.editingTodo?.content.trim()) {
            this.showToast('任务内容不能为空', 'warning');
            return;
          }
          try {
            const res = await fetch(`/api/todos/${this.editingTodo.id}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                content: this.editingTodo.content.trim(),
                completed: this.editingTodo.completed,
                note: this.editingTodo.note?.trim() || '',
                due_date: this.editingTodo.due_date || null
              })
            });
            const result = await res.json();
            if (result.success) {
              this.showToast('任务已保存', 'success');
              this.closeEditModal();
              await this.loadTodos();
              await this.loadStats();
            }
          } catch (err) {
            this.showToast('保存失败', 'error');
          }
        },

        confirmDelete(id) {
          if (!confirm('确定删除此任务？')) return;
          fetch(`/api/todos/${id}`, { method: 'DELETE' })
            .then(res => res.json())
            .then(result => {
              if (result.success) {
                this.showToast('任务已删除', 'success');
                this.loadTodos();
                this.loadStats();
              }
            });
        },

        batchComplete() {
          Promise.all(this.selectedIds.map(id => 
            fetch(`/api/todos/${id}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ completed: true })
            })
          )).then(() => {
            this.showToast(`已完成 ${this.selectedIds.length} 个任务`, 'success');
            this.selectedIds = [];
            this.loadTodos();
            this.loadStats();
          });
        },

        batchDelete() {
          if (!confirm(`确定删除选中的 ${this.selectedIds.length} 个任务？`)) return;
          Promise.all(this.selectedIds.map(id => fetch(`/api/todos/${id}`, { method: 'DELETE' })))
            .then(() => {
              this.showToast(`已删除 ${this.selectedIds.length} 个任务`, 'success');
              this.selectedIds = [];
              this.loadTodos();
              this.loadStats();
            });
        },

        priorityIconClass(priority) {
          return { 1: 'bi bi-circle-fill', 2: 'bi bi-circle-fill', 3: 'bi bi-circle-fill' }[priority] || 'bi bi-circle-fill';
        },

        priorityText(priority) {
          return { 1: '高', 2: '中', 3: '低' }[priority] || '中';
        },

        isOverdue(todo) {
          if (!todo.due_date || todo.completed) return false;
          return new Date(todo.due_date) < new Date();
        },

        formatDueDate(dateStr) {
          const date = new Date(dateStr);
          const now = new Date();
          const diff = date - now;
          const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
          if (days < 0) return `逾期${Math.abs(days)}天`;
          if (days === 0) return '今天';
          if (days === 1) return '明天';
          if (days <= 7) return `${days}天后`;
          return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        },

        formatTime(dateStr) {
          const date = new Date(dateStr);
          const now = new Date();
          const diff = now - date;
          const days = Math.floor(diff / (1000 * 60 * 60 * 24));
          if (days === 0) return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
          if (days === 1) return '昨天';
          if (days < 7) return `${days}天前`;
          return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        },

        showToast(message, type = 'info') {
          const id = Date.now();
          this.toasts.push({ id, message, type, visible: true });
          setTimeout(() => {
            const toast = this.toasts.find(t => t.id === id);
            if (toast) toast.visible = false;
            setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 300);
          }, 3000);
        }
      }
    }
  </script>
</body>
</html>
