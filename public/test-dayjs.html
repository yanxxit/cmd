<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day.js 测试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .success {
            color: green;
            font-weight: bold;
        }
        .error {
            color: red;
            font-weight: bold;
        }
        .info {
            background-color: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        pre {
            background-color: #f9f9f9;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Day.js 测试页面</h1>
    
    <div class="info">
        <p>测试 Day.js 是否可以通过 <code>/libs/dayjs/dayjs.min.js</code> 访问</p>
    </div>
    
    <h2>测试结果</h2>
    <div id="results"></div>
    
    <h2>当前时间</h2>
    <div id="current-time"></div>
    
    <script src="/libs/dayjs/dayjs.min.js"></script>
    <script>
        const resultsDiv = document.getElementById('results');
        const currentTimeDiv = document.getElementById('current-time');
        
        if (typeof dayjs !== 'undefined') {
            resultsDiv.innerHTML = '<p class="success">✅ Day.js 加载成功！</p>';
            
            // 显示当前时间
            const now = dayjs();
            currentTimeDiv.innerHTML = `
                <p>当前时间（Day.js 格式化）：</p>
                <pre>${now.format('YYYY-MM-DD HH:mm:ss')}</pre>
                <p>其他格式示例：</p>
                <ul>
                    <li>${now.format('YYYY年MM月DD日')}</li>
                    <li>${now.format('dddd, MMMM D, YYYY')}</li>
                    <li>相对时间：${now.fromNow()}</li>
                </ul>
            `;
        } else {
            resultsDiv.innerHTML = '<p class="error">❌ Day.js 加载失败！</p>';
            currentTimeDiv.innerHTML = '<p class="error">无法获取时间</p>';
        }
    </script>
</body>
</html>
