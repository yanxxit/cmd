<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贷款计算器 - 利率计算与还款计划</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 32px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .header p {
      opacity: 0.9;
      font-size: 16px;
    }

    .tabs {
      display: flex;
      background: #f3f4f6;
      padding: 0;
      border-bottom: 2px solid #e5e7eb;
    }

    .tab-btn {
      flex: 1;
      padding: 16px 20px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      color: #6b7280;
      transition: all 0.3s;
      border-bottom: 3px solid transparent;
    }

    .tab-btn:hover {
      background: #e5e7eb;
      color: #374151;
    }

    .tab-btn.active {
      color: #667eea;
      background: white;
      border-bottom-color: #667eea;
    }

    .content {
      padding: 30px;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .input-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
    }

    .input-group label {
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .input-group input, .input-group select {
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s;
    }

    .input-group input:focus, .input-group select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .button-group {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 24px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
    }

    .btn-secondary:hover {
      background: #e5e7eb;
    }

    .result-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .result-card {
      padding: 20px;
      background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
      border-radius: 12px;
      border-left: 4px solid #667eea;
    }

    .result-card.highlight {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-left: none;
    }

    .result-label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .result-card.highlight .result-label {
      color: rgba(255, 255, 255, 0.9);
    }

    .result-value {
      font-size: 28px;
      font-weight: bold;
      color: #374151;
    }

    .result-card.highlight .result-value {
      color: white;
    }

    .result-unit {
      font-size: 14px;
      margin-left: 4px;
    }

    .plan-section {
      margin-top: 30px;
    }

    .plan-section h2 {
      font-size: 20px;
      color: #374151;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .plan-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .plan-table thead {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .plan-table th {
      padding: 14px 12px;
      text-align: right;
      font-weight: 600;
      font-size: 14px;
    }

    .plan-table th:first-child {
      text-align: center;
    }

    .plan-table td {
      padding: 12px;
      text-align: right;
      border-bottom: 1px solid #e5e7eb;
      font-size: 14px;
    }

    .plan-table td:first-child {
      text-align: center;
    }

    .plan-table tbody tr:hover {
      background: #f9fafb;
    }

    .plan-table tbody tr:last-child td {
      border-bottom: none;
    }

    .total-row {
      background: #f3f4f6;
      font-weight: 600;
    }

    .total-row td {
      border-top: 2px solid #667eea;
    }

    .error-message {
      color: #ef4444;
      background: #fee2e2;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .info-box {
      background: #dbeafe;
      border-left: 4px solid #3b82f6;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .info-box p {
      color: #1e40af;
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      .input-grid {
        grid-template-columns: 1fr;
      }

      .button-group {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

      .plan-table {
        font-size: 12px;
        overflow-x: auto;
      }

      .plan-table th, .plan-table td {
        padding: 8px 6px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>
        <span>💰</span>
        <span>贷款计算器</span>
      </h1>
      <p>等额本息/等额本金计算 · 还款计划生成 · 实际利率反推</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="calculate">贷款计算</button>
      <button class="tab-btn" data-tab="reverse">反推利率</button>
    </div>

    <div class="content">
      <!-- 贷款计算 Tab -->
      <div class="tab-content active" id="calculate">
        <div class="input-grid">
          <div class="input-group">
            <label for="loanAmount">贷款金额（万元）：</label>
            <input type="number" id="loanAmount" value="100" step="1" min="1">
          </div>

          <div class="input-group">
            <label for="loanTerm">贷款期限（年）：</label>
            <input type="number" id="loanTerm" value="30" step="1" min="1" max="30">
          </div>

          <div class="input-group">
            <label for="annualRate">年利率（%）：</label>
            <input type="number" id="annualRate" value="4.2" step="0.01" min="0.01">
          </div>

          <div class="input-group">
            <label for="repaymentMethod">还款方式：</label>
            <select id="repaymentMethod">
              <option value="equal-principal-interest">等额本息</option>
              <option value="equal-principal">等额本金</option>
            </select>
          </div>
        </div>

        <div class="button-group">
          <button class="btn btn-primary" onclick="calculateLoan()">
            <span>🧮</span>
            <span>开始计算</span>
          </button>
          <button class="btn btn-secondary" onclick="resetCalculate()">
            <span>🔄</span>
            <span>重置</span>
          </button>
        </div>

        <div id="calculateResults" style="display: none;">
          <div class="result-section">
            <div class="result-card highlight">
              <div class="result-label">每月还款</div>
              <div class="result-value" id="monthlyPayment">0<span class="result-unit">元</span></div>
            </div>
            <div class="result-card">
              <div class="result-label">贷款总额</div>
              <div class="result-value" id="totalLoan">0<span class="result-unit">元</span></div>
            </div>
            <div class="result-card">
              <div class="result-label">支付利息</div>
              <div class="result-value" id="totalInterest">0<span class="result-unit">元</span></div>
            </div>
            <div class="result-card">
              <div class="result-label">还款总额</div>
              <div class="result-value" id="totalPayment">0<span class="result-unit">元</span></div>
            </div>
          </div>

          <div class="plan-section">
            <h2>📅 还款计划表</h2>
            <table class="plan-table">
              <thead>
                <tr>
                  <th>期数</th>
                  <th>月供金额</th>
                  <th>本金</th>
                  <th>利息</th>
                  <th>剩余本金</th>
                </tr>
              </thead>
              <tbody id="planTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- 反推利率 Tab -->
      <div class="tab-content" id="reverse">
        <div class="info-box">
          <p>💡 <strong>使用说明：</strong>如果您知道贷款金额、期限和每月还款额，可以使用此功能反推实际年利率。这对于识别贷款的真实成本非常有用。</p>
        </div>

        <div class="input-grid">
          <div class="input-group">
            <label for="reverseLoanAmount">贷款金额（万元）：</label>
            <input type="number" id="reverseLoanAmount" value="100" step="1" min="1">
          </div>

          <div class="input-group">
            <label for="reverseLoanTerm">贷款期限（年）：</label>
            <input type="number" id="reverseLoanTerm" value="30" step="1" min="1" max="30">
          </div>

          <div class="input-group">
            <label for="monthlyPaymentInput">每月还款额（元）：</label>
            <input type="number" id="monthlyPaymentInput" value="4895" step="1" min="1">
          </div>
        </div>

        <div class="button-group">
          <button class="btn btn-primary" onclick="calculateReverseRate()">
            <span>🔍</span>
            <span>反推利率</span>
          </button>
          <button class="btn btn-secondary" onclick="resetReverse()">
            <span>🔄</span>
            <span>重置</span>
          </button>
        </div>

        <div id="reverseResults" style="display: none;">
          <div class="result-section">
            <div class="result-card highlight">
              <div class="result-label">实际年利率</div>
              <div class="result-value" id="actualRate">0<span class="result-unit">%</span></div>
            </div>
            <div class="result-card">
              <div class="result-label">贷款总额</div>
              <div class="result-value" id="reverseTotalLoan">0<span class="result-unit">元</span></div>
            </div>
            <div class="result-card">
              <div class="result-label">还款总额</div>
              <div class="result-value" id="reverseTotalPayment">0<span class="result-unit">元</span></div>
            </div>
            <div class="result-card">
              <div class="result-label">支付利息</div>
              <div class="result-value" id="reverseTotalInterest">0<span class="result-unit">元</span></div>
            </div>
          </div>

          <div class="plan-section">
            <h2>📅 还款计划表</h2>
            <table class="plan-table">
              <thead>
                <tr>
                  <th>期数</th>
                  <th>月供金额</th>
                  <th>本金</th>
                  <th>利息</th>
                  <th>剩余本金</th>
                </tr>
              </thead>
              <tbody id="reversePlanTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Tab 切换
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const tabId = this.dataset.tab;
        
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        this.classList.add('active');
        document.getElementById(tabId).classList.add('active');
      });
    });

    // 格式化金额
    function formatMoney(amount) {
      return amount.toLocaleString('zh-CN', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    // 计算等额本息月供
    function calculateEqualPrincipalInterest(principal, monthlyRate, months) {
      if (monthlyRate === 0) {
        return principal / months;
      }
      return principal * monthlyRate * Math.pow(1 + monthlyRate, months) / (Math.pow(1 + monthlyRate, months) - 1);
    }

    // 计算等额本金月供
    function calculateEqualPrincipal(principal, monthlyRate, month, totalMonths) {
      const principalPart = principal / totalMonths;
      const interestPart = (principal - principalPart * (month - 1)) * monthlyRate;
      return principalPart + interestPart;
    }

    // 计算贷款
    function calculateLoan() {
      const loanAmount = parseFloat(document.getElementById('loanAmount').value);
      const loanTerm = parseFloat(document.getElementById('loanTerm').value);
      const annualRate = parseFloat(document.getElementById('annualRate').value);
      const repaymentMethod = document.getElementById('repaymentMethod').value;

      // 验证输入
      if (!loanAmount || !loanTerm || !annualRate) {
        alert('请填写完整的贷款信息！');
        return;
      }

      const principal = loanAmount * 10000; // 转换为元
      const months = loanTerm * 12;
      const monthlyRate = annualRate / 100 / 12;

      let totalPayment = 0;
      let totalInterest = 0;
      const plan = [];

      if (repaymentMethod === 'equal-principal-interest') {
        // 等额本息
        const monthlyPayment = calculateEqualPrincipalInterest(principal, monthlyRate, months);
        
        let remainingPrincipal = principal;
        for (let i = 1; i <= months; i++) {
          const interestPart = remainingPrincipal * monthlyRate;
          const principalPart = monthlyPayment - interestPart;
          remainingPrincipal -= principalPart;
          
          if (remainingPrincipal < 0) remainingPrincipal = 0;
          
          totalPayment += monthlyPayment;
          totalInterest += interestPart;
          
          plan.push({
            month: i,
            payment: monthlyPayment,
            principalPart: principalPart,
            interestPart: interestPart,
            remainingPrincipal: remainingPrincipal
          });
        }

        document.getElementById('monthlyPayment').innerHTML = formatMoney(monthlyPayment) + '<span class="result-unit">元</span>';
      } else {
        // 等额本金
        let firstPayment = 0;
        let remainingPrincipal = principal;
        
        for (let i = 1; i <= months; i++) {
          const payment = calculateEqualPrincipal(principal, monthlyRate, i, months);
          if (i === 1) firstPayment = payment;
          
          const principalPart = principal / months;
          const interestPart = payment - principalPart;
          remainingPrincipal -= principalPart;
          
          if (remainingPrincipal < 0) remainingPrincipal = 0;
          
          totalPayment += payment;
          totalInterest += interestPart;
          
          plan.push({
            month: i,
            payment: payment,
            principalPart: principalPart,
            interestPart: interestPart,
            remainingPrincipal: remainingPrincipal
          });
        }

        document.getElementById('monthlyPayment').innerHTML = `${formatMoney(firstPayment)}<span class="result-unit">元</span> (逐月递减)`;
      }

      // 更新结果
      document.getElementById('totalLoan').innerHTML = formatMoney(principal) + '<span class="result-unit">元</span>';
      document.getElementById('totalInterest').innerHTML = formatMoney(totalInterest) + '<span class="result-unit">元</span>';
      document.getElementById('totalPayment').innerHTML = formatMoney(totalPayment) + '<span class="result-unit">元</span>';

      // 生成还款计划表
      const tbody = document.getElementById('planTableBody');
      tbody.innerHTML = '';
      
      // 只显示前 12 期和最后 12 期
      const displayMonths = months <= 24 ? months : 24;
      const shownMonths = new Set();
      
      for (let i = 0; i < plan.length; i++) {
        const item = plan[i];
        const shouldShow = i < 12 || i >= months - 12;
        
        if (shouldShow) {
          shownMonths.add(item.month);
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${item.month}</td>
            <td>${formatMoney(item.payment)}</td>
            <td>${formatMoney(item.principalPart)}</td>
            <td>${formatMoney(item.interestPart)}</td>
            <td>${formatMoney(item.remainingPrincipal)}</td>
          `;
          tbody.appendChild(tr);
        } else if (i === 12 && months > 24) {
          const tr = document.createElement('tr');
          tr.innerHTML = '<td colspan="5" style="text-align: center; color: #9ca3af;">... 中间省略 ' + (months - 24) + ' 期 ...</td>';
          tbody.appendChild(tr);
        }
      }

      // 显示总计行
      const totalRow = document.createElement('tr');
      totalRow.className = 'total-row';
      totalRow.innerHTML = `
        <td>合计</td>
        <td>${formatMoney(totalPayment)}</td>
        <td>${formatMoney(principal)}</td>
        <td>${formatMoney(totalInterest)}</td>
        <td>-</td>
      `;
      tbody.appendChild(totalRow);

      document.getElementById('calculateResults').style.display = 'block';
    }

    // 重置贷款计算
    function resetCalculate() {
      document.getElementById('loanAmount').value = '100';
      document.getElementById('loanTerm').value = '30';
      document.getElementById('annualRate').value = '4.2';
      document.getElementById('repaymentMethod').value = 'equal-principal-interest';
      document.getElementById('calculateResults').style.display = 'none';
    }

    // 反推利率（使用二分法）
    function calculateReverseRate() {
      const loanAmount = parseFloat(document.getElementById('reverseLoanAmount').value);
      const loanTerm = parseFloat(document.getElementById('reverseLoanTerm').value);
      const monthlyPayment = parseFloat(document.getElementById('monthlyPaymentInput').value);

      // 验证输入
      if (!loanAmount || !loanTerm || !monthlyPayment) {
        alert('请填写完整的信息！');
        return;
      }

      const principal = loanAmount * 10000;
      const months = loanTerm * 12;

      // 使用二分法查找利率
      let lowRate = 0;
      let highRate = 0.3; // 最高 30% 年利率
      let actualRate = 0;
      const precision = 0.000001; // 精度
      const maxIterations = 100;
      let iterations = 0;

      while (iterations < maxIterations) {
        actualRate = (lowRate + highRate) / 2;
        const monthlyRate = actualRate / 12;
        
        const calculatedPayment = calculateEqualPrincipalInterest(principal, monthlyRate, months);
        
        if (Math.abs(calculatedPayment - monthlyPayment) < precision) {
          break;
        }
        
        if (calculatedPayment < monthlyPayment) {
          lowRate = actualRate;
        } else {
          highRate = actualRate;
        }
        
        iterations++;
      }

      const annualRate = actualRate * 12 * 100; // 转换为百分比

      // 使用找到的利率重新计算完整计划
      const monthlyRate = actualRate;
      let totalPayment = 0;
      let totalInterest = 0;
      const plan = [];
      let remainingPrincipal = principal;

      for (let i = 1; i <= months; i++) {
        const interestPart = remainingPrincipal * monthlyRate;
        const principalPart = monthlyPayment - interestPart;
        remainingPrincipal -= principalPart;
        
        if (remainingPrincipal < 0) remainingPrincipal = 0;
        
        totalPayment += monthlyPayment;
        totalInterest += interestPart;
        
        plan.push({
          month: i,
          payment: monthlyPayment,
          principalPart: principalPart,
          interestPart: interestPart,
          remainingPrincipal: remainingPrincipal
        });
      }

      // 更新结果
      document.getElementById('actualRate').innerHTML = formatMoney(annualRate) + '<span class="result-unit">%</span>';
      document.getElementById('reverseTotalLoan').innerHTML = formatMoney(principal) + '<span class="result-unit">元</span>';
      document.getElementById('reverseTotalPayment').innerHTML = formatMoney(totalPayment) + '<span class="result-unit">元</span>';
      document.getElementById('reverseTotalInterest').innerHTML = formatMoney(totalInterest) + '<span class="result-unit">元</span>';

      // 生成还款计划表
      const tbody = document.getElementById('reversePlanTableBody');
      tbody.innerHTML = '';
      
      const displayMonths = months <= 24 ? months : 24;
      const shownMonths = new Set();
      
      for (let i = 0; i < plan.length; i++) {
        const item = plan[i];
        const shouldShow = i < 12 || i >= months - 12;
        
        if (shouldShow) {
          shownMonths.add(item.month);
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${item.month}</td>
            <td>${formatMoney(item.payment)}</td>
            <td>${formatMoney(item.principalPart)}</td>
            <td>${formatMoney(item.interestPart)}</td>
            <td>${formatMoney(item.remainingPrincipal)}</td>
          `;
          tbody.appendChild(tr);
        } else if (i === 12 && months > 24) {
          const tr = document.createElement('tr');
          tr.innerHTML = '<td colspan="5" style="text-align: center; color: #9ca3af;">... 中间省略 ' + (months - 24) + ' 期 ...</td>';
          tbody.appendChild(tr);
        }
      }

      // 显示总计行
      const totalRow = document.createElement('tr');
      totalRow.className = 'total-row';
      totalRow.innerHTML = `
        <td>合计</td>
        <td>${formatMoney(totalPayment)}</td>
        <td>${formatMoney(principal)}</td>
        <td>${formatMoney(totalInterest)}</td>
        <td>-</td>
      `;
      tbody.appendChild(totalRow);

      document.getElementById('reverseResults').style.display = 'block';
    }

    // 重置反推利率
    function resetReverse() {
      document.getElementById('reverseLoanAmount').value = '100';
      document.getElementById('reverseLoanTerm').value = '30';
      document.getElementById('monthlyPaymentInput').value = '4895';
      document.getElementById('reverseResults').style.display = 'none';
    }
  </script>
</body>
</html>
