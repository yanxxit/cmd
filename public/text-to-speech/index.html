<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本转语音 - 文字朗读工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 32px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .header p {
      opacity: 0.9;
      font-size: 16px;
    }

    .content {
      padding: 30px;
    }

    .input-section {
      margin-bottom: 25px;
    }

    .input-section label {
      display: block;
      font-weight: 600;
      color: #374151;
      margin-bottom: 10px;
      font-size: 16px;
    }

    textarea {
      width: 100%;
      min-height: 250px;
      padding: 16px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 16px;
      line-height: 1.6;
      resize: vertical;
      transition: all 0.3s;
      font-family: inherit;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 25px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
    }

    .control-group label {
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
      font-size: 14px;
    }

    select {
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 15px;
      background: white;
      cursor: pointer;
      transition: all 0.3s;
    }

    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .range-control {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    input[type="range"] {
      flex: 1;
      height: 8px;
      border-radius: 4px;
      background: #e5e7eb;
      outline: none;
      -webkit-appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
      transition: all 0.3s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #764ba2;
      transform: scale(1.1);
    }

    .range-value {
      min-width: 50px;
      text-align: center;
      font-weight: 600;
      color: #667eea;
      font-size: 15px;
    }

    .button-group {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 150px;
      padding: 16px 24px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
    }

    .btn-secondary:hover {
      background: #e5e7eb;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .status-bar {
      margin-top: 25px;
      padding: 16px;
      background: #f9fafb;
      border-radius: 12px;
      display: none;
    }

    .status-bar.active {
      display: block;
    }

    .status-content {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #374151;
      font-size: 15px;
    }

    .status-icon {
      font-size: 24px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    .progress-bar {
      margin-top: 12px;
      height: 6px;
      background: #e5e7eb;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      width: 0%;
      transition: width 0.3s;
    }

    .history-section {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 2px solid #e5e7eb;
    }

    .history-section h3 {
      font-size: 18px;
      color: #374151;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 300px;
      overflow-y: auto;
    }

    .history-item {
      padding: 14px 16px;
      background: #f9fafb;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-item:hover {
      background: #f3f4f6;
      transform: translateX(4px);
    }

    .history-text {
      flex: 1;
      color: #374151;
      font-size: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-right: 12px;
    }

    .history-time {
      color: #9ca3af;
      font-size: 13px;
    }

    @media (max-width: 768px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .button-group {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>
        <span>🔊</span>
        <span>文本转语音</span>
      </h1>
      <p>输入文字，点击播放即可听到朗读声音</p>
    </div>

    <div class="content">
      <div class="input-section">
        <label for="textInput">输入文本：</label>
        <textarea 
          id="textInput" 
          placeholder="请输入要朗读的文字内容..."
        ></textarea>
      </div>

      <div class="controls">
        <div class="control-group">
          <label for="voiceSelect">选择语音：</label>
          <select id="voiceSelect"></select>
        </div>

        <div class="control-group">
          <label for="rateControl">语速：<span id="rateValue" class="range-value">1.0</span></label>
          <div class="range-control">
            <input 
              type="range" 
              id="rateControl" 
              min="0.5" 
              max="2" 
              step="0.1" 
              value="1"
            >
          </div>
        </div>

        <div class="control-group">
          <label for="pitchControl">音调：<span id="pitchValue" class="range-value">1.0</span></label>
          <div class="range-control">
            <input 
              type="range" 
              id="pitchControl" 
              min="0.5" 
              max="2" 
              step="0.1" 
              value="1"
            >
          </div>
        </div>

        <div class="control-group">
          <label for="volumeControl">音量：<span id="volumeValue" class="range-value">1.0</span></label>
          <div class="range-control">
            <input 
              type="range" 
              id="volumeControl" 
              min="0" 
              max="1" 
              step="0.1" 
              value="1"
            >
          </div>
        </div>
      </div>

      <div class="button-group">
        <button class="btn btn-primary" id="playBtn">
          <span>▶️</span>
          <span>播放</span>
        </button>
        <button class="btn btn-secondary" id="pauseBtn">
          <span>⏸️</span>
          <span>暂停</span>
        </button>
        <button class="btn btn-secondary" id="resumeBtn">
          <span>⏯️</span>
          <span>继续</span>
        </button>
        <button class="btn btn-danger" id="stopBtn">
          <span>⏹️</span>
          <span>停止</span>
        </button>
      </div>

      <div class="status-bar" id="statusBar">
        <div class="status-content">
          <span class="status-icon">🔊</span>
          <span id="statusText">正在朗读...</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="history-section">
        <h3>
          <span>📜</span>
          <span>历史记录</span>
        </h3>
        <div class="history-list" id="historyList"></div>
      </div>
    </div>
  </div>

  <script>
    // 语音合成相关
    const synth = window.speechSynthesis;
    let voices = [];
    let isPaused = false;

    // DOM 元素
    const textInput = document.getElementById('textInput');
    const voiceSelect = document.getElementById('voiceSelect');
    const rateControl = document.getElementById('rateControl');
    const rateValue = document.getElementById('rateValue');
    const pitchControl = document.getElementById('pitchControl');
    const pitchValue = document.getElementById('pitchValue');
    const volumeControl = document.getElementById('volumeControl');
    const volumeValue = document.getElementById('volumeValue');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resumeBtn = document.getElementById('resumeBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusBar = document.getElementById('statusBar');
    const statusText = document.getElementById('statusText');
    const progressFill = document.getElementById('progressFill');
    const historyList = document.getElementById('historyList');

    // 加载语音列表
    function loadVoices() {
      voices = synth.getVoices();
      voiceSelect.innerHTML = '';

      // 优先显示中文语音
      const chineseVoices = voices.filter(voice => voice.lang.includes('zh') || voice.lang.includes('cn'));
      const otherVoices = voices.filter(voice => !voice.lang.includes('zh') && !voice.lang.includes('cn'));

      // 先添加中文语音
      chineseVoices.forEach(voice => {
        const option = document.createElement('option');
        option.value = voice.name;
        option.textContent = `${voice.name} (${voice.lang})`;
        if (voice.default) {
          option.selected = true;
        }
        voiceSelect.appendChild(option);
      });

      // 添加分隔符
      if (chineseVoices.length > 0 && otherVoices.length > 0) {
        const separator = document.createElement('option');
        separator.disabled = true;
        separator.textContent = '────────────';
        voiceSelect.appendChild(separator);
      }

      // 添加其他语音
      otherVoices.forEach(voice => {
        const option = document.createElement('option');
        option.value = voice.name;
        option.textContent = `${voice.name} (${voice.lang})`;
        if (voice.default && chineseVoices.length === 0) {
          option.selected = true;
        }
        voiceSelect.appendChild(option);
      });

      if (voices.length === 0) {
        const option = document.createElement('option');
        option.textContent = '默认语音';
        voiceSelect.appendChild(option);
      }
    }

    // 初始化语音列表
    loadVoices();
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = loadVoices;
    }

    // 滑块值更新
    rateControl.addEventListener('input', () => {
      rateValue.textContent = rateControl.value;
    });

    pitchControl.addEventListener('input', () => {
      pitchValue.textContent = pitchControl.value;
    });

    volumeControl.addEventListener('input', () => {
      volumeValue.textContent = volumeControl.value;
    });

    // 播放功能
    function speak() {
      if (synth.speaking) {
        synth.cancel();
      }

      const text = textInput.value.trim();
      if (text === '') {
        alert('请输入要朗读的文字内容！');
        return;
      }

      const utterance = new SpeechSynthesisUtterance(text);
      
      // 设置语音
      const selectedVoice = voiceSelect.value;
      if (selectedVoice) {
        const voice = voices.find(v => v.name === selectedVoice);
        if (voice) {
          utterance.voice = voice;
        }
      }

      // 设置参数
      utterance.rate = parseFloat(rateControl.value);
      utterance.pitch = parseFloat(pitchControl.value);
      utterance.volume = parseFloat(volumeControl.value);

      // 事件监听
      utterance.onstart = () => {
        statusBar.classList.add('active');
        statusText.textContent = '正在朗读...';
        playBtn.disabled = true;
        isPaused = false;
        addToHistory(text);
      };

      utterance.onend = () => {
        statusBar.classList.remove('active');
        progressFill.style.width = '0%';
        playBtn.disabled = false;
        pauseBtn.disabled = true;
        resumeBtn.disabled = true;
      };

      utterance.onerror = (event) => {
        statusBar.classList.remove('active');
        playBtn.disabled = false;
        console.error('语音合成错误:', event);
        alert('朗读失败，请重试！');
      };

      utterance.onboundary = (event) => {
        const progress = (event.charIndex / text.length) * 100;
        progressFill.style.width = progress + '%';
      };

      synth.speak(utterance);
      pauseBtn.disabled = false;
      resumeBtn.disabled = true;
    }

    // 暂停功能
    function pause() {
      if (synth.speaking && !synth.paused) {
        synth.pause();
        isPaused = true;
        statusText.textContent = '已暂停';
        pauseBtn.disabled = true;
        resumeBtn.disabled = false;
      }
    }

    // 继续功能
    function resume() {
      if (synth.paused) {
        synth.resume();
        isPaused = false;
        statusText.textContent = '正在朗读...';
        pauseBtn.disabled = false;
        resumeBtn.disabled = true;
      }
    }

    // 停止功能
    function stop() {
      if (synth.speaking || synth.paused) {
        synth.cancel();
        statusBar.classList.remove('active');
        progressFill.style.width = '0%';
        playBtn.disabled = false;
        pauseBtn.disabled = true;
        resumeBtn.disabled = true;
      }
    }

    // 历史记录管理
    function addToHistory(text) {
      const history = getHistory();
      
      // 避免重复
      const exists = history.some(item => item.text === text);
      if (exists) return;

      // 添加到开头
      history.unshift({
        text: text,
        time: new Date().toLocaleString('zh-CN')
      });

      // 限制最多 100 条
      if (history.length > 100) {
        history.pop();
      }

      localStorage.setItem('ttsHistory', JSON.stringify(history));
      renderHistory();
    }

    function getHistory() {
      const historyStr = localStorage.getItem('ttsHistory');
      return historyStr ? JSON.parse(historyStr) : [];
    }

    function renderHistory() {
      const history = getHistory();
      historyList.innerHTML = '';

      if (history.length === 0) {
        historyList.innerHTML = '<div style="color: #9ca3af; text-align: center; padding: 20px;">暂无历史记录</div>';
        return;
      }

      history.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `
          <div class="history-text">${escapeHtml(item.text)}</div>
          <div class="history-time">${item.time}</div>
        `;
        div.addEventListener('click', () => {
          textInput.value = item.text;
          textInput.focus();
        });
        historyList.appendChild(div);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 按钮事件
    playBtn.addEventListener('click', speak);
    pauseBtn.addEventListener('click', pause);
    resumeBtn.addEventListener('click', resume);
    stopBtn.addEventListener('click', stop);

    // 初始化
    pauseBtn.disabled = true;
    resumeBtn.disabled = true;
    renderHistory();
  </script>
</body>
</html>
