<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word 文档解析工具</title>
  <meta name="description" content="拖拽上传 .docx，查看 Word 的渲染结果与原始文本。">
  <script>
    const G_VER = Date.now();
    window.G_VER = G_VER;
    window.getAssetUrl = (path) => `${path}?v=${G_VER}`;
    ['./css/tool-page.css', './css/word.css'].forEach((href) => {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = window.getAssetUrl(href);
      document.head.appendChild(link);
    });
  </script>
  <script src="https://cdn.bootcdn.net/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <a href="/paste-parser/" class="back-link">← 返回主页</a>
      <a href="/paste-parser/xlsx.html" class="back-link">📊 Excel 解析</a>
      <a href="/paste-parser/url-edit.html" class="back-link">🛠️ URL 编辑器</a>
      <a href="/paste-parser/url.html" class="back-link">🔗 URL 解析工具</a>
    </div>

    <div class="header">
      <h1>📄 Word 文档解析工具</h1>
      <p>拖拽上传 Word 文档（.docx），查看转换后的渲染视图与原始文本。</p>
    </div>

    <div class="main-card">
      <div id="wordUploadArea" class="upload-area">
        <div class="upload-icon">📁</div>
        <div class="upload-title">拖拽 Word 文档到此处</div>
        <div class="upload-hint">或点击选择文件（支持 .docx 格式）</div>
      </div>
      <input id="wordFileInput" class="file-input" type="file" accept=".docx">

      <div id="wordSuccessBox" class="feedback success hidden">✅ 文档解析成功！</div>
      <div id="wordErrorBox" class="feedback error hidden">❌ <span id="wordErrorText"></span></div>

      <div id="wordFileInfo" class="file-info hidden">
        <div class="file-info-content">
          <div class="file-icon">📄</div>
          <div>
            <div id="wordFileName" class="file-name"></div>
            <div id="wordFileSize" class="file-size"></div>
          </div>
        </div>
        <button id="wordClearButton" class="btn btn-danger" type="button">🗑️ 清空</button>
      </div>

      <div id="wordLoadingBox" class="loading hidden">
        <div class="loading-spinner">⏳</div>
        <p>正在解析 Word 文档...</p>
      </div>

      <section id="wordResultSection" class="hidden">
        <div id="wordStats" class="stats"></div>
        <ul id="wordMessageList" class="message-list hidden"></ul>

        <div class="view-tabs">
          <button id="wordRenderedTab" class="view-tab active" type="button">👁️ 渲染视图</button>
          <button id="wordRawTab" class="view-tab" type="button">📝 原始文本</button>
        </div>

        <div id="wordRenderedPanel" class="panel content-container">
          <div id="wordRenderedContent"></div>
        </div>
        <div id="wordRawPanel" class="panel raw-content hidden">
          <pre id="wordRawContent"></pre>
        </div>
      </section>
    </div>
  </div>

  <script type="module">
    await import(`./js/word/main.js?v=${window.G_VER}`);
  </script>
</body>
</html>
