<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL 参数解析工具</title>
  <meta name="description" content="输入或加载预设 URL，解析 Query / Hash 参数与解码结果。">
  <script>
    const G_VER = Date.now();
    window.G_VER = G_VER;
    window.getAssetUrl = (path) => `${path}?v=${G_VER}`;
    ['./css/tool-page.css', './css/url-tools.css'].forEach((href) => {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = window.getAssetUrl(href);
      document.head.appendChild(link);
    });
  </script>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <a href="/paste-parser/" class="back-link">← 返回主页</a>
      <a href="/paste-parser/url-edit.html" class="back-link">🛠️ URL 编辑器</a>
    </div>

    <div class="header">
      <h1>🔗 URL 参数解析工具</h1>
      <p>粘贴 URL 链接或加载预设案例，自动解析 Query / Hash 参数和解码结果。</p>
    </div>

    <div class="main-card">
      <section class="input-section">
        <div class="test-case-select-section">
          <label class="test-case-select-label" for="urlTestCaseSelect">💡 或选择预设测试案例：</label>
          <div class="test-case-select-wrapper">
            <select id="urlTestCaseSelect" class="test-case-select"></select>
            <button id="urlUseCaseButton" class="btn" type="button">🔍 使用此案例</button>
          </div>
          <div id="urlTestCaseHint" class="test-case-hint"></div>
        </div>

        <label class="input-label" for="urlInput">请输入或粘贴 URL 链接：</label>
        <textarea
          id="urlInput"
          class="url-input"
          rows="3"
          placeholder="例如：https://example.com/search?keyword=测试&page=1#section=docs"
        ></textarea>
        <div class="actions">
          <button id="urlParseButton" class="btn" type="button">🔍 解析 URL</button>
          <button id="urlClearButton" class="btn btn-outline" type="button">清空</button>
        </div>
      </section>

      <div id="urlErrorBox" class="feedback error hidden">❌ <span id="urlErrorText"></span></div>

      <section id="urlResultSection" class="hidden">
        <div id="urlStats" class="stats"></div>
        <div id="urlResultBody"></div>
      </section>
    </div>
  </div>

  <script type="module">
    await import(`./js/url/main.js?v=${window.G_VER}`);
  </script>
</body>
</html>
