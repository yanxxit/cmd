<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL 编辑器</title>
  <meta name="description" content="可视化编辑 URL 基础地址、Query 和 Hash 参数，实时生成最终链接。">
  <script>
    const G_VER = Date.now();
    window.G_VER = G_VER;
    window.getAssetUrl = (path) => `${path}?v=${G_VER}`;
    ['./css/tool-page.css', './css/url-tools.css'].forEach((href) => {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = window.getAssetUrl(href);
      document.head.appendChild(link);
    });
  </script>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <a href="/paste-parser/" class="back-link">← 返回主页</a>
      <a href="/paste-parser/url.html" class="back-link">🔗 URL 解析工具</a>
    </div>

    <div class="header">
      <h1>🛠️ URL 编辑器</h1>
      <p>可视化编辑基础地址、Query / Hash 参数，并实时生成最终 URL。</p>
    </div>

    <div class="main-card">
      <div class="test-case-select-section">
        <label class="test-case-select-label" for="urlEditTestCaseSelect">💡 或选择预设模板：</label>
        <div class="test-case-select-wrapper">
          <select id="urlEditTestCaseSelect" class="test-case-select"></select>
          <button id="urlEditUseCaseButton" class="btn" type="button">📥 加载模板</button>
        </div>
      </div>

      <section class="input-section">
        <div class="input-group">
          <label class="input-label" for="urlEditBaseUrl">📍 基础地址（协议 + 域名）</label>
          <input id="urlEditBaseUrl" class="url-input" type="text" placeholder="例如：https://example.com">
        </div>
        <div class="input-group">
          <label class="input-label" for="urlEditPathname">📄 路径</label>
          <input id="urlEditPathname" class="url-input" type="text" placeholder="例如：/api/users 或 /search">
        </div>
      </section>

      <section class="params-section">
        <h2 class="params-title">📊 Query 参数</h2>
        <div id="urlEditQueryParamsList" class="params-list"></div>
        <div class="actions">
          <button id="urlEditAddQueryButton" class="btn btn-outline" type="button">+ 添加 Query 参数</button>
        </div>
      </section>

      <section class="params-section">
        <h2 class="params-title">📊 Hash 参数</h2>
        <div id="urlEditHashParamsList" class="params-list"></div>
        <div class="actions">
          <button id="urlEditAddHashButton" class="btn btn-outline" type="button">+ 添加 Hash 参数</button>
        </div>
      </section>

      <section class="preview-section">
        <h2 class="params-title">🔗 生成的 URL</h2>
        <div id="urlEditStats" class="stats"></div>
        <div id="urlEditPreviewBox" class="preview-box"></div>
        <div class="actions">
          <button id="urlEditCopyButton" class="btn" type="button">📋 复制 URL</button>
          <button id="urlEditClearButton" class="btn btn-outline" type="button">🗑️ 清空所有</button>
        </div>
        <div id="urlEditSuccessBox" class="feedback success hidden">✓ <span id="urlEditSuccessText"></span></div>
        <div id="urlEditErrorBox" class="feedback error hidden">❌ <span id="urlEditErrorText"></span></div>
      </section>
    </div>
  </div>

  <script type="module">
    await import(`./js/url-edit/main.js?v=${window.G_VER}`);
  </script>
</body>
</html>
