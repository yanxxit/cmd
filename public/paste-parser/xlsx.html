<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excel 文件解析工具</title>
  <meta name="description" content="拖拽上传 .xlsx 或 .xls，浏览工作表与数据表格。">
  <script>
    const G_VER = Date.now();
    window.G_VER = G_VER;
    window.getAssetUrl = (path) => `${path}?v=${G_VER}`;
    ['./css/tool-page.css', './css/xlsx.css'].forEach((href) => {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = window.getAssetUrl(href);
      document.head.appendChild(link);
    });
  </script>
  <script src="/libs/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <a href="/paste-parser/" class="back-link">← 返回主页</a>
      <a href="/paste-parser/word.html" class="back-link">📄 Word 解析</a>
      <a href="/paste-parser/url-edit.html" class="back-link">🛠️ URL 编辑器</a>
      <a href="/paste-parser/url.html" class="back-link">🔗 URL 解析工具</a>
    </div>

    <div class="header">
      <h1>📊 Excel 文件解析工具</h1>
      <p>拖拽上传 Excel 文件（.xlsx / .xls），按工作表浏览二维表格数据。</p>
    </div>

    <div class="main-card">
      <div id="xlsxUploadArea" class="upload-area">
        <div class="upload-icon">📁</div>
        <div class="upload-title">拖拽 Excel 文件到此处</div>
        <div class="upload-hint">或点击选择文件（支持 .xlsx / .xls 格式）</div>
      </div>
      <input id="xlsxFileInput" class="file-input" type="file" accept=".xlsx,.xls">

      <div id="xlsxSuccessBox" class="feedback success hidden">✅ 文件解析成功！</div>
      <div id="xlsxErrorBox" class="feedback error hidden">❌ <span id="xlsxErrorText"></span></div>

      <div id="xlsxFileInfo" class="file-info hidden">
        <div class="file-info-content">
          <div class="file-icon">📄</div>
          <div>
            <div id="xlsxFileName" class="file-name"></div>
            <div id="xlsxFileSize" class="file-size"></div>
          </div>
        </div>
        <button id="xlsxClearButton" class="btn btn-danger" type="button">🗑️ 清空</button>
      </div>

      <div id="xlsxLoadingBox" class="loading hidden">
        <div class="loading-spinner">⏳</div>
        <p>正在解析 Excel 文件...</p>
      </div>

      <section id="xlsxResultSection" class="hidden">
        <div id="xlsxStats" class="stats"></div>
        <div id="xlsxSheetTabs" class="sheet-tabs hidden"></div>
        <div class="panel table-container" id="xlsxTableContainer"></div>
      </section>
    </div>
  </div>

  <script type="module">
    await import(`./js/xlsx/main.js?v=${window.G_VER}`);
  </script>
</body>
</html>
