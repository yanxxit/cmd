<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📝 TODO List v4</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Alpine.js CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
  
  <!-- Axios CDN -->
  <script src="https://unpkg.com/axios@1.6.2/dist/axios.min.js"></script>
  
  <!-- Tailwind 配置 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              200: '#bae6fd',
              300: '#7dd3fc',
              400: '#38bdf8',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
              800: '#075985',
              900: '#0c4a6e',
            }
          }
        }
      }
    }
  </script>
  
  <style>
    /* 自定义动画 */
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .toast-enter {
      animation: slideIn 0.3s ease-out;
    }
    
    /* 自定义滚动条 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen" x-data="todoApp()" x-init="init()">
  <!-- 顶部导航栏 -->
  <header class="bg-white/80 backdrop-blur-sm shadow-md border-b sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-3">
          <span class="text-3xl">✅</span>
          <div>
            <h1 class="text-xl font-bold text-gray-900">TODO List</h1>
            <span class="text-xs text-gray-500">v4 - Alpine.js + Tailwind</span>
          </div>
        </div>
        
        <div class="flex items-center gap-4">
          <!-- 模式切换 -->
          <div class="hidden sm:flex items-center bg-gray-100 rounded-lg p-1">
            <button @click="mode = 'work'" 
                    :class="mode === 'work' ? 'bg-white shadow text-sky-600' : 'text-gray-500 hover:text-gray-700'"
                    class="px-3 py-1.5 rounded-md text-sm font-medium transition-all flex items-center gap-1.5">
              <span>💼</span>
              <span class="hidden md:inline">工作</span>
            </button>
            <button @click="mode = 'study'" 
                    :class="mode === 'study' ? 'bg-white shadow text-amber-600' : 'text-gray-500 hover:text-gray-700'"
                    class="px-3 py-1.5 rounded-md text-sm font-medium transition-all flex items-center gap-1.5">
              <span>📚</span>
              <span class="hidden md:inline">学习</span>
            </button>
            <button @click="mode = 'life'" 
                    :class="mode === 'life' ? 'bg-white shadow text-green-600' : 'text-gray-500 hover:text-gray-700'"
                    class="px-3 py-1.5 rounded-md text-sm font-medium transition-all flex items-center gap-1.5">
              <span>🏠</span>
              <span class="hidden md:inline">生活</span>
            </button>
          </div>
          
          <!-- 统计徽章 -->
          <div class="hidden md:flex items-center gap-2">
            <span class="px-2.5 py-1 bg-gray-100 rounded-full text-xs">
              总计：<span class="font-semibold" x-text="stats.total"></span>
            </span>
            <span class="px-2.5 py-1 bg-amber-100 text-amber-700 rounded-full text-xs">
              待处理：<span class="font-semibold" x-text="stats.pending"></span>
            </span>
            <span class="px-2.5 py-1 bg-green-100 text-green-700 rounded-full text-xs">
              已完成：<span class="font-semibold" x-text="stats.completed"></span>
            </span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <!-- 欢迎提示 -->
    <div class="mb-6">
      <h2 class="text-2xl font-bold text-gray-900" x-text="greetingText"></h2>
      <p class="text-gray-500 text-sm mt-1" x-text="modeDescription"></p>
    </div>
    
    <div class="flex flex-col lg:flex-row gap-6">
      <!-- 侧边栏 -->
      <aside class="lg:w-64 flex-shrink-0">
        <nav class="bg-white rounded-xl shadow-sm border overflow-hidden sticky top-24">
          <div class="p-4 border-b bg-gradient-to-r from-slate-50 to-white">
            <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider">筛选</h2>
          </div>
          <div class="p-2 space-y-1">
            <a href="#" @click.prevent="filter = 'all'" 
               :class="filter === 'all' ? 'bg-sky-50 text-sky-700 border-sky-200' : 'text-gray-700 hover:bg-gray-50 border-transparent'"
               class="flex items-center justify-between px-4 py-3 rounded-lg transition-colors border">
              <div class="flex items-center gap-3">
                <span class="text-xl">📋</span>
                <span class="font-medium">全部任务</span>
              </div>
              <span class="px-2 py-0.5 text-xs rounded-full"
                    :class="filter === 'all' ? 'bg-sky-200 text-sky-700' : 'bg-gray-100 text-gray-600'"
                    x-text="stats.total"></span>
            </a>
            
            <a href="#" @click.prevent="filter = 'pending'" 
               :class="filter === 'pending' ? 'bg-amber-50 text-amber-700 border-amber-200' : 'text-gray-700 hover:bg-gray-50 border-transparent'"
               class="flex items-center justify-between px-4 py-3 rounded-lg transition-colors border">
              <div class="flex items-center gap-3">
                <span class="text-xl">⏳</span>
                <span class="font-medium">待处理</span>
              </div>
              <span class="px-2 py-0.5 text-xs rounded-full"
                    :class="filter === 'pending' ? 'bg-amber-200 text-amber-700' : 'bg-gray-100 text-gray-600'"
                    x-text="stats.pending"></span>
            </a>
            
            <a href="#" @click.prevent="filter = 'completed'" 
               :class="filter === 'completed' ? 'bg-green-50 text-green-700 border-green-200' : 'text-gray-700 hover:bg-gray-50 border-transparent'"
               class="flex items-center justify-between px-4 py-3 rounded-lg transition-colors border">
              <div class="flex items-center gap-3">
                <span class="text-xl">✅</span>
                <span class="font-medium">已完成</span>
              </div>
              <span class="px-2 py-0.5 text-xs rounded-full"
                    :class="filter === 'completed' ? 'bg-green-200 text-green-700' : 'bg-gray-100 text-gray-600'"
                    x-text="stats.completed"></span>
            </a>
          </div>
          
          <div class="p-4 border-t bg-gradient-to-r from-slate-50 to-white">
            <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">排序</h2>
            <select x-model="sort" 
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent bg-white">
              <option value="created_desc">按创建时间 (最新)</option>
              <option value="created_asc">按创建时间 (最早)</option>
              <option value="priority_desc">按优先级 (高到低)</option>
              <option value="priority_asc">按优先级 (低到高)</option>
              <option value="due_date_asc">按截止日期 (临近)</option>
            </select>
          </div>
        </nav>
      </aside>

      <!-- 主内容区 -->
      <main class="flex-1 min-w-0">
        <!-- 添加任务 -->
        <div class="bg-white rounded-xl shadow-sm border p-4 mb-4">
          <div class="flex gap-3">
            <input type="text" x-model="newTaskContent" 
                   @keydown.enter="addTodo()"
                   placeholder="添加新任务..." 
                   class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent transition-shadow">
            <button @click="addTodo()" 
                    class="px-6 py-3 bg-gradient-to-r from-sky-500 to-blue-600 text-white rounded-lg font-medium hover:from-sky-600 hover:to-blue-700 transition-all flex items-center gap-2 shadow-sm">
              <span>➕</span>
              <span class="hidden sm:inline">添加</span>
            </button>
          </div>
        </div>

        <!-- 搜索栏 -->
        <div class="bg-white rounded-xl shadow-sm border p-4 mb-4">
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
            <input type="text" x-model="search" 
                   placeholder="搜索任务..." 
                   class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent">
          </div>
        </div>

        <!-- 任务列表 -->
        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
          <div class="px-4 py-3 border-b bg-gradient-to-r from-slate-50 to-white">
            <div class="flex items-center justify-between">
              <h2 class="font-semibold text-gray-900" x-text="filterText"></h2>
              <span class="text-sm text-gray-500" x-text="filteredTodos.length + ' 个任务'"></span>
            </div>
          </div>
          
          <!-- 加载中 -->
          <div x-show="loading" class="p-8 text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-sky-600"></div>
            <p class="mt-2 text-gray-500">加载中...</p>
          </div>
          
          <!-- 空状态 -->
          <div x-show="!loading && filteredTodos.length === 0" class="p-12 text-center">
            <span class="text-6xl block mb-4">🎉</span>
            <p class="text-gray-900 font-medium mb-1">暂无任务</p>
            <p class="text-sm text-gray-500">添加你的第一个任务吧！</p>
          </div>
          
          <!-- 批量操作栏 -->
          <div x-show="selectedIds.length > 0"
               class="px-4 py-3 border-b bg-sky-50 flex items-center justify-between">
            <span class="text-sm text-sky-700">已选择 <span class="font-semibold" x-text="selectedIds.length"></span> 个任务</span>
            <div class="flex gap-2">
              <button @click="batchComplete()" class="px-3 py-1.5 bg-green-600 text-white rounded-md text-sm font-medium hover:bg-green-700 transition-colors">
                ✅ 完成
              </button>
              <button @click="batchDelete()" class="px-3 py-1.5 bg-red-600 text-white rounded-md text-sm font-medium hover:bg-red-700 transition-colors">
                🗑️ 删除
              </button>
              <button @click="selectedIds = []" class="px-3 py-1.5 bg-gray-200 text-gray-700 rounded-md text-sm font-medium hover:bg-gray-300 transition-colors">
                取消
              </button>
            </div>
          </div>
          
          <!-- 任务列表 -->
          <div class="divide-y">
            <template x-for="todo in filteredTodos" :key="todo.id">
              <div class="p-4 hover:bg-slate-50 transition-colors group"
                   :class="{'bg-sky-50/50': selectedIds.includes(todo.id)}">
                <div class="flex items-start gap-3">
                  <!-- 复选框 -->
                  <template x-if="selectedIds.length > 0">
                    <input type="checkbox" x-model="selectedIds" :value="todo.id"
                           class="mt-1 w-5 h-5 rounded border-gray-300 text-sky-600 focus:ring-sky-500 cursor-pointer">
                  </template>
                  <template x-if="selectedIds.length === 0">
                    <input type="checkbox" :checked="todo.completed"
                           @change="toggleTodoStatus(todo.id, $event.target.checked)"
                           class="mt-1 w-5 h-5 rounded border-gray-300 text-sky-600 focus:ring-sky-500 cursor-pointer">
                  </template>
                  
                  <!-- 内容 -->
                  <div class="flex-1 min-w-0" @dblclick="openEditModal(todo)">
                    <p class="text-gray-900 font-medium" :class="{'line-through text-gray-400': todo.completed}" x-text="todo.content"></p>
                    
                    <div class="flex flex-wrap items-center gap-2 mt-2">
                      <!-- 优先级 -->
                      <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-xs font-medium"
                            :class="{
                              'bg-red-100 text-red-700': todo.priority === 1,
                              'bg-amber-100 text-amber-700': todo.priority === 2,
                              'bg-green-100 text-green-700': todo.priority === 3
                            }">
                        <span x-text="priorityIcon(todo.priority)"></span>
                        <span x-text="priorityText(todo.priority)"></span>
                      </span>
                      
                      <!-- 截止日期 -->
                      <template x-if="todo.due_date">
                        <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-xs"
                              :class="isOverdue(todo) ? 'bg-red-100 text-red-700 font-medium' : 'bg-gray-100 text-gray-600'">
                          <span>📅</span>
                          <span x-text="formatDueDate(todo.due_date)"></span>
                        </span>
                      </template>
                      
                      <!-- 子任务 -->
                      <template x-if="todo.subtask_count > 0">
                        <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-xs bg-sky-100 text-sky-700">
                          <span>📝</span>
                          <span x-text="todo.subtask_completed + '/' + todo.subtask_count"></span>
                        </span>
                      </template>
                      
                      <!-- 备注标识 -->
                      <template x-if="todo.note">
                        <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-xs bg-purple-100 text-purple-700">
                          <span>📝</span>
                          <span>备注</span>
                        </span>
                      </template>
                      
                      <!-- 创建时间 -->
                      <span class="text-xs text-gray-400">
                        <span>⏰</span>
                        <span x-text="formatTime(todo.created_at)"></span>
                      </span>
                    </div>
                  </div>
                  
                  <!-- 操作按钮 -->
                  <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button @click="openEditModal(todo)" 
                            class="p-2 hover:bg-gray-200 rounded-lg transition-colors" title="编辑">
                      ✏️
                    </button>
                    <button @click="confirmDelete(todo.id)" 
                            class="p-2 hover:bg-red-100 rounded-lg transition-colors" title="删除">
                      🗑️
                    </button>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- 编辑模态框 -->
  <div x-show="showEditModal" x-cloak
       class="fixed inset-0 z-50 overflow-y-auto"
       @keydown.escape="closeEditModal()">
    <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:p-0">
      <!-- 遮罩 -->
      <div x-show="showEditModal"
           class="fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm transition-opacity"
           @click="closeEditModal()"></div>
      
      <!-- 模态框内容 -->
      <div x-show="showEditModal && editingTodo"
           class="relative bg-white rounded-2xl shadow-2xl max-w-2xl w-full mx-auto my-8 overflow-hidden transform transition-all">
        
        <!-- 头部 -->
        <div class="flex items-center justify-between px-6 py-4 border-b bg-gradient-to-r from-slate-50 to-white">
          <h3 class="text-lg font-semibold text-gray-900">编辑任务</h3>
          <button @click="closeEditModal()" class="text-gray-400 hover:text-gray-600 text-2xl w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 transition-colors">×</button>
        </div>
        
        <!-- 内容 -->
        <div class="px-6 py-4 space-y-4 max-h-[70vh] overflow-y-auto">
          <!-- 完成状态 -->
          <label class="flex items-center gap-3 cursor-pointer p-3 bg-gray-50 rounded-lg">
            <input type="checkbox" x-model="editingTodo.completed" 
                   class="w-5 h-5 rounded border-gray-300 text-sky-600 focus:ring-sky-500">
            <span class="text-gray-700 font-medium">标记为已完成</span>
          </label>
          
          <!-- 任务内容 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1 text-left">任务内容</label>
            <textarea x-model="editingTodo.content" rows="3" 
                      class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 transition-shadow"></textarea>
          </div>
          
          <!-- 备注 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1 text-left">备注</label>
            <textarea x-model="editingTodo.note" rows="2" placeholder="添加备注..."
                      class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 transition-shadow"></textarea>
          </div>
          
          <!-- 截止日期 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1 text-left">截止日期</label>
            <input type="date" x-model="editingTodo.due_date"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 transition-shadow"/>
          </div>
          
          <!-- 子任务 -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2 text-left">
              子任务
              <span class="text-gray-500 text-xs font-normal" x-text="subtasks.length > 0 ? '(' + subtasks.filter(s => s.completed).length + '/' + subtasks.length + ')' : ''"></span>
            </label>
            
            <!-- 子任务列表 -->
            <div class="space-y-1.5 mb-3 max-h-48 overflow-y-auto p-2 bg-gray-50 rounded-lg">
              <template x-for="subtask in subtasks" :key="subtask.id">
                <div class="group flex items-center gap-2 p-2 hover:bg-white rounded-lg transition-colors"
                     :class="{'bg-white': editingSubtaskId === subtask.id}">
                  <input type="checkbox" x-model="subtask.completed" 
                         @change="toggleSubtaskStatus(subtask.id, subtask.completed)"
                         class="w-4 h-4 rounded border-gray-300 text-sky-600 focus:ring-sky-500 flex-shrink-0">
                  
                  <!-- 显示模式 -->
                  <span x-show="editingSubtaskId !== subtask.id"
                        class="flex-1 text-sm text-left cursor-pointer truncate" 
                        :class="{'line-through text-gray-400': subtask.completed}"
                        x-text="subtask.content"
                        @dblclick="startEditSubtask(subtask.id, subtask.content)"></span>
                  
                  <!-- 编辑模式 -->
                  <input x-show="editingSubtaskId === subtask.id"
                         type="text" 
                         x-model="editingSubtaskContent"
                         @keydown.enter="saveSubtaskEdit(subtask.id)"
                         @keydown.escape="cancelSubtaskEdit()"
                         @blur="saveSubtaskEdit(subtask.id)"
                         class="subtask-edit-input flex-1 text-sm text-left px-2 py-1 border border-sky-300 rounded focus:outline-none focus:ring-2 focus:ring-sky-500"
                         autofocus>
                  
                  <button @click="deleteSubtaskById(subtask.id)"
                          class="p-1 hover:bg-red-100 rounded opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0">
                    🗑️
                  </button>
                </div>
              </template>
              
              <p x-show="subtasks.length === 0" class="text-center text-gray-400 text-sm py-4">暂无子任务</p>
            </div>
            
            <!-- 添加子任务输入框 -->
            <div class="relative">
              <input type="text" x-model="newSubtaskContent" 
                     @keydown.enter="addSubtask()"
                     placeholder="输入子任务内容，按回车添加..." 
                     class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500 text-sm pr-20">
              <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-400">↵ 添加</span>
            </div>
          </div>
        </div>
        
        <!-- 底部 -->
        <div class="flex items-center justify-between px-6 py-4 border-t bg-gradient-to-r from-slate-50 to-white">
          <button @click="confirmDelete(editingTodo.id); closeEditModal()" 
                  class="px-4 py-2 bg-red-600 text-white rounded-lg font-medium hover:bg-red-700 transition-colors shadow-sm">
            🗑️ 删除
          </button>
          <div class="flex gap-3">
            <button @click="closeEditModal()" 
                    class="px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-50 transition-colors shadow-sm">
              取消
            </button>
            <button @click="saveEditingTodo()" 
                    class="px-4 py-2 bg-gradient-to-r from-sky-500 to-blue-600 text-white rounded-lg font-medium hover:from-sky-600 hover:to-blue-700 transition-all shadow-sm">
              💾 保存
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast 通知 -->
  <div class="fixed bottom-4 right-4 z-50 space-y-2">
    <template x-for="toast in toasts" :key="toast.id">
      <div x-show="toast.visible"
           class="px-4 py-3 rounded-lg shadow-lg text-white text-sm font-medium flex items-center gap-2 toast-enter"
           :class="{
             'bg-green-600': toast.type === 'success',
             'bg-red-600': toast.type === 'error',
             'bg-amber-600': toast.type === 'warning',
             'bg-gray-800': toast.type === 'info'
           }"
           x-text="toast.message"></div>
    </template>
  </div>

  <script>
    function todoApp() {
      return {
        todos: [],
        stats: { total: 0, pending: 0, completed: 0 },
        filter: 'all',
        sort: 'created_desc',
        search: '',
        loading: false,
        showEditModal: false,
        editingTodo: null,
        subtasks: [],
        newTaskContent: '',
        newSubtaskContent: '',
        selectedIds: [],
        editingSubtaskId: null,
        editingSubtaskContent: '',
        toasts: [],
        mode: 'work',

        init() {
          console.log('✅ Alpine.js v4 初始化完成');
          console.log('axios 可用:', typeof axios !== 'undefined');
          this.loadTodos();
          this.loadStats();
          setInterval(() => {
            this.loadTodos();
            this.loadStats();
          }, 30000);
        },

        get greetingText() {
          const hour = new Date().getHours();
          if (hour < 12) return '早上好！今天也要加油哦 ☀️';
          if (hour < 18) return '下午好！继续努力 💪';
          return '晚上好！注意休息 🌙';
        },

        get modeDescription() {
          const descriptions = {
            work: '💼 工作模式 - 管理工作任务和项目',
            study: '📚 学习模式 - 管理学习计划和作业',
            life: '🏠 生活模式 - 管理日常琐事和生活安排'
          };
          return descriptions[this.mode];
        },

        get filterText() {
          const texts = { all: '全部任务', pending: '待处理', completed: '已完成' };
          return texts[this.filter];
        },

        get filteredTodos() {
          let result = [...this.todos];
          if (this.filter === 'pending') result = result.filter(t => !t.completed);
          else if (this.filter === 'completed') result = result.filter(t => t.completed);
          if (this.search) result = result.filter(t => t.content.toLowerCase().includes(this.search.toLowerCase()));
          result.sort((a, b) => {
            switch (this.sort) {
              case 'created_asc': return new Date(a.created_at) - new Date(b.created_at);
              case 'created_desc': return new Date(b.created_at) - new Date(a.created_at);
              case 'priority_asc': return a.priority - b.priority;
              case 'priority_desc': return b.priority - a.priority;
              case 'due_date_asc': 
                if (!a.due_date) return 1;
                if (!b.due_date) return -1;
                return new Date(a.due_date) - new Date(b.due_date);
              default: return 0;
            }
          });
          return result;
        },

        async loadTodos() {
          console.log('🔄 加载任务列表...');
          try {
            const params = new URLSearchParams();
            if (this.filter !== 'all') params.set('filter', this.filter);
            params.set('sort', this.sort);
            if (this.search) params.set('search', this.search);
            const res = await axios.get(`/api/todos?${params}`);
            console.log('API 响应:', res.data);
            if (res.data.success) {
              this.todos = res.data.data;
              console.log('✅ 任务数:', this.todos.length);
            }
          } catch (err) {
            console.error('❌ 加载任务失败:', err);
            this.showToast('加载任务失败', 'error');
          }
        },

        async loadStats() {
          console.log('🔄 加载统计信息...');
          try {
            const res = await axios.get('/api/todos/stats');
            if (res.data.success) {
              this.stats = res.data.data;
              console.log('✅ 统计:', this.stats);
            }
          } catch (err) {
            console.error('❌ 加载统计失败:', err);
          }
        },

        async addTodo() {
          if (!this.newTaskContent.trim()) {
            this.showToast('请输入任务内容', 'warning');
            return;
          }
          try {
            const res = await axios.post('/api/todos', {
              content: this.newTaskContent.trim(),
              priority: 2,
              note: ''
            });
            if (res.data.success) {
              this.newTaskContent = '';
              this.showToast('任务添加成功', 'success');
              await this.loadTodos();
              await this.loadStats();
            }
          } catch (err) {
            this.showToast('添加失败', 'error');
          }
        },

        async toggleTodoStatus(id, completed) {
          try {
            const res = await axios.put(`/api/todos/${id}`, { completed });
            if (res.data.success) {
              this.showToast(completed ? '任务已完成' : '任务已恢复', 'success');
              await this.loadStats();
            }
          } catch (err) {
            this.showToast('更新失败', 'error');
          }
        },

        openEditModal(todo) {
          this.editingTodo = { ...todo };
          this.subtasks = [];
          this.editingSubtaskId = null;
          this.editingSubtaskContent = '';
          this.showEditModal = true;
          this.loadSubtasks(todo.id);
        },

        closeEditModal() {
          this.showEditModal = false;
          this.editingTodo = null;
          this.subtasks = [];
          this.newSubtaskContent = '';
          this.editingSubtaskId = null;
        },

        async loadSubtasks(todoId) {
          try {
            const res = await axios.get(`/api/todos/subtasks?todo_id=${todoId}`);
            if (res.data.success) this.subtasks = res.data.data;
          } catch (err) {
            console.error('加载子任务失败:', err);
          }
        },

        async addSubtask() {
          if (!this.newSubtaskContent.trim() || !this.editingTodo) return;
          try {
            const res = await axios.post('/api/todos/subtasks', {
              todo_id: this.editingTodo.id,
              content: this.newSubtaskContent.trim(),
              priority: 2
            });
            if (res.data.success) {
              this.newSubtaskContent = '';
              this.showToast('子任务添加成功', 'success');
              await this.loadSubtasks(this.editingTodo.id);
              await this.loadTodos();
            }
          } catch (err) {
            this.showToast('添加失败', 'error');
          }
        },

        async toggleSubtaskStatus(id, completed) {
          try {
            const res = await axios.put(`/api/todos/subtasks/${id}`, { completed });
            if (res.data.success) await this.loadTodos();
          } catch (err) {
            this.showToast('更新失败', 'error');
          }
        },

        deleteSubtaskById(id) {
          if (!confirm('确定删除此子任务？')) return;
          axios.delete(`/api/todos/subtasks/${id}`)
            .then(res => {
              if (res.data.success) {
                this.showToast('子任务已删除', 'success');
                this.loadSubtasks(this.editingTodo.id);
                this.loadTodos();
              }
            });
        },

        startEditSubtask(id, content) {
          this.editingSubtaskId = id;
          this.editingSubtaskContent = content;
        },

        async saveSubtaskEdit(id) {
          if (this.editingSubtaskId !== id) return;
          const newContent = this.editingSubtaskContent?.trim();
          if (!newContent) { this.cancelSubtaskEdit(); return; }
          try {
            const res = await axios.put(`/api/todos/subtasks/${id}`, { content: newContent });
            if (res.data.success) {
              this.showToast('子任务已更新', 'success');
              await this.loadSubtasks(this.editingTodo.id);
              await this.loadTodos();
            }
          } catch (err) {
            this.showToast('更新失败', 'error');
          }
          this.cancelSubtaskEdit();
        },

        cancelSubtaskEdit() {
          this.editingSubtaskId = null;
          this.editingSubtaskContent = '';
        },

        async saveEditingTodo() {
          if (!this.editingTodo?.content?.trim()) {
            this.showToast('任务内容不能为空', 'warning');
            return;
          }
          try {
            const res = await axios.put(`/api/todos/${this.editingTodo.id}`, {
              content: this.editingTodo.content.trim(),
              completed: this.editingTodo.completed,
              note: this.editingTodo.note?.trim() || '',
              due_date: this.editingTodo.due_date || null
            });
            if (res.data.success) {
              this.showToast('任务已保存', 'success');
              this.closeEditModal();
              await this.loadTodos();
              await this.loadStats();
            }
          } catch (err) {
            this.showToast('保存失败', 'error');
          }
        },

        confirmDelete(id) {
          if (!confirm('确定删除此任务？')) return;
          axios.delete(`/api/todos/${id}`)
            .then(res => {
              if (res.data.success) {
                this.showToast('任务已删除', 'success');
                this.loadTodos();
                this.loadStats();
              }
            });
        },

        batchComplete() {
          Promise.all(this.selectedIds.map(id => 
            axios.put(`/api/todos/${id}`, { completed: true })
          )).then(() => {
            this.showToast(`已完成 ${this.selectedIds.length} 个任务`, 'success');
            this.selectedIds = [];
            this.loadTodos();
            this.loadStats();
          });
        },

        batchDelete() {
          if (!confirm(`确定删除选中的 ${this.selectedIds.length} 个任务？`)) return;
          Promise.all(this.selectedIds.map(id => axios.delete(`/api/todos/${id}`)))
            .then(() => {
              this.showToast(`已删除 ${this.selectedIds.length} 个任务`, 'success');
              this.selectedIds = [];
              this.loadTodos();
              this.loadStats();
            });
        },

        priorityIcon(priority) {
          if (!priority) return '🟡';
          return { 1: '🔴', 2: '🟡', 3: '🟢' }[priority] || '🟡';
        },

        priorityText(priority) {
          if (!priority) return '中';
          return { 1: '高', 2: '中', 3: '低' }[priority] || '中';
        },

        isOverdue(todo) {
          if (!todo.due_date || todo.completed) return false;
          return new Date(todo.due_date) < new Date();
        },

        formatDueDate(dateStr) {
          const date = new Date(dateStr);
          const now = new Date();
          const diff = date - now;
          const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
          if (days < 0) return `逾期${Math.abs(days)}天`;
          if (days === 0) return '今天';
          if (days === 1) return '明天';
          if (days <= 7) return `${days}天后`;
          return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        },

        formatTime(dateStr) {
          const date = new Date(dateStr);
          const now = new Date();
          const diff = now - date;
          const days = Math.floor(diff / (1000 * 60 * 60 * 24));
          if (days === 0) return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
          if (days === 1) return '昨天';
          if (days < 7) return `${days}天前`;
          return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        },

        showToast(message, type = 'info') {
          const id = Date.now();
          this.toasts.push({ id, message, type, visible: true });
          setTimeout(() => {
            const toast = this.toasts.find(t => t.id === id);
            if (toast) toast.visible = false;
            setTimeout(() => {
              this.toasts = this.toasts.filter(t => t.id !== id);
            }, 300);
          }, 3000);
        }
      }
    }
  </script>
</body>
